<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>料金 | FlowVid Studio</title>
<meta name="theme-color" content="#050506" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;650;750;850&family=Noto+Sans+JP:wght@500;700;800&display=swap');
:root{--bg:#050506;--surface:#0b0d12;--surface2:#11141c;--line:rgba(255,255,255,.12);--line2:rgba(255,255,255,.2);--muted:rgba(255,255,255,.58);--text:#f8fafc;--gold:#e7c96f;--blue:#a8cfff;--violet:#b99cff;--cyan:#66e2ff;--button:#f8fafc}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:'Inter','Noto Sans JP',system-ui,sans-serif;letter-spacing:-.02em}body{background:radial-gradient(circle at 88% -8%,rgba(122,85,255,.22),transparent 30%),radial-gradient(circle at 5% 0,rgba(95,215,255,.10),transparent 28%),linear-gradient(180deg,#07070a 0%,#050608 45%,#030304 100%)}.wrap{max-width:1100px;margin:auto;padding:18px 14px 56px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.brand{display:flex;gap:11px;align-items:center;color:#fff;text-decoration:none}.logo{width:48px;height:48px;border-radius:17px;background:linear-gradient(135deg,#a7f3ff 0%,#7b61ff 76%);display:grid;place-items:center;font-weight:850;box-shadow:0 16px 64px rgba(94,75,255,.28),inset 0 1px 0 rgba(255,255,255,.45)}.brand small{display:block;color:rgba(255,255,255,.44);letter-spacing:.2em;font-size:9px;font-weight:850}.brand b{font-size:21px;font-weight:850}.nav{display:flex;gap:8px}.nav a,.menuBtn{color:#fff;text-decoration:none;border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:999px;padding:10px 13px;font-weight:750}.menuBtn{width:44px;height:44px;padding:0}.hero{border:1px solid var(--line);border-radius:30px;padding:22px 18px;margin-bottom:16px;background:linear-gradient(145deg,rgba(255,255,255,.065),rgba(255,255,255,.022)),radial-gradient(circle at 82% 0,rgba(174,142,255,.18),transparent 42%);box-shadow:0 28px 100px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.08)}.eyebrow{display:inline-flex;border:1px solid rgba(231,201,111,.32);background:rgba(231,201,111,.075);color:var(--gold);border-radius:999px;padding:7px 10px;font-size:10px;letter-spacing:.18em;font-weight:850}.hero h1{font-size:38px;line-height:1.08;margin:14px 0 10px;letter-spacing:-.065em;background:linear-gradient(135deg,#fff,#f2dc9a 58%,#b5ecff);-webkit-background-clip:text;color:transparent}.hero p{margin:0;color:var(--muted);line-height:1.78;font-size:14px}.tabs{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);background:rgba(255,255,255,.04);border-radius:22px;padding:5px;margin:14px 0}.tabBtn{border:0;background:transparent;color:rgba(255,255,255,.45);font-size:16px;font-weight:850;padding:14px 6px;border-radius:17px}.tabBtn.active{color:#06070a;background:linear-gradient(90deg,#fff,#e9cf80,#c4a7ff)}.toggle{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.035);padding:5px}.toggle button{border:0;color:rgba(255,255,255,.54);background:transparent;border-radius:15px;padding:13px;font-weight:800}.toggle .active{background:rgba(255,255,255,.11);color:#fff}.noteBox{border:1px solid rgba(231,201,111,.22);background:rgba(231,201,111,.055);color:rgba(255,255,255,.68);border-radius:18px;padding:12px 13px;margin-bottom:16px;line-height:1.65;font-size:12px}.hidden{display:none}.plans{display:grid;gap:14px}.plan{border:1px solid var(--line);border-radius:28px;background:#07090f;padding:22px 17px;box-shadow:0 20px 72px rgba(0,0,0,.36),inset 0 1px 0 rgba(255,255,255,.055);position:relative;overflow:hidden}.plan.standard{background:linear-gradient(180deg,#0a0d14,#040609);border-color:rgba(168,207,255,.42)}.plan.premium{background:linear-gradient(180deg,#0b0d11,#050604);border-color:rgba(231,201,111,.48)}.plan.ultimate{background:linear-gradient(180deg,#0b0a14,#050409);border-color:rgba(185,156,255,.52);box-shadow:0 24px 90px rgba(107,70,255,.16),inset 0 1px 0 rgba(255,255,255,.06)}.plan.team{background:linear-gradient(180deg,#071017,#040608);border-color:rgba(102,226,255,.38)}.badge{position:absolute;right:15px;top:15px;border-radius:999px;padding:6px 9px;background:linear-gradient(90deg,#efeaff,#bda1ff);color:#07070a;font-size:10px;font-weight:850}.name{font-size:31px;font-weight:850;margin:0 0 18px;letter-spacing:-.055em}.standard .name{color:var(--blue)}.premium .name{color:var(--gold)}.ultimate .name{color:var(--violet)}.team .name{color:var(--cyan)}.line{height:1px;background:rgba(255,255,255,.10);margin-bottom:22px}.price{display:flex;align-items:flex-end;gap:7px;margin-bottom:8px}.yen{font-size:22px;color:rgba(255,255,255,.34);font-weight:850;margin-bottom:5px}.price strong{font-size:47px;line-height:.92;letter-spacing:-.065em;font-weight:850}.team .price strong{font-size:35px}.period{color:rgba(255,255,255,.44);font-weight:800;margin-bottom:6px}.billed{min-height:20px;color:rgba(255,255,255,.45);font-size:12px;margin-bottom:13px}.btn{width:100%;border:0;border-radius:16px;padding:15px;font-weight:850;font-size:14px;background:#222631;color:#fff;margin-bottom:18px}.standard .btn{background:linear-gradient(90deg,#edf5ff,#a8cfff);color:#06070a}.premium .btn{background:linear-gradient(90deg,#fff6cc,#d6b654);color:#080809}.ultimate .btn{background:linear-gradient(90deg,#f0eaff,#aa82ff);color:#080809}.team .btn{background:#21242d;color:rgba(255,255,255,.64)}.creditBox{border-radius:18px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08);padding:15px;margin-bottom:18px;line-height:1.55;color:rgba(255,255,255,.74);font-size:13px}.creditBox b{font-weight:750;color:rgba(255,255,255,.82)}.creditBox strong{font-size:22px;color:var(--blue);font-weight:850}.premium .creditBox strong{color:var(--gold)}.ultimate .creditBox strong{color:var(--violet)}.team .creditBox strong{color:var(--cyan)}.features{display:grid;gap:11px;font-size:14px;line-height:1.5}.features div{display:flex;gap:9px}.check{font-weight:800;color:rgba(255,255,255,.6)}.standard .check{color:var(--blue)}.premium .check{color:var(--gold)}.ultimate .check{color:var(--violet)}.team .check{color:var(--cyan)}.packHero{border:1px solid rgba(102,226,255,.22);background:linear-gradient(135deg,rgba(102,226,255,.06),rgba(124,58,237,.06));border-radius:26px;padding:19px;margin-bottom:15px}.packHero h1{margin:0 0 8px;font-size:30px}.packHero p{margin:0;color:var(--muted);line-height:1.7}.memberOnly{display:inline-flex;border:1px solid rgba(231,201,111,.26);background:rgba(231,201,111,.07);color:#f4d98d;border-radius:999px;padding:7px 10px;font-size:11px;font-weight:850;margin-bottom:11px}.creditGrid{display:grid;gap:13px}.creditCard{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.018));border-radius:24px;padding:18px}.creditCard.featured{border-color:rgba(231,201,111,.42)}.creditCard b{font-size:22px;color:#e4efff}.packPrice{font-size:36px;font-weight:850;margin:13px 0 4px}.creditCard p{color:var(--muted);line-height:1.65;font-size:13px}.creditCard button{border:0;border-radius:15px;background:#fff;color:#050506;padding:13px;font-weight:850;width:100%}.footerNote{text-align:center;color:rgba(255,255,255,.32);font-size:12px;line-height:1.7;margin-top:18px}@media(min-width:850px){.plans{grid-template-columns:repeat(2,1fr)}.creditGrid{grid-template-columns:repeat(3,1fr)}.hero h1{font-size:56px}}@media(max-width:430px){.wrap{padding:16px 12px 44px}.brand b{font-size:20px}.brand small{font-size:8px}.nav a{display:none}.hero h1{font-size:34px}.price strong{font-size:46px}.team .price strong{font-size:32px}}
</style>
</head>
<body>
<main class="wrap">
<header class="top"><a class="brand" href="./index.html"><div class="logo">▶</div><div><small>AI VIDEO STUDIO</small><b>FlowVid Studio</b></div></a><nav class="nav"><a href="./generate.html">生成</a><a href="./profile.html">マイページ</a><button class="menuBtn">☰</button></nav></header>
<section class="hero"><span class="eyebrow">PRICING</span><h1>必要な分だけ、動画を作れる。</h1><p>無料枠は先着100名限定。追加クレジットはサブスク会員限定にして、安定運用できる料金設計にします。</p></section>
<section class="tabs"><button id="subTab" class="tabBtn active">サブスクリプション</button><button id="creditTab" class="tabBtn">追加クレジット</button></section>
<section id="subscriptionView">
<section class="toggle"><button id="annualBtn">年額請求</button><button id="monthlyBtn" class="active">月額請求</button></section>
<p class="noteBox">年額は割引なし。クレジットは毎月付与。API原価が安定してからキャンペーンで調整できます。</p>
<section class="plans" id="plans"></section>
</section>
<section id="creditView" class="hidden"><div class="packHero"><span class="memberOnly">✦ サブスク会員限定</span><h1>追加クレジット</h1><p>月間クレジットを使い切った時だけ追加購入できます。Freeユーザーはまずサブスク登録へ誘導します。</p></div><section class="creditGrid" id="creditGrid"></section></section>
<p class="footerNote">決済接続は次工程でStripeに接続します。今は料金表示と導線の確認用です。</p>
</main>
<script>
const plans=[
{cls:'free',name:'Free',monthly:'0',annual:'0',period:'/月',btn:'無料で試す',credits:'100',annualCredits:'100',desc:'先着100名限定',features:['5秒動画1本お試し','ウォーターマークあり保存','追加クレジット購入不可']},
{cls:'standard',name:'Standard',monthly:'2,980',annual:'35,800',period:'/月',btn:'Standardで始める',credits:'800',annualCredits:'9,600',desc:'月10本目安',features:['月10本目安','ウォーターマークなし保存OK','商用利用OK','追加クレジット購入OK']},
{cls:'premium',name:'Premium',monthly:'6,980',annual:'83,800',period:'/月',btn:'Premiumにする',credits:'2,400',annualCredits:'28,800',desc:'月30本目安',features:['月30本目安','優先生成','ウォーターマークなし保存OK','商用利用OK']},
{cls:'ultimate',name:'Ultimate',monthly:'14,800',annual:'177,600',period:'/月',btn:'Ultimateにする',credits:'6,400',annualCredits:'76,800',desc:'月80本目安',features:['月80本目安','大量生成・検証向け','優先生成','追加クレジット購入OK'],badge:'おすすめ'},
{cls:'team',name:'Team',monthly:'298,000〜',annual:'298,000〜',period:'/年',btn:'準備中',credits:'12,500/月',annualCredits:'150,000',desc:'チーム機能は後で対応',features:['複数アカウント','共有クレジット','共有アセット','チーム管理']}
];
const packs=[['100 credits','¥500','少しだけ追加したい時に。'],['300 credits','¥1,300','追加の試作や再生成に。'],['500 credits','¥2,000','検証をまとめて進めたい時に。','featured'],['1,000 credits','¥3,600','月間枠を超えて作りたい時に。'],['3,000 credits','¥9,800','案件用の追加生成に。']];
let billing='monthly';
function creditLabel(p){if(p.cls==='free')return '初回クレジット';if(p.cls==='team')return billing==='annual'?'年間クレジット':'月間目安';return billing==='annual'?'年間クレジット':'月間クレジット'}
function creditValue(p){if(p.cls==='team')return billing==='annual'?p.annualCredits:p.credits;return billing==='annual'?p.annualCredits:p.credits}
function renderPlans(){document.getElementById('plans').innerHTML=plans.map(p=>`<article class="plan ${p.cls}">${p.badge?`<span class="badge">${p.badge}</span>`:''}<h2 class="name">${p.name}</h2><div class="line"></div><div class="price"><span class="yen">¥</span><strong>${billing==='annual'?p.annual:p.monthly}</strong><span class="period">${billing==='annual'||p.cls==='team'?'/年':p.period}</span></div><div class="billed">${billing==='annual'&&p.cls!=='free'&&p.cls!=='team'?`年間 ${p.annualCredits} credits`:p.desc}</div><button class="btn">${p.btn}</button><div class="creditBox"><b>${creditLabel(p)}</b><br><strong>${creditValue(p)}</strong> credits</div><div class="features">${p.features.map(f=>`<div><span class="check">✓</span><span>${f}</span></div>`).join('')}</div></article>`).join('')}
function renderPacks(){document.getElementById('creditGrid').innerHTML=packs.map(p=>`<div class="creditCard ${p[3]||''}"><b>${p[0]}</b><div class="packPrice">${p[1]}</div><p>${p[2]}</p><button>会員限定で購入</button></div>`).join('')}
function setView(onCredit, syncUrl=true){subTab.classList.toggle('active',!onCredit);creditTab.classList.toggle('active',onCredit);subscriptionView.classList.toggle('hidden',onCredit);creditView.classList.toggle('hidden',!onCredit);if(syncUrl){history.replaceState(null,'',onCredit?'#credit':'./pricing.html')}}
renderPlans();renderPacks();document.getElementById('monthlyBtn').onclick=()=>{billing='monthly';monthlyBtn.classList.add('active');annualBtn.classList.remove('active');renderPlans()};document.getElementById('annualBtn').onclick=()=>{billing='annual';annualBtn.classList.add('active');monthlyBtn.classList.remove('active');renderPlans()};
const subTab=document.getElementById('subTab'),creditTab=document.getElementById('creditTab'),subscriptionView=document.getElementById('subscriptionView'),creditView=document.getElementById('creditView');subTab.onclick=()=>setView(false);creditTab.onclick=()=>setView(true);setView(location.hash==='#credit',false);window.addEventListener('hashchange',()=>setView(location.hash==='#credit',false));
</script>
</body>
</html>
