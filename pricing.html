<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>料金 | FlowVid Studio</title>
<meta name="theme-color" content="#050506" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&family=Noto+Sans+JP:wght@500;700;800;900&display=swap');
:root{--bg:#050506;--line:rgba(255,255,255,.14);--muted:rgba(255,255,255,.58);--gold:#e9cf7a;--blue:#9ec5ff;--violet:#b69cff;--cyan:#60e7ff}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#050506;color:#fff;font-family:'Inter','Noto Sans JP',system-ui,sans-serif;letter-spacing:-.015em}body{background:radial-gradient(circle at 90% 0,rgba(124,58,237,.34),transparent 32%),radial-gradient(circle at 0 12%,rgba(96,231,255,.16),transparent 28%),linear-gradient(180deg,#050506,#080a12 52%,#030304)}.wrap{max-width:1120px;margin:auto;padding:18px 14px 54px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.brand{display:flex;gap:12px;align-items:center;color:#fff;text-decoration:none}.logo{width:50px;height:50px;border-radius:19px;background:linear-gradient(135deg,#8cf3ff,#8457ff);display:grid;place-items:center;font-weight:900;box-shadow:0 18px 80px rgba(124,58,237,.34)}.brand small{display:block;color:rgba(255,255,255,.42);letter-spacing:.22em;font-size:10px;font-weight:900}.brand b{font-size:22px;font-weight:900}.nav{display:flex;gap:8px}.nav a,.menuBtn{color:#fff;text-decoration:none;border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:999px;padding:10px 13px;font-weight:900}.menuBtn{width:46px;height:46px;padding:0}.hero{border:1px solid var(--line);border-radius:32px;padding:22px 18px;margin-bottom:16px;background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.025)),radial-gradient(circle at 82% 0,rgba(182,156,255,.24),transparent 38%);box-shadow:0 34px 120px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.10)}.eyebrow{display:inline-flex;border:1px solid rgba(233,207,122,.36);background:rgba(233,207,122,.08);color:var(--gold);border-radius:999px;padding:8px 11px;font-size:11px;letter-spacing:.18em;font-weight:900}.hero h1{font-size:40px;line-height:1.05;margin:14px 0 10px;letter-spacing:-.075em;background:linear-gradient(135deg,#fff,#f2db92 54%,#9cecff);-webkit-background-clip:text;color:transparent}.hero p{margin:0;color:var(--muted);line-height:1.75}.tabs{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:24px;padding:6px;margin:14px 0}.tabBtn{border:0;background:transparent;color:rgba(255,255,255,.45);font-size:17px;font-weight:950;padding:15px 6px;border-radius:18px}.tabBtn.active{color:#050506;background:linear-gradient(90deg,#fff,#e8d18a,#b58bff)}.toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.045);padding:6px}.toggle button{border:0;color:rgba(255,255,255,.56);background:transparent;border-radius:16px;padding:14px;font-weight:900}.toggle .active{background:rgba(255,255,255,.13);color:#fff}.noteBox{border:1px solid rgba(233,207,122,.25);background:rgba(233,207,122,.07);color:rgba(255,255,255,.72);border-radius:20px;padding:13px;margin-bottom:16px;line-height:1.65;font-size:13px}.hidden{display:none}.plans{display:grid;gap:16px}.plan{border:1px solid var(--line);border-radius:30px;background:linear-gradient(180deg,rgba(18,21,31,.96),rgba(4,6,9,.96));padding:24px 18px;box-shadow:0 24px 80px rgba(0,0,0,.36),inset 0 1px 0 rgba(255,255,255,.075);position:relative}.plan.standard{border-color:rgba(158,197,255,.48)}.plan.premium{border-color:rgba(233,207,122,.55)}.plan.ultimate{border-color:rgba(182,156,255,.58);box-shadow:0 26px 100px rgba(124,58,237,.20)}.plan.team{border-color:rgba(96,231,255,.45)}.badge{position:absolute;right:18px;top:18px;border-radius:999px;padding:7px 10px;background:linear-gradient(90deg,#d9d0ff,#9c7cff);color:#090909;font-size:11px;font-weight:900}.name{font-size:34px;font-weight:950;margin:0 0 20px;letter-spacing:-.06em}.standard .name{color:var(--blue)}.premium .name{color:var(--gold)}.ultimate .name{color:var(--violet)}.team .name{color:var(--cyan)}.line{height:1px;background:rgba(255,255,255,.12);margin-bottom:24px}.price{display:flex;align-items:flex-end;gap:8px;margin-bottom:8px}.yen{font-size:25px;color:rgba(255,255,255,.38);font-weight:950;margin-bottom:5px}.price strong{font-size:52px;line-height:.9;letter-spacing:-.07em}.team .price strong{font-size:38px}.period{color:rgba(255,255,255,.45);font-weight:900;margin-bottom:7px}.billed{min-height:20px;color:rgba(255,255,255,.46);font-size:13px;margin-bottom:14px}.btn{width:100%;border:0;border-radius:18px;padding:17px;font-weight:950;font-size:16px;background:#232832;color:#fff;margin-bottom:20px}.standard .btn{background:linear-gradient(90deg,#eaf2ff,#9ec5ff);color:#070910}.premium .btn{background:linear-gradient(90deg,#fff4c7,#d0ae58);color:#090909}.ultimate .btn{background:linear-gradient(90deg,#eee7ff,#a87dff);color:#090909}.team .btn{background:#232832;color:rgba(255,255,255,.7)}.creditBox{border-radius:20px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);padding:16px;margin-bottom:20px;line-height:1.55;color:rgba(255,255,255,.76)}.creditBox strong{font-size:23px;color:var(--blue)}.premium .creditBox strong{color:var(--gold)}.ultimate .creditBox strong{color:var(--violet)}.team .creditBox strong{color:var(--cyan)}.features{display:grid;gap:13px;font-size:15px;line-height:1.5}.features div{display:flex;gap:10px}.check{font-weight:900;color:rgba(255,255,255,.65)}.standard .check{color:var(--blue)}.premium .check{color:var(--gold)}.ultimate .check{color:var(--violet)}.team .check{color:var(--cyan)}.packHero{border:1px solid rgba(96,231,255,.25);background:linear-gradient(135deg,rgba(96,231,255,.08),rgba(124,58,237,.08));border-radius:28px;padding:20px;margin-bottom:16px}.packHero h1{margin:0 0 8px;font-size:32px}.packHero p{margin:0;color:var(--muted);line-height:1.7}.memberOnly{display:inline-flex;border:1px solid rgba(233,207,122,.28);background:rgba(233,207,122,.08);color:#f6dfa2;border-radius:999px;padding:8px 11px;font-size:12px;font-weight:900;margin-bottom:12px}.creditGrid{display:grid;gap:14px}.creditCard{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.028));border-radius:25px;padding:19px}.creditCard.featured{border-color:rgba(233,207,122,.45)}.creditCard b{font-size:24px;color:#dbeafe}.packPrice{font-size:39px;font-weight:950;margin:14px 0 4px}.creditCard p{color:var(--muted);line-height:1.65;font-size:13px}.creditCard button{border:0;border-radius:16px;background:#fff;color:#050506;padding:14px;font-weight:950;width:100%}.footerNote{text-align:center;color:rgba(255,255,255,.35);font-size:12px;line-height:1.7;margin-top:18px}@media(min-width:850px){.plans{grid-template-columns:repeat(2,1fr)}.creditGrid{grid-template-columns:repeat(3,1fr)}.hero h1{font-size:58px}}@media(max-width:430px){.wrap{padding:16px 12px 44px}.brand b{font-size:21px}.brand small{font-size:9px}.nav a{display:none}.hero h1{font-size:36px}.price strong{font-size:50px}.team .price strong{font-size:34px}}
</style>
</head>
<body>
<main class="wrap">
<header class="top"><a class="brand" href="./index.html"><div class="logo">▶</div><div><small>AI VIDEO STUDIO</small><b>FlowVid Studio</b></div></a><nav class="nav"><a href="./generate.html">生成</a><a href="./profile.html">マイページ</a><button class="menuBtn">☰</button></nav></header>
<section class="hero"><span class="eyebrow">PRICING</span><h1>必要な分だけ、動画を作れる。</h1><p>無料枠は先着100名限定。追加クレジットはサブスク会員限定にして、安定運用できる料金設計にします。</p></section>
<section class="tabs"><button id="subTab" class="tabBtn active">サブスクリプション</button><button id="creditTab" class="tabBtn">追加クレジット</button></section>
<section id="subscriptionView">
<section class="toggle"><button id="annualBtn">年額請求</button><button id="monthlyBtn" class="active">月額請求</button></section>
<p class="noteBox">年額は割引なし。クレジットは毎月付与。API原価が安定してからキャンペーンで調整できます。</p>
<section class="plans" id="plans"></section>
</section>
<section id="creditView" class="hidden"><div class="packHero"><span class="memberOnly">✦ サブスク会員限定</span><h1>追加クレジット</h1><p>月間クレジットを使い切った時だけ追加購入できます。Freeユーザーはまずサブスク登録へ誘導します。</p></div><section class="creditGrid" id="creditGrid"></section></section>
<p class="footerNote">決済接続は次工程でStripeに接続します。今は料金表示と導線の確認用です。</p>
</main>
<script>
const plans=[
{cls:'free',name:'Free',monthly:'0',annual:'0',period:'/月',btn:'無料で試す',credits:'100',annualCredits:'100',desc:'先着100名限定',features:['5秒動画1本お試し','ウォーターマークあり保存','追加クレジット購入不可']},
{cls:'standard',name:'Standard',monthly:'2,980',annual:'35,800',period:'/月',btn:'Standardで始める',credits:'800',annualCredits:'9,600',desc:'月10本目安',features:['月10本目安','ウォーターマークなし保存OK','商用利用OK','追加クレジット購入OK']},
{cls:'premium',name:'Premium',monthly:'6,980',annual:'83,800',period:'/月',btn:'Premiumにする',credits:'2,400',annualCredits:'28,800',desc:'月30本目安',features:['月30本目安','優先生成','ウォーターマークなし保存OK','商用利用OK']},
{cls:'ultimate',name:'Ultimate',monthly:'14,800',annual:'177,600',period:'/月',btn:'Ultimateにする',credits:'6,400',annualCredits:'76,800',desc:'月80本目安',features:['月80本目安','大量生成・検証向け','優先生成','追加クレジット購入OK'],badge:'おすすめ'},
{cls:'team',name:'Team',monthly:'298,000〜',annual:'298,000〜',period:'/年',btn:'準備中',credits:'未定',annualCredits:'未定',desc:'チーム機能は後で対応',features:['複数アカウント','共有クレジット','共有アセット','チーム管理']}
];
const packs=[['100 credits','¥500','少しだけ追加したい時に。'],['300 credits','¥1,300','追加の試作や再生成に。'],['500 credits','¥2,000','検証をまとめて進めたい時に。','featured'],['1,000 credits','¥3,600','月間枠を超えて作りたい時に。'],['3,000 credits','¥9,800','案件用の追加生成に。']];
let billing='monthly';
function creditLabel(p){if(p.cls==='free')return '初回クレジット';if(p.cls==='team')return 'チームクレジット';return billing==='annual'?'年間クレジット':'月間クレジット'}
function renderPlans(){document.getElementById('plans').innerHTML=plans.map(p=>`<article class="plan ${p.cls}">${p.badge?`<span class="badge">${p.badge}</span>`:''}<h2 class="name">${p.name}</h2><div class="line"></div><div class="price"><span class="yen">¥</span><strong>${billing==='annual'?p.annual:p.monthly}</strong><span class="period">${billing==='annual'||p.cls==='team'?'/年':p.period}</span></div><div class="billed">${billing==='annual'&&p.cls!=='free'&&p.cls!=='team'?`年間 ${p.annualCredits} credits`:p.desc}</div><button class="btn">${p.btn}</button><div class="creditBox"><b>${creditLabel(p)}</b><br><strong>${billing==='annual'?p.annualCredits:p.credits}</strong> credits</div><div class="features">${p.features.map(f=>`<div><span class="check">✓</span><span>${f}</span></div>`).join('')}</div></article>`).join('')}
function renderPacks(){document.getElementById('creditGrid').innerHTML=packs.map(p=>`<div class="creditCard ${p[3]||''}"><b>${p[0]}</b><div class="packPrice">${p[1]}</div><p>${p[2]}</p><button>会員限定で購入</button></div>`).join('')}
renderPlans();renderPacks();document.getElementById('monthlyBtn').onclick=()=>{billing='monthly';monthlyBtn.classList.add('active');annualBtn.classList.remove('active');renderPlans()};document.getElementById('annualBtn').onclick=()=>{billing='annual';annualBtn.classList.add('active');monthlyBtn.classList.remove('active');renderPlans()};
const subTab=document.getElementById('subTab'),creditTab=document.getElementById('creditTab'),subscriptionView=document.getElementById('subscriptionView'),creditView=document.getElementById('creditView');function showCredit(on){subTab.classList.toggle('active',!on);creditTab.classList.toggle('active',on);subscriptionView.classList.toggle('hidden',on);creditView.classList.toggle('hidden',!on)}subTab.onclick=()=>showCredit(false);creditTab.onclick=()=>showCredit(true);if(location.hash==='#credit')showCredit(true);
</script>
</body>
</html>
