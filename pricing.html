<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>料金 | FlowVid Studio</title>
<meta name="theme-color" content="#050506" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;650;750;850&family=Noto+Sans+JP:wght@500;700;800&display=swap');
:root{--bg:#050506;--line:rgba(255,255,255,.13);--muted:rgba(255,255,255,.58);--gold:#e8cb74;--blue:#9fcaff;--violet:#b895ff;--cyan:#63e3ff;--text:#f8fafc}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:'Inter','Noto Sans JP',system-ui,sans-serif;letter-spacing:-.02em}body{background:#000}.wrap{max-width:1080px;margin:0 auto;padding:18px 14px 58px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}.brand{display:flex;align-items:center;gap:11px;text-decoration:none;color:#fff}.logo{width:48px;height:48px;border-radius:17px;display:grid;place-items:center;background:linear-gradient(135deg,#a5f3ff,#7c5cff 75%);box-shadow:0 18px 70px rgba(124,92,255,.28),inset 0 1px 0 rgba(255,255,255,.45);font-weight:500;font-size:14px}.brand small{display:block;font-size:9px;letter-spacing:.2em;color:rgba(255,255,255,.42);font-weight:500;font-size:14px}.brand b{font-size:21px;font-weight:500;font-size:14px}.menuBtn{width:44px;height:44px;border-radius:50%;border:1px solid var(--line);background:rgba(255,255,255,.045);color:#fff;font-weight:850;cursor:pointer;font-size:20px}.hero{border:1px solid var(--line);border-radius:30px;padding:22px 18px;margin-bottom:15px;background:linear-gradient(145deg,rgba(255,255,255,.07),rgba(255,255,255,.025)),radial-gradient(circle at 80% 0,rgba(184,149,255,.16),transparent 42%);box-shadow:0 28px 100px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.08)}.pill{display:inline-flex;border:1px solid rgba(232,203,116,.32);background:rgba(232,203,116,.07);color:var(--gold);border-radius:999px;padding:7px 10px;font-size:10px;letter-spacing:.18em;font-weight:500;font-size:14px}.hero h1{margin:14px 0 10px;font-size:34px;line-height:1.08;letter-spacing:-.065em;background:linear-gradient(135deg,#fff,#f4de9b 55%,#c8f2ff);-webkit-background-clip:text;color:transparent}.hero p{margin:0;color:var(--muted);font-size:14px;line-height:1.78}.tabs,.toggle{display:grid;grid-template-columns:1fr 1fr;gap:6px;border:1px solid var(--line);background:rgba(255,255,255,.04);border-radius:22px;padding:5px;margin:14px 0}.tab,.billing{border:0;background:transparent;color:rgba(255,255,255,.46);border-radius:17px;padding:14px 6px;font-weight:850;font-size:15px}.active{background:linear-gradient(90deg,#fff,#ead185,#c8a9ff);color:#050506}.note{border:1px solid rgba(232,203,116,.22);background:rgba(232,203,116,.055);color:rgba(255,255,255,.68);border-radius:18px;padding:12px 13px;margin:0 0 16px;font-size:12px;line-height:1.65}.hidden{display:none}.plans,.packs{display:grid;gap:14px}.plan,.pack,.intro{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:28px;background:linear-gradient(180deg,#0b0d13,#050609);padding:22px 17px;box-shadow:0 20px 72px rgba(0,0,0,.36),inset 0 1px 0 rgba(255,255,255,.055)}.standard{border-color:rgba(159,202,255,.42)}.premium{border-color:rgba(232,203,116,.48)}.ultimate{border-color:rgba(184,149,255,.52);box-shadow:0 24px 90px rgba(124,92,255,.15),inset 0 1px 0 rgba(255,255,255,.06)}.team{border-color:rgba(99,227,255,.42)}.badge{position:absolute;right:15px;top:15px;border-radius:999px;background:linear-gradient(90deg,#efeaff,#bda1ff);color:#06070a;padding:6px 9px;font-size:10px;font-weight:500;font-size:14px}.name{font-size:31px;font-weight:850;margin:0 0 18px;letter-spacing:-.055em}.standard .name{color:var(--blue)}.premium .name{color:var(--gold)}.ultimate .name{color:var(--violet)}.team .name{color:var(--cyan)}.rule{height:1px;background:rgba(255,255,255,.10);margin-bottom:22px}.price{display:flex;align-items:flex-end;gap:7px;margin-bottom:8px}.yen{font-size:22px;color:rgba(255,255,255,.34);font-weight:850;margin-bottom:5px}.amount{font-size:46px;line-height:.92;letter-spacing:-.065em;font-weight:500;font-size:14px}.team .amount{font-size:34px}.period{color:rgba(255,255,255,.45);font-weight:800;margin-bottom:6px}.desc{min-height:20px;color:rgba(255,255,255,.45);font-size:12px;margin-bottom:13px}.btn{width:100%;border:0;border-radius:16px;padding:15px;font-weight:850;font-size:14px;background:#222631;color:#fff;margin-bottom:18px}.standard .btn{background:linear-gradient(90deg,#edf5ff,#9fcaff);color:#06070a}.premium .btn{background:linear-gradient(90deg,#fff6cc,#d6b654);color:#080809}.ultimate .btn{background:linear-gradient(90deg,#f0eaff,#aa82ff);color:#080809}.team .btn{background:#20242d;color:rgba(255,255,255,.65)}.credits{border:1px solid rgba(255,255,255,.08);border-radius:18px;background:rgba(255,255,255,.055);padding:15px;margin-bottom:18px;font-size:13px;color:rgba(255,255,255,.74);line-height:1.55}.credits b{display:block;color:rgba(255,255,255,.82);margin-bottom:2px}.credits strong{font-size:22px;color:var(--blue)}.premium .credits strong{color:var(--gold)}.ultimate .credits strong{color:var(--violet)}.team .credits strong{color:var(--cyan)}.features{display:grid;gap:11px;font-size:14px;line-height:1.5}.features div{display:flex;gap:9px}.check{font-weight:850;color:rgba(255,255,255,.62)}.standard .check{color:var(--blue)}.premium .check{color:var(--gold)}.ultimate .check{color:var(--violet)}.team .check{color:var(--cyan)}.intro{border-color:rgba(99,227,255,.22);background:linear-gradient(135deg,rgba(99,227,255,.06),rgba(124,92,255,.06));margin-bottom:14px}.intro h2{font-size:30px;margin:11px 0 8px}.intro p{margin:0;color:var(--muted);line-height:1.7}.member{display:inline-flex;border:1px solid rgba(232,203,116,.26);background:rgba(232,203,116,.07);color:#f4d98d;border-radius:999px;padding:7px 10px;font-size:11px;font-weight:500;font-size:14px}.pack b{font-size:22px;color:#e4efff;font-family:'Inter',system-ui,sans-serif}.pack .packPrice{font-size:36px;line-height:.92;font-weight:700;letter-spacing:-.065em;margin:13px 0 4px;font-family:'Inter',system-ui,sans-serif}.pack p{color:var(--muted);line-height:1.65;font-size:13px}.pack button{border:0;border-radius:15px;background:#fff;color:#050506;padding:13px;font-weight:850;width:100%}.footer{text-align:center;color:rgba(255,255,255,.32);font-size:12px;line-height:1.7;margin-top:18px}.checkoutMsg{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:15;background:#1e2230;border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:14px 22px;font-size:14px;font-weight:750;color:#f8fafc;box-shadow:0 12px 40px rgba(0,0,0,.6);max-width:calc(100vw - 32px);text-align:center}.checkoutMsg.bad{background:#1e1020;border-color:rgba(251,113,133,.35);color:#fecdd3}.checkoutModalCard{background:#0a0b0e;border:1px solid rgba(255,255,255,.15);border-radius:24px;width:100%;max-width:520px;max-height:92dvh;overflow-y:auto;position:relative}@media(min-width:850px){.plans{grid-template-columns:repeat(2,1fr)}.packs{grid-template-columns:repeat(3,1fr)}.hero h1{font-size:56px}}@media(max-width:430px){.wrap{padding:16px 12px 44px}.brand b{font-size:20px}.brand small{font-size:8px}.hero h1{font-size:34px}.amount{font-size:46px}.team .amount{font-size:32px}}@media(max-width:600px){#checkoutModal{padding:0}.checkoutModalCard{max-width:100vw;width:100vw;max-height:100dvh;height:100dvh;border-radius:0;padding-top:env(safe-area-inset-top,0);padding-bottom:env(safe-area-inset-bottom,0)}#checkoutContainer{padding:56px 8px 20px!important;min-height:calc(100dvh - 56px)}}.drawer{position:fixed;inset:0;z-index:20;display:none}.drawer.open{display:block}.shade{position:absolute;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(8px)}.menuPanel{position:absolute;right:12px;top:12px;width:min(340px,calc(100vw - 24px));border:1px solid var(--line);border-radius:28px;background:#000;padding:18px}.menuHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.menuClose{border:0;background:rgba(255,255,255,.08);color:#fff;border-radius:50%;width:38px;height:38px;font-size:24px;cursor:pointer}.menuPanel a{display:flex;justify-content:space-between;color:#fff;text-decoration:none;border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:18px;padding:15px;margin-top:8px;font-weight:500;font-size:14px}.menuPanel .logout{border-color:rgba(251,113,133,.28)!important;background:rgba(251,113,133,.08)!important}
</style>
</head>
<body>
<main class="wrap">
<header class="top"><a class="brand" href="./index.html"><img src="/logo.png" alt="FlowVid Studio" style="height:auto;width:120px;display:block"></a><button class="menuBtn" id="menuBtn">☰</button></header>
<section class="tabs"><button id="subTab" class="tab active">サブスクリプション</button><button id="creditTab" class="tab">追加クレジット</button></section>
<section id="subscriptionView"><section class="toggle"><button id="annualBtn" class="billing">年額請求</button><button id="monthlyBtn" class="billing active">月額請求</button></section><p class="note">動画の長さ・解像度・生成方式により消費クレジットは異なります。</p><section class="plans" id="plans"></section></section>
<section id="creditView" class="hidden"><div class="intro"><span class="member">✦ サブスク会員限定</span><h2>追加クレジット</h2></div><section class="packs" id="packs"></section></section>
<p class="footer">決済はStripeで安全に処理されます。解約はいつでもマイページから。</p>
<div id="checkoutMsg" class="checkoutMsg" style="display:none"></div>
<div id="checkoutModal" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);align-items:center;justify-content:center;padding:16px"><div class="checkoutModalCard"><button id="checkoutModalClose" style="position:absolute;right:14px;top:14px;z-index:2;border:0;background:rgba(255,255,255,.1);color:#fff;border-radius:50%;width:36px;height:36px;font-size:20px;cursor:pointer;line-height:1">×</button><div id="checkoutContainer" style="padding:24px 20px 20px"></div></div></div>
</main>
<div class="drawer" id="drawer"><div class="shade" id="shade"></div><div class="menuPanel"><div class="menuHead"><b>メニュー</b><button class="menuClose" id="menuClose">×</button></div><a href="./index.html">ホーム <span>›</span></a><a href="./generate-prod.html">生成 <span>›</span></a><a href="./login.html">ログイン / 新規登録 <span>›</span></a><a href="./profile.html">マイページ <span>›</span></a><a href="./pricing.html">サブスクリプション <span>›</span></a><a href="./pricing.html#credit" onclick="document.getElementById('drawer').classList.remove('open');setTimeout(()=>{const el=document.getElementById('creditView');if(el)el.scrollIntoView({behavior:'smooth'})},200)">クレジット購入 <span>›</span></a><a href="./help.html">ヘルプセンター <span>›</span></a><a class="logout" href="./logout.html">ログアウト <span>›</span></a></div></div>
<script src="https://js.stripe.com/v3/"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./auth-config.js"></script>
<script>
const plans=[
{cls:'free',name:'Free',monthly:'0',period:'/月',btn:'無料で試す',credits:'100',desc:'先着100名限定',features:['5秒動画1本お試し','ウォーターマークあり保存','追加クレジット購入不可']},
{cls:'standard',name:'Standard',monthly:'2,980',period:'/月',btn:'Standardで始める',credits:'800',annual:'35,760',desc:'',features:['ウォーターマークなし保存OK','商用利用OK','追加クレジット購入OK']},
{cls:'premium',name:'Premium',monthly:'6,980',period:'/月',btn:'Premiumにする',credits:'2,100',annual:'83,760',desc:'',features:['ウォーターマークなし保存OK','商用利用OK','追加クレジット購入OK']},
{cls:'ultimate',name:'Ultimate',monthly:'15,800',period:'/月',btn:'Ultimateにする',credits:'5,100',annual:'189,600',desc:'',features:['ウォーターマークなし保存OK','商用利用OK','追加クレジット購入OK','大量生成・検証向け'],badge:'おすすめ'},
{cls:'team',name:'Team',monthly:'298,000',period:'/月',btn:'準備中',credits:'90,000',desc:'',features:['ウォーターマークなし保存OK','商用利用OK','追加クレジット購入OK','大量生成・検証向け','複数アカウント','共有クレジット','共有アセット','チーム管理']}
];
const packs=[
{id:'credits_100',label:'100 credits',price:'¥500',desc:''},
{id:'credits_300',label:'300 credits',price:'¥1,300',desc:''},
{id:'credits_500',label:'500 credits',price:'¥2,000',desc:''},
{id:'credits_1000',label:'1,000 credits',price:'¥3,600',desc:''},
{id:'credits_3000',label:'3,000 credits',price:'¥9,800',desc:''}
];
let billing='monthly';
function renderPlans(){plansEl.innerHTML=plans.map(p=>{let priceHtml,btnLabel,creditsLabel;if(billing==='annual'){if(p.annual){priceHtml=`<div class="price"><span class="yen">¥</span><strong class="amount">${p.annual}</strong><span class="period">/年</span></div>`;btnLabel=p.btn;creditsLabel='毎月付与クレジット';}else if(p.cls==='free'){priceHtml=`<div class="price"><span class="yen">¥</span><strong class="amount">${p.monthly}</strong><span class="period">${p.period}</span></div>`;btnLabel=p.btn;creditsLabel='初回クレジット';}else{priceHtml=`<div class="price"><span class="yen">¥</span><strong class="amount">${p.monthly}</strong><span class="period">${p.period}</span></div>`;btnLabel='準備中';creditsLabel='月間クレジット';}}else{priceHtml=`<div class="price"><span class="yen">¥</span><strong class="amount">${p.monthly}</strong><span class="period">${p.period}</span></div>`;btnLabel=p.btn;creditsLabel=p.cls==='free'?'初回クレジット':'月間クレジット';}return `<article class="plan ${p.cls}">${p.badge?`<span class="badge">${p.badge}</span>`:''}<h2 class="name">${p.name}</h2><div class="rule"></div>${priceHtml}<div class="desc">${p.desc}</div><button class="btn" data-plan="${p.cls}">${btnLabel}</button><div class="credits"><b>${creditsLabel}</b><strong>${p.credits}</strong> credits</div><div class="features">${p.features.map(f=>`<div><span class="check">✓</span><span>${f}</span></div>`).join('')}</div></article>`}).join('');attachPlanHandlers()}
function attachPlanHandlers(){document.querySelectorAll('#plans .btn').forEach(btn=>{const cls=btn.dataset.plan;btn.onclick=function(){if(cls==='free'){location.href='./generate-prod.html';return}if(billing==='annual'){const plan=plans.find(p=>p.cls===cls);if(!plan?.annual){showMsg('年額プランは準備中です');return}checkout('subscription',cls,btn,'year');return}checkout('subscription',cls,btn,'month')}})}
function renderPacks(){packsEl.innerHTML=packs.map(p=>`<div class="pack"><b>${p.label}</b><div class="packPrice">${p.price}</div><p>${p.desc}</p><button data-pack="${p.id}">会員限定で購入</button></div>`).join('');document.querySelectorAll('#packs button').forEach(btn=>{btn.onclick=function(){checkout('credits',btn.dataset.pack,btn)}})}
function syncUrl(){let next='#monthly';if(billing==='annual')next='#annual';if(creditView&&!creditView.classList.contains('hidden'))next='#credit';history.replaceState(null,'',next)}
function setBilling(v,sync=true){billing=v;monthlyBtn.classList.toggle('active',v==='monthly');annualBtn.classList.toggle('active',v==='annual');renderPlans();if(sync)syncUrl()}
function setView(onCredit,sync=true){subTab.classList.toggle('active',!onCredit);creditTab.classList.toggle('active',onCredit);subscriptionView.classList.toggle('hidden',onCredit);creditView.classList.toggle('hidden',!onCredit);if(sync)syncUrl()}
function applyHash(){if(location.hash==='#credit'){setBilling('monthly',false);setView(true,false);return}setView(false,false);setBilling(location.hash==='#annual'?'annual':'monthly',false)}
const plansEl=document.getElementById('plans'),packsEl=document.getElementById('packs'),monthlyBtn=document.getElementById('monthlyBtn'),annualBtn=document.getElementById('annualBtn'),subTab=document.getElementById('subTab'),creditTab=document.getElementById('creditTab'),subscriptionView=document.getElementById('subscriptionView'),creditView=document.getElementById('creditView');
let _msgTimer=null;
function showMsg(msg,bad=false){const el=document.getElementById('checkoutMsg');if(!el)return;el.textContent=msg;el.className='checkoutMsg'+(bad?' bad':'');el.style.display='block';clearTimeout(_msgTimer);_msgTimer=setTimeout(()=>el.style.display='none',bad?6000:3500)}
async function getToken(){try{const cfg=window.FLOWVID_AUTH||{};if(!window.supabase||!cfg.supabaseUrl||!cfg.supabaseAnonKey)return '';if(!window.__flowvidUserClient)window.__flowvidUserClient=window.supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey);const{data}=await window.__flowvidUserClient.auth.getSession();return data?.session?.access_token||''}catch(_){return ''}}
let _stripePromise=null;
function getStripe(){if(_stripePromise)return _stripePromise;_stripePromise=fetch('/api/stripe-config').then(r=>r.json()).then(d=>{if(!d.publishableKey)throw new Error('Stripe key not configured');return Stripe(d.publishableKey)}).catch(e=>{_stripePromise=null;throw e});return _stripePromise}
let _embeddedCheckout=null;
async function openEmbeddedCheckout(clientSecret){const stripe=await getStripe();const ec=await stripe.initEmbeddedCheckout({clientSecret});_embeddedCheckout=ec;document.getElementById('checkoutModal').style.display='flex';ec.mount('#checkoutContainer')}
function closeEmbeddedCheckout(){if(_embeddedCheckout){_embeddedCheckout.destroy();_embeddedCheckout=null}document.getElementById('checkoutModal').style.display='none';document.getElementById('checkoutContainer').innerHTML=''}
// Embedded checkout is used on all screen sizes; on narrow viewports the
// modal itself goes near-fullscreen (see @media(max-width:600px) above) so
// Stripe's payment + Link UI has room instead of being squeezed into a
// 520px card. This avoids the top-level redirect to checkout.stripe.com
// that a hosted session would otherwise require.
async function checkout(kind,id,btn,interval='month'){const origText=btn?.textContent;if(btn){btn.disabled=true;btn.textContent='処理中…'}try{const token=await getToken();if(!token){location.href='./login.html';return}const res=await fetch('/api/stripe-checkout',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({kind,id,billing_interval:interval})});const data=await res.json();if(data.url){location.assign(data.url);return}if(data.clientSecret){await openEmbeddedCheckout(data.clientSecret);return}if(res.status===403&&kind==='credits'){const el=document.getElementById('checkoutMsg');if(el){el.innerHTML='追加クレジットはサブスクリプション会員限定です。<br><a href="#monthly" style="color:#9fcaff;text-decoration:underline">サブスクプランを見る →</a>';el.className='checkoutMsg bad';el.style.display='block';clearTimeout(_msgTimer);_msgTimer=setTimeout(()=>el.style.display='none',8000);}}else{showMsg(data.error||'決済を開始できませんでした',true)}}catch(e){showMsg(e.message||'エラーが発生しました',true)}finally{if(btn){btn.disabled=false;btn.textContent=origText}}}
renderPacks();document.getElementById('checkoutModalClose').onclick=closeEmbeddedCheckout;document.getElementById('checkoutModal').addEventListener('click',function(e){if(e.target===this)closeEmbeddedCheckout()});monthlyBtn.onclick=()=>setBilling('monthly');annualBtn.onclick=()=>setBilling('annual');subTab.onclick=()=>setView(false);creditTab.onclick=()=>setView(true);applyHash();window.addEventListener('hashchange',applyHash);
(function(){const d=document.getElementById('drawer');document.getElementById('menuBtn').onclick=()=>d.classList.add('open');document.getElementById('shade').onclick=()=>d.classList.remove('open');document.getElementById('menuClose').onclick=()=>d.classList.remove('open');}());
</script>
</body>
</html>
