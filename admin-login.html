<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>管理者ログイン | FlowVid Studio</title>
<meta name="theme-color" content="#050506" />
<style>
:root{--bg:#050506;--line:rgba(255,255,255,.13);--muted:rgba(255,255,255,.58);--gold:#d7b86a;--cyan:#6ee7f9;--violet:#7c3aed;--red:#fb7185;--ok:#86efac}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{overflow-x:hidden}.bg{position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 18% 0%,rgba(251,113,133,.14),transparent 34%),radial-gradient(circle at 86% 10%,rgba(124,58,237,.20),transparent 36%),linear-gradient(180deg,#050506,#08070d 62%,#030304)}.wrap{position:relative;max-width:430px;margin:0 auto;padding:16px 12px 38px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:38px}.brand{display:flex;gap:10px;align-items:center;color:#fff;text-decoration:none}.logo{width:44px;height:44px;border-radius:17px;background:linear-gradient(135deg,var(--cyan),var(--violet));display:grid;place-items:center;font-weight:950;box-shadow:0 0 50px rgba(124,58,237,.32)}.brand small{display:block;color:rgba(255,255,255,.38);letter-spacing:.24em;font-size:9px}.brand b{font-size:21px}.back{color:#fff;text-decoration:none;border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:999px;padding:10px 13px;font-size:13px}.hero{margin-bottom:18px}.hero p{margin:0 0 9px;color:var(--red);font-size:13px;letter-spacing:.18em}.hero h1{font-size:38px;line-height:1.08;letter-spacing:-.06em;margin:0 0 12px;background:linear-gradient(135deg,#fff,#f5b8c2 52%,#9be7ff);-webkit-background-clip:text;color:transparent}.hero .lead{color:var(--muted);line-height:1.75;font-size:14px}.card{border:1px solid var(--line);border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.03));padding:18px;box-shadow:0 28px 90px rgba(0,0,0,.48),inset 0 1px 0 rgba(255,255,255,.08)}.field{margin-bottom:12px}.field label{display:block;color:rgba(255,255,255,.54);font-size:13px;margin:0 0 7px}.field input{width:100%;border:1px solid var(--line);background:rgba(0,0,0,.42);color:#fff;border-radius:18px;padding:15px 14px;font-size:16px;outline:none}.field input:focus{border-color:rgba(251,113,133,.65)}button{width:100%;border:0;border-radius:20px;padding:16px;background:linear-gradient(90deg,#fff,#f5b8c2,var(--violet));color:#050506;font-weight:950;font-size:16px;margin-top:4px}button:disabled{opacity:.52}.message{display:none;border-radius:18px;padding:12px 13px;line-height:1.6;font-size:13px;margin-top:12px}.message.show{display:block}.message.error{border:1px solid rgba(251,113,133,.35);background:rgba(251,113,133,.10);color:#fecdd3}.message.ok{border:1px solid rgba(134,239,172,.30);background:rgba(134,239,172,.10);color:#dcfce7}.notice{margin-top:12px;border:1px solid rgba(251,113,133,.28);background:rgba(251,113,133,.08);border-radius:18px;padding:12px;color:rgba(255,255,255,.76);line-height:1.65;font-size:12.5px}.secure{display:grid;gap:10px;margin:16px 0}.secure div{border:1px solid var(--line);background:rgba(255,255,255,.04);border-radius:16px;padding:12px;color:rgba(255,255,255,.68);line-height:1.5;font-size:13px}.note{color:rgba(255,255,255,.36);font-size:12px;line-height:1.7;text-align:center;margin-top:14px}
</style>
</head>
<body>
<div class="bg"></div>
<main class="wrap">
<header class="top"><a class="brand" href="./index.html"><div class="logo">▶</div><div><small>AI VIDEO STUDIO</small><b>FlowVid Studio</b></div></a><a class="back" href="./login.html">通常ログイン</a></header>
<section class="hero"><p>ADMIN LOGIN</p><h1>管理者だけが入れる画面。</h1><div class="lead">ユーザー管理、クレジット付与、生成履歴確認、公開サンプル管理用の入口です。</div><div class="secure"><div>✓ 管理者メールだけ許可</div><div>✓ API使用量とクレジット消費を確認</div><div>✓ 実生成ON/OFFを管理</div></div></section>
<section class="card"><form id="adminForm"><div class="field"><label>管理者メールアドレス</label><input id="email" type="email" placeholder="admin@example.com" autocomplete="email" required></div><div class="field"><label>パスワード</label><input id="password" type="password" placeholder="管理者パスワード" autocomplete="current-password" required></div><button id="submitBtn">管理者としてログイン</button><div class="message" id="message"></div><div class="notice">本番ではSupabase Authでログイン後、管理者メールに一致するアカウントだけ admin.html に進めます。</div></form></section>
<p class="note">このページはメニューには出さない管理者専用URLです。</p>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./auth-config.js"></script>
<script>
const cfg=window.FLOWVID_AUTH||{};const ready=Boolean(cfg.supabaseUrl&&cfg.supabaseAnonKey);const client=ready?window.supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey):null;const admins=(cfg.adminEmails||[]).map(x=>String(x).toLowerCase());const email=document.getElementById('email');const password=document.getElementById('password');const btn=document.getElementById('submitBtn');const msg=document.getElementById('message');function setMsg(text,type='error'){msg.textContent=text;msg.className='message show '+type;}function isAdmin(mail){return admins.includes(String(mail||'').toLowerCase())}if(!ready){setMsg('SupabaseのURLとanon keyが未設定です。auth-config.js を設定すると管理者ログインが動きます。');btn.disabled=true;}if(client){client.auth.getSession().then(({data})=>{const mail=data.session?.user?.email;if(mail&&isAdmin(mail)) location.href='./admin.html';});}document.getElementById('adminForm').onsubmit=async(e)=>{e.preventDefault();if(!client)return;const mail=email.value.trim();if(!isAdmin(mail)){setMsg('このメールは管理者として登録されていません。');return;}btn.disabled=true;setMsg('確認中です…','ok');const {data,error}=await client.auth.signInWithPassword({email:mail,password:password.value});btn.disabled=false;if(error){setMsg(error.message);return;}if(!isAdmin(data.user.email)){await client.auth.signOut();setMsg('管理者権限がありません。');return;}location.href='./admin.html';};
</script>
</body>
</html>
