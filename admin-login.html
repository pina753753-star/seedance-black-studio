<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>管理者ログイン | FlowVid Studio</title>
  <meta name="theme-color" content="#050506" />
  <style>
    :root{--bg:#050506;--line:rgba(255,255,255,.13);--muted:rgba(255,255,255,.58);--gold:#d7b86a;--cyan:#6ee7f9;--violet:#7c3aed;--red:#fb7185}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:#fff;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.bg{position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 18% 0%,rgba(251,113,133,.14),transparent 34%),radial-gradient(circle at 86% 10%,rgba(124,58,237,.20),transparent 36%),linear-gradient(180deg,#050506,#08070d 62%,#030304)}.wrap{position:relative;max-width:900px;margin:0 auto;padding:18px 14px 46px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:42px}.brand{display:flex;gap:12px;align-items:center;color:#fff;text-decoration:none}.logo{width:46px;height:46px;border-radius:18px;background:linear-gradient(135deg,var(--cyan),var(--violet));display:grid;place-items:center;font-weight:950;box-shadow:0 0 60px rgba(124,58,237,.32)}.brand small{display:block;color:rgba(255,255,255,.38);letter-spacing:.24em;font-size:10px}.brand b{font-size:22px}.top a.back{color:#fff;text-decoration:none;border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:999px;padding:10px 13px;font-size:13px}.layout{display:grid;gap:16px}.hero p{margin:0 0 9px;color:var(--red);font-size:13px;letter-spacing:.18em}.hero h1{font-size:42px;line-height:1.08;letter-spacing:-.06em;margin:0 0 14px;background:linear-gradient(135deg,#fff,#f5b8c2 52%,#9be7ff);-webkit-background-clip:text;color:transparent}.hero .lead{color:var(--muted);line-height:1.85;font-size:15px}.card{border:1px solid var(--line);border-radius:30px;background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.03));padding:18px;box-shadow:0 28px 90px rgba(0,0,0,.48),inset 0 1px 0 rgba(255,255,255,.08)}.form{display:grid;gap:12px}.field label{display:block;color:rgba(255,255,255,.54);font-size:13px;margin:0 0 7px}.field input{width:100%;border:1px solid var(--line);background:rgba(0,0,0,.42);color:#fff;border-radius:18px;padding:15px 14px;font-size:16px;outline:none}.field input:focus{border-color:rgba(251,113,133,.65)}.primary{width:100%;border:0;border-radius:20px;padding:16px;background:linear-gradient(90deg,#fff,#f5b8c2,var(--violet));color:#050506;font-weight:950;font-size:16px;margin-top:4px}.notice{border:1px solid rgba(251,113,133,.28);background:rgba(251,113,133,.08);border-radius:20px;padding:13px;color:rgba(255,255,255,.76);line-height:1.65;font-size:13px}.secure{display:grid;gap:10px;margin-top:16px}.secure div{border:1px solid var(--line);background:rgba(255,255,255,.04);border-radius:18px;padding:14px;color:rgba(255,255,255,.68);line-height:1.6;font-size:14px}.note{color:rgba(255,255,255,.36);font-size:12px;line-height:1.7;text-align:center;margin-top:14px}@media(min-width:820px){.layout{grid-template-columns:.95fr 1.05fr;align-items:start}.hero h1{font-size:56px}}@media(max-width:430px){.wrap{padding:16px 12px 38px}.brand b{font-size:21px}.hero h1{font-size:38px}.card{border-radius:27px}}
  </style>
</head>
<body>
  <div class="bg"></div>
  <main class="wrap">
    <header class="top"><a class="brand" href="./index.html"><div class="logo">▶</div><div><small>AI VIDEO STUDIO</small><b>FlowVid Studio</b></div></a><a class="back" href="./index.html">トップへ</a></header>
    <section class="layout">
      <div class="hero"><p>ADMIN LOGIN</p><h1>管理者だけが入れる画面。</h1><div class="lead">API利用量、ユーザー、クレジット、決済、無料生成の開放状況を確認するための運営者ログインです。</div><div class="secure"><div>✓ 管理者メールだけ許可</div><div>✓ 2段階認証を前提</div><div>✓ 実生成ON/OFFを管理</div><div>✓ API使用量とクレジット消費を確認</div></div></div>
      <div class="card"><form class="form" onsubmit="event.preventDefault(); alert('静的プレビューです。本番では管理者認証を接続します。');"><div class="field"><label>管理者メールアドレス</label><input type="email" placeholder="admin@example.com" autocomplete="email"></div><div class="field"><label>パスワード</label><input type="password" placeholder="管理者パスワード" autocomplete="current-password"></div><div class="field"><label>2段階認証コード</label><input inputmode="numeric" placeholder="123456"></div><button class="primary">管理者としてログイン</button><div class="notice">本番では、一般ユーザーのログインとは分けて、管理者権限を持つアカウントだけが入れるようにします。</div></form></div>
    </section>
    <p class="note">管理画面は、APIを勝手に使われないための重要な安全装置です。</p>
  </main>
</body>
</html>
