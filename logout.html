  <meta name="theme-color" content="#050506" />
  <style>
    html,body{margin:0;min-height:100%;background:#050506;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:grid;place-items:center;text-align:center}.box{padding:28px;max-width:360px}.logo{width:58px;height:58px;border-radius:22px;background:linear-gradient(135deg,#6ee7f9,#7c3aed);display:grid;place-items:center;margin:0 auto 18px;font-weight:900}.muted{color:rgba(255,255,255,.56);line-height:1.7}.btn{display:inline-block;margin-top:18px;color:#050506;background:linear-gradient(90deg,#fff,#e2c978,#7c3aed);text-decoration:none;border-radius:18px;padding:14px 20px;font-weight:950}
  </style>
</head>
<body>
  <main class="box">
    <div class="logo">▶</div>
    <h1>ログアウト中です</h1>
    <p class="muted">セッションを終了してトップページへ戻ります。</p>
    <a class="btn" href="./index.html">トップへ戻る</a>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./auth-config.js?v=4a1f0c1"></script>
  <script>
    (async()=>{
      try{
        const client=window.flowvidSupabaseClient?window.flowvidSupabaseClient():null;
        if(client){
          await client.auth.signOut();
        }
      }catch(e){}
      const clearKeys=['flowvidGenerateDraft','flowvidHistory','flowvidLastSeedanceJobId','flowvidLastSeedancePollingUrl','flowvidLastSeedancePrompt','flowvidLastSeedanceMode','flowvidGenerateMode','flowvidDeviceId','flowvidFavoriteJobs','flowvidHiddenVideos','plan','flowvidPlan'];
      clearKeys.forEach(k=>localStorage.removeItem(k));
      setTimeout(()=>{location.href='./index.html'},500);
    })();
  </script>
</body>
