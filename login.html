  <style>
    :root{--bg:#050506;--line:rgba(255,255,255,.13);--muted:rgba(255,255,255,.58);--gold:#d7b86a;--cyan:#6ee7f9;--violet:#7c3aed;--pink:#f0abfc;--danger:#fb7185;--ok:#86efac}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:#fff;font-family:'Noto Sans JP',ui-sans-serif,system-ui,sans-serif}body{overflow-x:hidden;background:#000}.bg{position:fixed;inset:0;pointer-events:none}.wrap{position:relative;max-width:900px;margin:0 auto;padding:18px 14px 46px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:42px}.brand{display:flex;gap:12px;align-items:center;color:#fff;text-decoration:none}.logo{width:46px;height:46px;border-radius:18px;background:linear-gradient(135deg,var(--cyan),var(--violet));display:grid;place-items:center;font-weight:950;box-shadow:0 0 60px rgba(124,58,237,.32)}.brand small{display:block;color:rgba(255,255,255,.38);letter-spacing:.24em;font-size:10px}.brand b{font-size:22px}.top a.back{color:#fff;text-decoration:none;border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:999px;padding:10px 13px;font-size:13px}.layout{display:grid;gap:16px}.hero{padding:4px 2px}.hero p{margin:0 0 9px;color:var(--gold);font-size:13px;letter-spacing:.18em}.hero h1{font-size:42px;line-height:1.08;letter-spacing:-.06em;margin:0 0 14px;background:linear-gradient(135deg,#fff,#f0dfb0 55%,#9be7ff);-webkit-background-clip:text;color:transparent}.hero .lead{color:var(--muted);line-height:1.85;font-size:15px}.card{border:1px solid var(--line);border-radius:30px;background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.03));padding:18px;box-shadow:0 28px 90px rgba(0,0,0,.48),inset 0 1px 0 rgba(255,255,255,.08)}.tabs{display:grid;grid-template-columns:1fr 1fr;background:rgba(0,0,0,.34);border:1px solid var(--line);border-radius:20px;padding:6px;margin-bottom:18px}.tab{border:0;border-radius:15px;background:transparent;color:rgba(255,255,255,.48);font-weight:900;padding:13px}.tab.active{background:#fff;color:#050506}.form{display:grid;gap:12px}.field label{display:block;color:rgba(255,255,255,.54);font-size:13px;margin:0 0 7px}.field input{width:100%;border:1px solid var(--line);background:rgba(0,0,0,.42);color:#fff;border-radius:18px;padding:15px 14px;font-size:16px;outline:none}.field input:focus{border-color:rgba(215,184,106,.65)}.primary{width:100%;border:0;border-radius:20px;padding:16px;background:linear-gradient(90deg,#fff,#e2c978,var(--violet));color:#050506;font-weight:950;font-size:16px;margin-top:4px}.primary:disabled,.ghost:disabled{opacity:.52}.ghost{width:100%;border:1px solid var(--line);border-radius:20px;padding:15px;background:rgba(255,255,255,.05);color:#fff;font-weight:900;text-align:center}.or{display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.38);font-size:12px;margin:4px 0}.or:before,.or:after{content:"";height:1px;background:var(--line);flex:1}.message{display:none;border-radius:18px;padding:12px 13px;line-height:1.6;font-size:13px}.message.show{display:block}.message.error{border:1px solid rgba(251,113,133,.35);background:rgba(251,113,133,.10);color:#fecdd3}.message.ok{border:1px solid rgba(134,239,172,.30);background:rgba(134,239,172,.10);color:#dcfce7}.notice{border:1px solid rgba(215,184,106,.26);background:rgba(215,184,106,.08);border-radius:20px;padding:13px;color:rgba(255,255,255,.72);line-height:1.65;font-size:13px}.secure{display:grid;gap:10px;margin-top:16px}.secure div{border:1px solid var(--line);background:rgba(255,255,255,.04);border-radius:18px;padding:14px;color:rgba(255,255,255,.68);line-height:1.6;font-size:14px}.note{color:rgba(255,255,255,.36);font-size:12px;line-height:1.7;text-align:center;margin-top:14px}@media(min-width:820px){.layout{grid-template-columns:.95fr 1.05fr;align-items:start}.hero h1{font-size:58px}}@media(max-width:430px){.wrap{padding:16px 12px 38px}.brand b{font-size:21px}.hero h1{font-size:38px}.card{border-radius:27px}}
  </style>
</head>
<body>
  <div class="bg"></div>
  <main class="wrap">
    <header class="top"><a class="brand" href="./index.html"><img src="/logo.png" alt="FlowVid Studio" style="height:auto;width:120px;display:block"></a><a class="back" href="./index.html">トップへ</a></header>
    <section class="layout">
      <div class="hero"><p>LOGIN</p><h1>生成するにはログインが必要です。</h1></div>
      <div class="card">
        <div class="tabs"><button class="tab active" id="loginTab">ログイン</button><button class="tab" id="signupTab">新規登録</button></div>
        <form class="form" id="authForm">
          <div class="field"><label>メールアドレス</label><input id="email" type="email" placeholder="you@example.com" autocomplete="email" required></div>
          <div class="field"><label>パスワード</label><input id="password" type="password" placeholder="8文字以上" autocomplete="current-password" required></div>
          <button class="primary" id="submitBtn">ログインする</button>
          <div class="message" id="message"></div>
        </form>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./auth-config.js?v=4a1f0c1"></script>
  <script>
    let mode='login';
    const loginTab=document.getElementById('loginTab');
    const signupTab=document.getElementById('signupTab');
    const submitBtn=document.getElementById('submitBtn');
    const form=document.getElementById('authForm');
    const email=document.getElementById('email');
    const password=document.getElementById('password');
    const message=document.getElementById('message');
    const cfg=window.FLOWVID_AUTH||{};
    const client=window.flowvidSupabaseClient?window.flowvidSupabaseClient():null;
    const authReady=Boolean(client);
    function setMessage(text,type='error'){message.textContent=text;message.className='message show '+type;}
    function authMessage(text){
      const raw=String(text||'');
      if(/security purposes|30 seconds|rate limit|too many/i.test(raw)) return '短時間に複数回送信されました。30秒ほど待ってからもう一度お試しください。';
      if(/invalid login credentials/i.test(raw)) return 'メールアドレスまたはパスワードが違います。';
      if(/email rate limit exceeded/i.test(raw)) return '確認メールの送信回数が多すぎます。少し待ってからもう一度お試しください。';
      if(/user already registered|already exists/i.test(raw)) return 'このメールアドレスはすでに登録されています。ログインを試してください。';
      if(/password/i.test(raw)) return 'パスワードは8文字以上で入力してください。';
      return raw || '認証エラーが発生しました。';
    }
    function setMode(next){mode=next;loginTab.classList.toggle('active',mode==='login');signupTab.classList.toggle('active',mode==='signup');submitBtn.textContent=mode==='login'?'ログインする':'アカウント作成';password.autocomplete=mode==='login'?'current-password':'new-password';}
    loginTab.onclick=()=>setMode('login');
    signupTab.onclick=()=>setMode('signup');
    if(!authReady){setMessage('ログイン接続は未設定です。SupabaseのURLと公開可能キーを読み込めていません。数分待って再読み込みしてください。','error');submitBtn.disabled=true;}
    if(client){client.auth.getSession().then(({data})=>{if(data.session) location.href='./profile.html';});}
    form.onsubmit=async(e)=>{e.preventDefault();if(!client)return;submitBtn.disabled=true;setMessage('処理中です…','ok');const mail=email.value.trim();const pass=password.value;let result;if(mode==='login'){result=await client.auth.signInWithPassword({email:mail,password:pass});}else{result=await client.auth.signUp({email:mail,password:pass,options:{emailRedirectTo:location.origin+'/profile.html'}});}submitBtn.disabled=false;if(result.error){setMessage(authMessage(result.error.message),'error');return;}if(mode==='signup'){setMessage('確認メールを送りました。メール内のリンクを開いてログインしてください。','ok');return;}location.href='./profile.html';};
  </script>
</body>
</html>
