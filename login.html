<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ログイン | FlowVid Studio</title>
  <meta name="theme-color" content="#050506" />
  <style>
    :root{--bg:#050506;--line:rgba(255,255,255,.13);--muted:rgba(255,255,255,.58);--gold:#d7b86a;--cyan:#6ee7f9;--violet:#7c3aed;--pink:#f0abfc}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:#fff;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{overflow-x:hidden}.bg{position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 18% 0%,rgba(110,231,249,.13),transparent 34%),radial-gradient(circle at 86% 10%,rgba(124,58,237,.20),transparent 36%),linear-gradient(180deg,#050506,#070810 62%,#030304)}.wrap{position:relative;max-width:900px;margin:0 auto;padding:18px 14px 46px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:42px}.brand{display:flex;gap:12px;align-items:center;color:#fff;text-decoration:none}.logo{width:46px;height:46px;border-radius:18px;background:linear-gradient(135deg,var(--cyan),var(--violet));display:grid;place-items:center;font-weight:950;box-shadow:0 0 60px rgba(124,58,237,.32)}.brand small{display:block;color:rgba(255,255,255,.38);letter-spacing:.24em;font-size:10px}.brand b{font-size:22px}.top a.back{color:#fff;text-decoration:none;border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:999px;padding:10px 13px;font-size:13px}.layout{display:grid;gap:16px}.hero{padding:4px 2px}.hero p{margin:0 0 9px;color:var(--gold);font-size:13px;letter-spacing:.18em}.hero h1{font-size:42px;line-height:1.08;letter-spacing:-.06em;margin:0 0 14px;background:linear-gradient(135deg,#fff,#f0dfb0 55%,#9be7ff);-webkit-background-clip:text;color:transparent}.hero .lead{color:var(--muted);line-height:1.85;font-size:15px}.card{border:1px solid var(--line);border-radius:30px;background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.03));padding:18px;box-shadow:0 28px 90px rgba(0,0,0,.48),inset 0 1px 0 rgba(255,255,255,.08)}.tabs{display:grid;grid-template-columns:1fr 1fr;background:rgba(0,0,0,.34);border:1px solid var(--line);border-radius:20px;padding:6px;margin-bottom:18px}.tab{border:0;border-radius:15px;background:transparent;color:rgba(255,255,255,.48);font-weight:900;padding:13px}.tab.active{background:#fff;color:#050506}.form{display:grid;gap:12px}.field label{display:block;color:rgba(255,255,255,.54);font-size:13px;margin:0 0 7px}.field input{width:100%;border:1px solid var(--line);background:rgba(0,0,0,.42);color:#fff;border-radius:18px;padding:15px 14px;font-size:16px;outline:none}.field input:focus{border-color:rgba(215,184,106,.65)}.primary{width:100%;border:0;border-radius:20px;padding:16px;background:linear-gradient(90deg,#fff,#e2c978,var(--violet));color:#050506;font-weight:950;font-size:16px;margin-top:4px}.ghost{width:100%;border:1px solid var(--line);border-radius:20px;padding:15px;background:rgba(255,255,255,.05);color:#fff;font-weight:900}.or{display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.38);font-size:12px;margin:4px 0}.or:before,.or:after{content:"";height:1px;background:var(--line);flex:1}.notice{border:1px solid rgba(215,184,106,.26);background:rgba(215,184,106,.08);border-radius:20px;padding:13px;color:rgba(255,255,255,.72);line-height:1.65;font-size:13px}.secure{display:grid;gap:10px;margin-top:16px}.secure div{border:1px solid var(--line);background:rgba(255,255,255,.04);border-radius:18px;padding:14px;color:rgba(255,255,255,.68);line-height:1.6;font-size:14px}.note{color:rgba(255,255,255,.36);font-size:12px;line-height:1.7;text-align:center;margin-top:14px}@media(min-width:820px){.layout{grid-template-columns:.95fr 1.05fr;align-items:start}.hero h1{font-size:58px}}@media(max-width:430px){.wrap{padding:16px 12px 38px}.brand b{font-size:21px}.hero h1{font-size:38px}.card{border-radius:27px}}
  </style>
</head>
<body>
  <div class="bg"></div>
  <main class="wrap">
    <header class="top"><a class="brand" href="./index.html"><div class="logo">▶</div><div><small>AI VIDEO STUDIO</small><b>FlowVid Studio</b></div></a><a class="back" href="./index.html">トップへ</a></header>
    <section class="layout">
      <div class="hero"><p>LOGIN</p><h1>生成するにはログインが必要です。</h1><div class="lead">クレジット管理、生成履歴、決済、API利用上限を守るため、動画生成はログイン後に使う設計にします。</div><div class="secure"><div>✓ ゲストは画面確認のみ</div><div>✓ 初回無料生成はログイン後に1回だけ</div><div>✓ 本番APIはクレジット残高を確認してから実行</div></div></div>
      <div class="card">
        <div class="tabs"><button class="tab active" id="loginTab">ログイン</button><button class="tab" id="signupTab">新規登録</button></div>
        <form class="form" onsubmit="event.preventDefault(); alert('静的プレビューです。本番では認証機能を接続します。');">
          <div class="field"><label>メールアドレス</label><input type="email" placeholder="you@example.com" autocomplete="email"></div>
          <div class="field"><label>パスワード</label><input type="password" placeholder="8文字以上" autocomplete="current-password"></div>
          <button class="primary" id="submitBtn">ログインする</button>
          <div class="or">または</div>
          <button type="button" class="ghost">Googleで続ける</button>
          <button type="button" class="ghost">GitHubで続ける</button>
          <div class="notice">これは静的プレビューです。実際のログイン、アカウント作成、パスワード保存は本番実装でSupabase/Auth.jsなどを接続します。</div>
        </form>
      </div>
    </section>
    <p class="note">勝手な課金を防ぐため、本番ではログイン・クレジット残高・生成確認を通してからAPIに送信します。</p>
  </main>
  <script>
    const loginTab=document.getElementById('loginTab');
    const signupTab=document.getElementById('signupTab');
    const submitBtn=document.getElementById('submitBtn');
    loginTab.onclick=()=>{loginTab.classList.add('active');signupTab.classList.remove('active');submitBtn.textContent='ログインする'};
    signupTab.onclick=()=>{signupTab.classList.add('active');loginTab.classList.remove('active');submitBtn.textContent='アカウント作成'};
  </script>
</body>
</html>
