.active{background:#fff;color:#050506}.form{display:grid;gap:12px}.field label{display:block;color:rgba(255,255,255,.54);font-size:13px;margin:0 0 7px}.field input{width:100%;border:1px solid var(--line);background:rgba(0,0,0,.42);color:#fff;border-radius:18px;padding:15px 14px;font-size:16px;outline:none}.field input:focus{border-color:rgba(215,184,106,.65)}.field[hidden]{display:none}.fieldHint{margin:7px 2px 0;color:rgba(255,255,255,.42);font-size:12px;line-height:1.6}.primary{width:100%;border:0;border-radius:20px;padding:16px;background:linear-gradient(90deg,#fff,#e2c978,var(--violet));color:#050506;font-weight:950;font-size:16px;margin-top:4px}.primary:disabled,.ghost:disabled{opacity:.52}.ghost{width:100%;border:1px solid var(--line);border-radius:20px;padding:15px;background:rgba(255,255,255,.05);color:#fff;font-weight:900;text-align:center}.or{display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.38);font-size:12px;margin:4px 0}.or:before,.or:after{content:"";height:1px;background:var(--line);flex:1}.message{display:none;border-radius:18px;padding:12px 13px;line-height:1.6;font-size:13px}.message.show{display:block}.message.error{border:1px solid rgba(251,113,133,.35);background:rgba(251,113,133,.10);color:#fecdd3}.message.ok{border:1px solid rgba(134,239,172,.30);background:rgba(134,239,172,.10);color:#dcfce7}.notice{border:1px solid rgba(215,184,106,.26);background:rgba(215,184,106,.08);border-radius:20px;padding:13px;color:rgba(255,255,255,.72);line-height:1.65;font-size:13px}.secure{display:grid;gap:10px;margin-top:16px}.secure div{border:1px solid var(--line);background:rgba(255,255,255,.04);border-radius:18px;padding:14px;color:rgba(255,255,255,.68);line-height:1.6;font-size:14px}.note{color:rgba(255,255,255,.36);font-size:12px;line-height:1.7;text-align:center;margin-top:14px}@media(min-width:820px){.layout{grid-template-columns:.95fr 1.05fr;align-items:start}.hero h1{font-size:58px}}@media(max-width:430px){.wrap{padding:16px 12px 38px}.brand b{font-size:21px}.hero h1{font-size:38px}.card{border-radius:27px}}

<body>
  <div class="bg"></div>
  <main class="wrap">
    <header class="top"><a class="brand" href="./index.html"><img src="/logo.png" alt="FlowVid Studio" style="height:auto;width:120px;display:block"></a><a class="back" href="./index.html">トップへ</a></header>
    <section class="layout">
      <div class="hero"><p>LOGIN</p><h1>生成するにはログインが必要です。</h1></div>
      <div class="card">
        <div class="tabs"><button class="tab active" id="loginTab">ログイン</button><button class="tab" id="signupTab">新規登録</button></div>
        <form class="form" id="authForm">
          <div class="field"><label>メールアドレス</label><input id="email" type="email" placeholder="you@example.com" autocomplete="email" required></div>
          <div class="field"><label>パスワード</label><input id="password" type="password" placeholder="8文字以上" autocomplete="current-password" required></div>
          <div class="field" id="birthDateField" hidden>
            <label for="birthDate">生年月日</label>
            <input id="birthDate" type="date" autocomplete="bday">
            <p class="fieldHint">18歳未満の方は登録できません。</p>
          </div>
          <button class="primary" id="submitBtn">ログインする</button>
          <div class="message" id="message"></div>
        </form>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./auth-config.js?v=4a1f0c1"></script>
  <script>
    let mode='login';
    const loginTab=document.getElementById('loginTab');
    const signupTab=document.getElementById('signupTab');
    const submitBtn=document.getElementById('submitBtn');
    const form=document.getElementById('authForm');
    const email=document.getElementById('email');
    const password=document.getElementById('password');
    const birthDateField=document.getElementById('birthDateField');
    const birthDate=document.getElementById('birthDate');
    const message=document.getElementById('message');
    const cfg=window.FLOWVID_AUTH||{};
    const client=window.flowvidSupabaseClient?window.flowvidSupabaseClient():null;
    const authReady=Boolean(client);
    function setMessage(text,type='error'){message.textContent=text;message.className='message show '+type;}
    function clearMessage(){message.textContent='';message.className='message';}
    function formatDateParts(parts){
      const year=String(parts.year).padStart(4,'0');
      const month=String(parts.month).padStart(2,'0');
      const day=String(parts.day).padStart(2,'0');
      return `${year}-${month}-${day}`;
    }
    function getTokyoToday(now=new Date()){
      const parts=new Intl.DateTimeFormat('en-CA',{
        timeZone:'Asia/Tokyo',
        year:'numeric',
        month:'2-digit',
        day:'2-digit'
      }).formatToParts(now);
      const values={};
      for(const part of parts){
        if(part.type==='year'||part.type==='month'||part.type==='day'){
          values[part.type]=Number(part.value);
        }
      }
      if(!values.year||!values.month||!values.day){
        throw new Error('日本時間の日付を取得できませんでした。');
      }
      return values;
    }
    function getAdultCutoffDate(today=getTokyoToday()){
      const cutoffDay=today.month===2&&today.day===29?28:today.day;
      return formatDateParts({year:today.year-18,month:today.month,day:cutoffDay});
    }
    function isLeapYear(year){
      return year%4===0&&(year%100!==0||year%400===0);
    }
    function daysInMonth(year,month){
      if(month===2)return isLeapYear(year)?29:28;
      return [4,6,9,11].includes(month)?30:31;
    }
    function parseBirthDate(value){
      const match=/^(\d{4})-(\d{2})-(\d{2})$/.exec(String(value||''));
      if(!match)return null;
      const year=Number(match[1]);
      const month=Number(match[2]);
      const day=Number(match[3]);
      if(month<1||month>12||day<1||day>daysInMonth(year,month))return null;
      return {year,month,day,value:formatDateParts({year,month,day})};
    }
    function calculateFullAge(value,today=getTokyoToday()){
      const parsed=parseBirthDate(value);
      if(!parsed)return null;
      let age=today.year-parsed.year;
      const beforeBirthday=today.month<parsed.month||(today.month===parsed.month&&today.day<parsed.day);
      if(beforeBirthday)age-=1;
      return age;
    }
    function authMessage(text){
      const raw=String(text||'');
      if(/birth date is required/i.test(raw)) return '生年月日を入力してください。';
      if(/invalid birth date/i.test(raw)) return '正しい生年月日を入力してください。';
      if(/at least 18 years old/i.test(raw)) return '18歳未満の方は登録できません。';
      if(/age verification unavailable/i.test(raw)) return '年齢確認を完了できませんでした。時間をおいてもう一度お試しください。';
      if(/security purposes|30 seconds|rate limit|too many/i.test(raw)) return '短時間に複数回送信されました。30秒ほど待ってからもう一度お試しください。';
      if(/invalid login credentials/i.test(raw)) return 'メールアドレスまたはパスワードが違います。';
      if(/email rate limit exceeded/i.test(raw)) return '確認メールの送信回数が多すぎます。少し待ってからもう一度お試しください。';
      if(/user already registered|already exists/i.test(raw)) return 'このメールアドレスはすでに登録されています。ログインを試してください。';
      if(/password/i.test(raw)) return 'パスワードは8文字以上で入力してください。';
      return raw || '認証エラーが発生しました。';
    }
    function setMode(next){
      mode=next;
      const isSignup=mode==='signup';
      loginTab.classList.toggle('active',!isSignup);
      signupTab.classList.toggle('active',isSignup);
      submitBtn.textContent=isSignup?'アカウント作成':'ログインする';
      password.autocomplete=isSignup?'new-password':'current-password';
      birthDateField.hidden=!isSignup;
      birthDate.required=isSignup;
      try{
        birthDate.max=getAdultCutoffDate();
      }catch(error){
        birthDate.removeAttribute('max');
      }
      if(!isSignup)birthDate.value='';
      clearMessage();
    }
    loginTab.onclick=()=>setMode('login');
    signupTab.onclick=()=>setMode('signup');
    if(!authReady){setMessage('ログイン接続は未設定です。SupabaseのURLと公開可能キーを読み込めていません。数分待って再読み込みしてください。','error');submitBtn.disabled=true;}
    if(client){client.auth.getSession().then(({data})=>{if(data.session) location.href='./profile.html';});}
    form.onsubmit=async(e)=>{
      e.preventDefault();
      if(!client)return;
      clearMessage();
      const mail=email.value.trim();
      const pass=password.value;
      let result;
      if(mode==='signup'){
        const value=birthDate.value;
        const parsed=parseBirthDate(value);
        if(!value){setMessage('生年月日を入力してください。','error');birthDate.focus();return;}
        if(!parsed){setMessage('正しい生年月日を入力してください。','error');birthDate.focus();return;}
        let today;
        try{
          today=getTokyoToday();
        }catch(error){
          setMessage('年齢確認を完了できませんでした。時間をおいてもう一度お試しください。','error');
          return;
        }
        if(parsed.value>formatDateParts(today)){setMessage('未来の日付は生年月日として使用できません。','error');birthDate.focus();return;}
        const age=calculateFullAge(value,today);
        if(age===null){setMessage('正しい生年月日を入力してください。','error');birthDate.focus();return;}
        if(age<18){setMessage('18歳未満の方は登録できません。','error');birthDate.focus();return;}
      }
      submitBtn.disabled=true;
      try{
        if(mode==='login'){
          result=await client.auth.signInWithPassword({email:mail,password:pass});
        }else{
          result=await client.auth.signUp({
            email:mail,
            password:pass,
            options:{emailRedirectTo:location.origin+'/profile.html',data:{birth_date:birthDate.value}}
          });
        }
      }catch(error){
        result={error:{message:error?.message||'認証エラーが発生しました。'}};
      }finally{
        submitBtn.disabled=false;
      }
      if(result.error){setMessage(authMessage(result.error.message),'error');return;}
      if(mode==='signup'){
        setMessage('確認メールを送りました。メール内のリンクを開いてログインしてください。','ok');
        return;
      }
      location.href='./profile.html';
    };
  </script>
</body>
