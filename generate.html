<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<title>生成 | FlowVid Studio</title>
<meta name="theme-color" content="#05080c">
<style>
:root{--bg:#05080c;--line:rgba(255,255,255,.12);--muted:rgba(255,255,255,.58);--gold:#d7b86a;--violet:#7c3aed;--cyan:#6ee7f9;--bad:#fecdd3;--ok:#dcfce7}*{box-sizing:border-box}html,body{margin:0;min-height:100%;overflow-x:hidden;background:var(--bg);color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{background:radial-gradient(circle at 12% -10%,rgba(110,231,249,.16),transparent 34%),radial-gradient(circle at 92% 0%,rgba(124,58,237,.24),transparent 34%),linear-gradient(180deg,#05080c,#071018 56%,#030507)}button,input,select,textarea{font:inherit}.wrap{max-width:760px;margin:0 auto;padding:18px 12px 128px}.top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px}.brand{display:flex;align-items:center;gap:10px;color:#fff;text-decoration:none}.logo{width:48px;height:48px;border-radius:18px;background:linear-gradient(135deg,#fff,var(--cyan),var(--violet));display:grid;place-items:center;color:#050506;font-weight:1000}.brand small{display:block;color:rgba(255,255,255,.38);letter-spacing:.22em;font-size:9px}.brand b{font-size:22px;letter-spacing:-.03em}.back{color:#fff;text-decoration:none;border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:999px;padding:11px 14px;font-weight:900}.modeTabs{display:grid;grid-template-columns:repeat(3,1fr);background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:22px;padding:4px;margin:12px 0 14px;position:sticky;top:6px;z-index:7;backdrop-filter:blur(18px)}.modeTabs button{border:0;background:transparent;color:rgba(255,255,255,.5);border-radius:18px;padding:13px 4px;font-weight:950;white-space:nowrap}.modeTabs button.active{background:rgba(255,255,255,.14);color:#fff}.composer,.resultCard,.historyCard{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.035));border-radius:28px;padding:16px;box-shadow:0 24px 90px rgba(0,0,0,.42)}.assetRow{display:flex;gap:10px;overflow:auto;margin-bottom:12px}.assetTile{min-width:168px;height:132px;border:1px dashed rgba(255,255,255,.22);background:rgba(0,0,0,.25);border-radius:18px;color:rgba(255,255,255,.72);display:grid;place-items:center;text-align:center;font-weight:900;position:relative;overflow:hidden}.assetTile input{position:absolute;inset:0;opacity:0}.assetTile img{width:100%;height:100%;object-fit:cover}.assetTile span{display:block;font-size:30px}.assetHint{min-width:190px;height:132px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.035);border-radius:18px;padding:14px;color:rgba(255,255,255,.62);font-size:12px;line-height:1.55}.previews{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:2px 0 12px}.preview{border:1px solid rgba(255,255,255,.1);background:#050506;border-radius:16px;overflow:hidden}.preview img{width:100%;height:132px;object-fit:contain;background:#000;display:block}.preview small{display:block;padding:8px;color:rgba(255,255,255,.62);font-size:11px;word-break:break-all}.promptBox{position:relative;background:rgba(0,0,0,.34);border:1px solid rgba(255,255,255,.08);border-radius:20px;overflow:hidden}.promptBox textarea{display:block;width:100%;min-height:176px;border:0;background:transparent;color:#fff;padding:17px 16px 54px;font-size:16px;line-height:1.65;resize:vertical;outline:0}.promptBox textarea::placeholder{color:rgba(255,255,255,.36)}.promptTools{position:absolute;left:10px;right:10px;bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px}.toolLink{border:0;background:transparent;color:rgba(255,255,255,.72);font-weight:850;padding:8px}.sampleBtn{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:#fff;border-radius:999px;padding:8px 11px;font-weight:900}.settings{margin-top:14px;border:1px solid var(--line);background:rgba(255,255,255,.055);border-radius:20px;overflow:hidden}.settings summary{list-style:none;display:flex;align-items:center;justify-content:space-between;padding:16px;font-weight:950;cursor:pointer}.settings summary::-webkit-details-marker{display:none}.settings summary:after{content:'⌄';font-size:22px}.settings[open] summary:after{transform:rotate(180deg)}.settingsBody{padding:0 14px 14px;display:grid;gap:10px}.field label{display:block;color:var(--muted);font-size:12px;margin:0 0 6px;font-weight:850}.field select{width:100%;border:1px solid rgba(255,255,255,.12);background:#090c11;color:#fff;border-radius:14px;padding:12px}.status{display:none;white-space:pre-wrap;border:1px solid rgba(134,239,172,.24);background:rgba(134,239,172,.08);color:var(--ok);border-radius:16px;padding:12px;margin-top:12px;font-size:12px;line-height:1.6;word-break:break-word}.status.show{display:block}.status.bad{border-color:rgba(251,113,133,.35);background:rgba(251,113,133,.10);color:var(--bad)}.jobBox{display:none;margin-top:12px;border:1px solid rgba(215,184,106,.32);background:rgba(215,184,106,.08);border-radius:16px;padding:12px}.jobBox.show{display:block}.jobBox b{display:block;margin-bottom:6px}.jobBox code{display:block;word-break:break-all;color:#f8e7b5;font-size:12px}.resultCard{display:none;margin-top:14px;background:linear-gradient(180deg,rgba(20,83,45,.28),rgba(255,255,255,.035))}.resultCard.show{display:block}.resultCard h2{margin:0 0 10px;font-size:18px}.resultCard video{width:100%;aspect-ratio:9/16;max-height:72vh;background:#000;border-radius:18px;display:block}.resultCard a{display:block;margin-top:10px;color:#dcfce7;word-break:break-all;font-weight:900}.sectionTitle{display:flex;align-items:center;justify-content:space-between;margin:22px 2px 10px}.sectionTitle h2{margin:0;font-size:18px}.sectionTitle button{border:1px solid var(--line);background:rgba(255,255,255,.06);color:#fff;border-radius:14px;padding:9px 11px;font-weight:900}.history{display:grid;gap:12px}.historyCard{padding:13px;border-radius:24px}.historyTop{display:flex;align-items:center;justify-content:space-between;gap:10px}.historyTop b{font-size:14px}.pill{border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.18);border-radius:999px;padding:5px 8px;color:rgba(255,255,255,.72);font-size:11px;font-weight:900}.historyCard video{margin-top:10px;width:100%;max-height:300px;background:#000;border-radius:16px}.historyCard p{color:rgba(255,255,255,.62);font-size:13px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.empty{border:1px dashed var(--line);border-radius:20px;padding:18px;text-align:center;color:var(--muted);line-height:1.6}.dock{position:fixed;left:0;right:0;bottom:0;z-index:20;padding:12px 12px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(5,8,12,0),rgba(5,8,12,.92) 28%,#05080c);backdrop-filter:blur(18px)}.dockInner{max-width:760px;margin:0 auto;display:grid;gap:8px}.createBtn{width:100%;border:0;border-radius:22px;padding:17px 14px;font-weight:1000;color:#050506;background:linear-gradient(90deg,#fff,#d7b86a,#8b5cf6);font-size:17px}.createBtn:disabled{opacity:.55}.miniStatus{display:flex;align-items:center;justify-content:space-between;gap:8px;color:rgba(255,255,255,.48);font-size:12px}.miniPill{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(134,239,172,.26);background:rgba(134,239,172,.09);color:#dcfce7;border-radius:999px;padding:7px 9px;font-size:12px;font-weight:900}.miniPill.bad{border-color:rgba(251,113,133,.32);background:rgba(251,113,133,.1);color:var(--bad)}@media(min-width:720px){.settingsBody{grid-template-columns:1fr 1fr}.previews{grid-template-columns:repeat(3,1fr)}}@media(max-width:430px){.brand b{font-size:21px}.modeTabs button{font-size:13px}.composer{padding:13px;border-radius:24px}.promptBox textarea{min-height:170px}.previews{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="wrap">
<header class="top"><a class="brand" href="./index.html"><div class="logo">▶</div><div><small>AI VIDEO STUDIO</small><b>FlowVid Studio</b></div></a><a class="back" href="./index.html">ホーム</a></header>
<div class="modeTabs" role="tablist"><button class="active" data-mode="reference_to_video">リファレンス</button><button data-mode="image_to_video">画像から動画</button><button data-mode="text_to_video">テキストから動画</button></div>
<section class="composer"><div class="assetRow" id="assetRow"><label class="assetTile"><input id="assetInput" type="file" accept="image/png,image/jpeg,image/webp" multiple><div id="assetEmpty"><span>＋</span><span id="assetLabel">画像を選択</span></div><img id="assetPreview" alt="" style="display:none"></label><div class="assetHint" id="assetHint">リファレンスは最大5枚まで。アップロードした画像URLをSeedanceへ渡します。</div></div><div class="previews" id="previews"></div><div class="promptBox"><textarea id="prompt" placeholder="生成したい内容を書いてください。"></textarea><div class="promptTools"><button class="toolLink" id="guideBtn" type="button">▱ コツ</button><button class="sampleBtn" id="sampleBtn" type="button">サンプルを入れる ›</button></div></div><details class="settings"><summary>設定</summary><div class="settingsBody"><div class="field"><label>モデル</label><select id="model"><option value="bytedance/seedance-2.0">Seedance 2.0</option><option value="bytedance/seedance-2.0-lite">Seedance 2.0 Lite</option></select></div><div class="field"><label>アスペクト比</label><select id="aspectRatio"><option value="9:16">9:16 スマホ縦</option><option value="16:9">16:9 横動画</option><option value="1:1">1:1 正方形</option></select></div><div class="field"><label>長さ</label><select id="duration"><option value="5">5秒</option><option value="8">8秒</option></select></div><div class="field"><label>解像度</label><select id="resolution"><option value="720p">720p</option><option value="480p">480p</option><option value="1080p">1080p</option></select></div><div class="field"><label>音声</label><select id="audio"><option value="false">なし</option><option value="true">あり</option></select></div></div></details><div class="jobBox" id="jobBox"><b>生成タスク</b><code id="jobText"></code></div><div class="status" id="status"></div></section>
<section class="resultCard" id="resultCard"><h2>生成完了</h2><video id="resultVideo" controls playsinline></video><a id="resultLink" target="_blank" rel="noreferrer">動画を別タブで開く</a></section>
<section class="sectionTitle"><h2>この端末の生成履歴</h2><button id="clearHistory" type="button">消去</button></section>
<div class="history" id="history"><div class="empty">まだ履歴がありません</div></div>
</main>
<div class="dock"><div class="dockInner"><button class="createBtn" id="createBtn">Seedance生成を開始</button><div class="miniStatus"><span id="notice" class="miniPill">準備OK</span><span id="modeLabel">リファレンス</span></div></div></div>
<script>
const $=id=>document.getElementById(id);let currentMode='reference_to_video';let uploadedUrls=[];let localFiles=[];let jobId='';let autoTimer=null;let pollingStartedAt=0;
function esc(s){return String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]))}
function modeName(mode){return mode==='text_to_video'?'テキストから動画':mode==='image_to_video'?'画像から動画':'リファレンス'}
function setNotice(text,bad=false){$('notice').textContent=text;$('notice').className='miniPill'+(bad?' bad':'')}
function showStatus(data,bad=false){$('status').textContent=typeof data==='string'?data:JSON.stringify(data,null,2);$('status').className='status show'+(bad?' bad':'')}
function setMode(mode){currentMode=mode;document.querySelectorAll('.modeTabs button').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));$('modeLabel').textContent=modeName(mode);$('assetRow').style.display=mode==='text_to_video'?'none':'flex';$('assetInput').multiple=mode==='reference_to_video';$('assetLabel').textContent=mode==='reference_to_video'?'画像を最大5枚選択':'画像を1枚選択';$('assetHint').textContent=mode==='reference_to_video'?'リファレンスは最大5枚まで。画像URLをまとめてSeedanceへ渡します。':'画像から動画は最初のフレーム画像を1枚使います。';$('prompt').placeholder=mode==='text_to_video'?'生成したい動画の内容を書いてください。':'アップロード画像をもとに、動き・雰囲気・カメラを書いてください。';localStorage.setItem('flowvidGenerateMode',mode)}
function readFile(file){return new Promise((ok,ng)=>{const r=new FileReader();r.onload=()=>ok(String(r.result||''));r.onerror=()=>ng(r.error||new Error('File read failed'));r.readAsDataURL(file)})}
function renderPreviews(files,urls=[]){$('previews').innerHTML='';files.forEach((file,i)=>{const div=document.createElement('div');div.className='preview';div.innerHTML='<img alt="preview"><small></small>';div.querySelector('img').src=URL.createObjectURL(file);div.querySelector('small').textContent=(i+1)+'. '+file.name+(urls[i]?' / uploaded':'');$('previews').appendChild(div)})}
async function uploadFiles(files){files=Array.from(files||[]);if(currentMode==='reference_to_video')files=files.slice(0,5);else files=files.slice(0,1);localFiles=files;uploadedUrls=[];renderPreviews(files);if(!files.length)return;setNotice('アップロード中…');showStatus(`${files.length}枚をアップロード中…`);for(let i=0;i<files.length;i++){const file=files[i];const dataUrl=await readFile(file);const res=await fetch('/api/upload-reference-image',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dataUrl,filename:file.name,contentType:file.type||'image/jpeg'})});const data=await res.json();if(!res.ok||!data.ok){setNotice('アップロード失敗',true);showStatus(data,true);return}const url=data.publicUrl||data.url;if(!url){setNotice('URL取得失敗',true);showStatus(data,true);return}uploadedUrls.push(url);renderPreviews(files,uploadedUrls)}localStorage.setItem('flowvidGenerateImageUrls',JSON.stringify(uploadedUrls));setNotice(`アップロード完了：${uploadedUrls.length}枚`);showStatus({ok:true,uploaded:true,count:uploadedUrls.length,urls:uploadedUrls})}
function samplePrompt(){if(currentMode==='text_to_video')return 'スマホ縦動画。日本のアウトドア施設で、家族が芝生の遊び場へ向かい、子どもが走り出す。自然光、明るいCMトーン、実写風、高品質、5秒。文字、字幕、ロゴは入れない。';if(currentMode==='image_to_video')return 'アップロードした画像を最初のフレームとして使い、自然なカメラワークで実写風ショート動画にしてください。人物や背景の雰囲気を保ち、やわらかい光で5秒。文字、字幕、ロゴは入れない。';return 'アップロードした絵コンテ画像を参考資料として使用してください。紙面レイアウト、表、文字、見出し、ページ番号、枠線、説明文は映像化しないでください。参照するのは写真シーンの内容、雰囲気、構図、光、自然な動きだけです。5秒の実写風ショートCM動画。9:16、自然光、明るく親しみやすいCMトーン。文字、字幕、ロゴは入れない。'}
function findVideo(data){if(!data||typeof data!=='object')return'';const keys=['videoUrl','video_url','output_url','url'];for(const k of keys){const v=data[k];if(typeof v==='string'&&/^https?:\/\//.test(v))return v}if(typeof data.uri==='string'&&/^https?:\/\//.test(data.uri))return data.uri;for(const k of Object.keys(data)){const v=data[k];if(v&&typeof v==='object'){const r=findVideo(v);if(r)return r}}return''}
function isDone(data){const s=String(data?.jobStatus||data?.status||data?.response?.status||data?.response?.data?.status||'').toLowerCase();return Boolean(data?.done)||['completed','succeeded','success','done'].includes(s)}
function isFailed(data){const s=String(data?.jobStatus||data?.status||data?.response?.status||data?.response?.data?.status||'').toLowerCase();return ['failed','error','cancelled','canceled'].includes(s)}
function showVideo(url,prompt){if(!url)return;$('resultVideo').src=url;$('resultLink').href=url;$('resultCard').classList.add('show');saveHistory({url,prompt,mode:currentMode,jobId,createdAt:new Date().toISOString()});renderHistory();setTimeout(()=>$('resultCard').scrollIntoView({behavior:'smooth',block:'start'}),200)}
function saveHistory(item){const list=JSON.parse(localStorage.getItem('flowvidHistory')||'[]');list.unshift(item);localStorage.setItem('flowvidHistory',JSON.stringify(list.slice(0,10)))}
function renderHistory(){const list=JSON.parse(localStorage.getItem('flowvidHistory')||'[]');if(!list.length){$('history').innerHTML='<div class="empty">まだ履歴がありません</div>';return}$('history').innerHTML=list.map(item=>`<article class="historyCard"><div class="historyTop"><b>${esc(modeName(item.mode))}</b><span class="pill">${esc(new Date(item.createdAt).toLocaleString('ja-JP'))}</span></div><video controls playsinline src="${esc(item.url)}"></video><p>${esc(item.prompt||'')}</p><a style="color:#dcfce7;font-weight:900;word-break:break-all" href="${esc(item.url)}" target="_blank" rel="noreferrer">動画を開く</a></article>`).join('')}
function stopPolling(){if(autoTimer){clearInterval(autoTimer);autoTimer=null}}
async function checkStatus(){if(!jobId)return;try{const res=await fetch('/api/seedance-status?id='+encodeURIComponent(jobId));const data=await res.json();const url=findVideo(data);showStatus(data,!res.ok||isFailed(data));if(url){stopPolling();setNotice('生成完了');showVideo(url,$('prompt').value.trim());$('createBtn').disabled=false;return}if(isDone(data)&&!url){stopPolling();setNotice('完了、動画URL未確認',true);$('createBtn').disabled=false;return}if(isFailed(data)){stopPolling();setNotice('生成失敗',true);$('createBtn').disabled=false;return}if(Date.now()-pollingStartedAt>10*60*1000){stopPolling();setNotice('確認タイムアウト',true);$('createBtn').disabled=false;return}setNotice('生成中…自動確認中')}catch(e){showStatus(e.message||String(e),true)}}
function startPolling(){stopPolling();pollingStartedAt=Date.now();checkStatus();autoTimer=setInterval(checkStatus,12000)}
async function startGeneration(){const prompt=$('prompt').value.trim();if(!prompt){showStatus('プロンプトを入力してください。',true);setNotice('プロンプト未入力',true);return}if(currentMode!=='text_to_video'&&!uploadedUrls.length){showStatus('画像をアップロードしてください。',true);setNotice('画像未アップロード',true);return}if(!confirm('Seedance生成を開始します。OpenRouter残高を消費する可能性があります。実行しますか？'))return;$('createBtn').disabled=true;$('resultCard').classList.remove('show');setNotice('送信中…');showStatus('Seedanceへ送信中…');const body={model:$('model').value,prompt,duration:$('duration').value,resolution:$('resolution').value,aspect_ratio:$('aspectRatio').value,generate_audio:$('audio').value==='true'};if(currentMode==='image_to_video')body.first_frame_url=uploadedUrls[0];if(currentMode==='reference_to_video'){body.reference_url=uploadedUrls[0];body.reference_urls=uploadedUrls}try{const res=await fetch('/api/seedance-start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const data=await res.json();jobId=data.jobId||data.id||data.response?.id||data.response?.data?.id||'';showStatus(data,!res.ok);if(!res.ok||!jobId){setNotice('jobId取得失敗',true);$('createBtn').disabled=false;return}$('jobText').textContent=jobId;$('jobBox').classList.add('show');localStorage.setItem('flowvidLastSeedanceJobId',jobId);setNotice('生成中…自動確認中');const directUrl=findVideo(data);if(directUrl){showVideo(directUrl,prompt);$('createBtn').disabled=false;return}startPolling()}catch(e){showStatus(e.message||String(e),true);setNotice('送信失敗',true);$('createBtn').disabled=false}}
function initFromQuery(){const p=new URLSearchParams(location.search);const q=p.get('mode')||localStorage.getItem('flowvidGenerateMode')||'reference_to_video';if(['reference_to_video','image_to_video','text_to_video'].includes(q))setMode(q);else setMode('reference_to_video')}
document.querySelectorAll('.modeTabs button').forEach(btn=>btn.onclick=()=>setMode(btn.dataset.mode));$('assetInput').onchange=e=>uploadFiles(e.target.files);$('sampleBtn').onclick=()=>{$('prompt').value=samplePrompt()};$('guideBtn').onclick=()=>showStatus('コツ：主役 → 動き → 雰囲気 → 禁止事項の順で書くと安定しやすいです。画像を使う場合は、紙面レイアウトや文字を映像化しない指定も入れてください。');$('createBtn').onclick=startGeneration;$('clearHistory').onclick=()=>{localStorage.removeItem('flowvidHistory');renderHistory()};initFromQuery();renderHistory();
</script>
</body>
</html>
