<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<title>生成 | FlowVid Studio</title>
<meta name="theme-color" content="#050506">
<style>
:root{--bg:#05080c;--panel:#171a20;--panel2:#20242d;--line:rgba(255,255,255,.12);--muted:rgba(255,255,255,.54);--gold:#d7b86a;--violet:#7c3aed;--cyan:#6ee7f9;--pink:#fb7185;--ok:#86efac;--bad:#fecdd3}*{box-sizing:border-box}html,body{margin:0;width:100%;min-height:100%;overflow-x:hidden;background:var(--bg);color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{background:radial-gradient(circle at 12% -10%,rgba(110,231,249,.15),transparent 33%),radial-gradient(circle at 92% 0%,rgba(124,58,237,.22),transparent 34%),linear-gradient(180deg,#05080c,#071018 56%,#030507)}button,input,select,textarea{font:inherit}.wrap{width:100%;max-width:760px;margin:0 auto;padding:18px 12px 118px}.top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px}.brand{display:flex;align-items:center;gap:10px;color:#fff;text-decoration:none;min-width:0}.logo{width:48px;height:48px;min-width:48px;border-radius:18px;background:linear-gradient(135deg,#fff,var(--cyan),var(--violet));display:grid;place-items:center;color:#050506;font-weight:1000;box-shadow:0 16px 55px rgba(124,58,237,.24)}.brand small{display:block;color:rgba(255,255,255,.38);letter-spacing:.22em;font-size:9px}.brand b{font-size:22px;white-space:nowrap;letter-spacing:-.03em}.iconBtn{border:1px solid var(--line);background:rgba(255,255,255,.07);color:#fff;border-radius:18px;width:48px;height:48px;font-weight:950;font-size:22px}.userBar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:6px 0 14px;color:rgba(255,255,255,.7);font-size:13px}.creditPill{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(215,184,106,.26);background:rgba(215,184,106,.08);color:#f8e7b5;border-radius:999px;padding:8px 10px;font-weight:900}.modeTabs{display:grid;grid-template-columns:repeat(3,1fr);background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:22px;padding:4px;margin:12px 0 14px;position:sticky;top:6px;z-index:7;backdrop-filter:blur(18px)}.modeTabs button{border:0;background:transparent;color:rgba(255,255,255,.5);border-radius:18px;padding:13px 4px;font-weight:950;white-space:nowrap}.modeTabs button.active{background:rgba(255,255,255,.13);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}.composer{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.035));border-radius:28px;padding:16px;box-shadow:0 24px 90px rgba(0,0,0,.42)}.assetRow{display:flex;gap:10px;overflow:auto;padding-bottom:4px;margin-bottom:12px}.assetTile{min-width:160px;height:128px;border:1px dashed rgba(255,255,255,.18);background:rgba(0,0,0,.25);border-radius:18px;color:rgba(255,255,255,.72);display:grid;place-items:center;text-align:center;font-weight:900;line-height:1.5;position:relative;overflow:hidden}.assetTile input{position:absolute;inset:0;opacity:0}.assetTile img{width:100%;height:100%;object-fit:cover;display:block}.assetTile span{display:block;font-size:30px;line-height:1}.assetHint{min-width:180px;height:128px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.035);border-radius:18px;padding:14px;color:rgba(255,255,255,.62);font-size:12px;line-height:1.55}.promptBox{position:relative;background:rgba(0,0,0,.34);border:1px solid rgba(255,255,255,.08);border-radius:20px;overflow:hidden}.promptBox textarea{display:block;width:100%;min-height:176px;border:0;background:transparent;color:#fff;padding:17px 16px 54px;font-size:16px;line-height:1.65;resize:vertical;outline:0}.promptBox textarea::placeholder{color:rgba(255,255,255,.36)}.promptTools{position:absolute;left:10px;right:10px;bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px}.toolLink{border:0;background:transparent;color:rgba(255,255,255,.72);font-weight:850;padding:8px}.sampleBtn{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:#fff;border-radius:999px;padding:8px 11px;font-weight:900}.settings{margin-top:14px;border:1px solid var(--line);background:rgba(255,255,255,.055);border-radius:20px;overflow:hidden}.settings summary{list-style:none;display:flex;align-items:center;justify-content:space-between;padding:16px;font-weight:950;cursor:pointer}.settings summary::-webkit-details-marker{display:none}.settings summary:after{content:'⌄';font-size:22px;color:rgba(255,255,255,.78)}.settings[open] summary:after{transform:rotate(180deg)}.settingsBody{padding:0 14px 14px;display:grid;gap:10px}.field label{display:block;color:var(--muted);font-size:12px;margin:0 0 6px;font-weight:850}.field select,.field input{width:100%;border:1px solid rgba(255,255,255,.12);background:#090c11;color:#fff;border-radius:14px;padding:12px;font-size:15px}.estimate{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line);padding-top:12px;color:rgba(255,255,255,.76);font-size:14px}.estimate strong{color:#fff}.createDock{position:fixed;left:0;right:0;bottom:0;z-index:20;padding:12px 12px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(5,8,12,0),rgba(5,8,12,.92) 28%,#05080c);backdrop-filter:blur(18px)}.createDockInner{max-width:760px;margin:0 auto;display:grid;gap:8px}.createBtn{width:100%;border:0;border-radius:22px;padding:17px 14px;font-weight:1000;color:#050506;background:linear-gradient(90deg,#fff,#d7b86a,#8b5cf6);font-size:17px}.createBtn:disabled{background:#374151;color:rgba(255,255,255,.3)}.miniStatus{display:flex;align-items:center;justify-content:space-between;gap:8px;color:rgba(255,255,255,.48);font-size:12px}.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(134,239,172,.26);background:rgba(134,239,172,.09);color:#dcfce7;border-radius:999px;padding:7px 9px;font-size:12px;font-weight:900}.pill.bad{border-color:rgba(251,113,133,.32);background:rgba(251,113,133,.1);color:var(--bad)}.status{display:none;white-space:pre-wrap;word-break:break-word;border:1px solid rgba(134,239,172,.24);background:rgba(134,239,172,.08);color:#dcfce7;border-radius:16px;padding:12px;margin-top:12px;font-size:12px;line-height:1.6}.status.show{display:block}.status.bad{border-color:rgba(251,113,133,.35);background:rgba(251,113,133,.10);color:var(--bad)}.sectionTitle{display:flex;align-items:center;justify-content:space-between;margin:20px 2px 10px}.sectionTitle h2{margin:0;font-size:18px;letter-spacing:-.02em}.sectionTitle button{border:1px solid var(--line);background:rgba(255,255,255,.06);color:#fff;border-radius:14px;padding:9px 11px;font-weight:900}.taskFeed{display:grid;gap:12px}.taskCard{border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:24px;padding:13px;overflow:hidden}.taskTop{display:grid;grid-template-columns:42px 1fr auto;gap:10px;align-items:start}.taskThumb{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,rgba(110,231,249,.28),rgba(124,58,237,.28));display:grid;place-items:center;font-size:17px}.taskPrompt{min-width:0;color:rgba(255,255,255,.62);font-size:14px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.taskStatus{border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.18);border-radius:999px;padding:5px 8px;color:rgba(255,255,255,.7);font-size:11px;font-weight:900;white-space:nowrap}.taskPreview{height:170px;margin-top:12px;border-radius:18px;background:linear-gradient(135deg,rgba(0,0,0,.55),rgba(255,255,255,.06)),radial-gradient(circle at 70% 20%,rgba(215,184,106,.18),transparent 24%);border:1px solid rgba(255,255,255,.07);display:grid;place-items:center;color:rgba(255,255,255,.38);font-weight:950;overflow:hidden}.taskVideoWrap{margin-top:12px;border-radius:18px;background:#000;border:1px solid rgba(255,255,255,.08);overflow:hidden}.taskVideoWrap video{display:block;width:100%;max-height:70vh;aspect-ratio:9/16;object-fit:contain;background:#000}.downloadActions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.downloadBtn{display:flex;align-items:center;justify-content:center;min-height:50px;border-radius:15px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:#fff;text-decoration:none;text-align:center;font-weight:950;font-size:13px;line-height:1.25}.downloadBtn span{display:block;color:rgba(255,255,255,.54);font-size:11px;font-weight:850;margin-top:2px}.downloadBtn.clean{background:linear-gradient(135deg,rgba(215,184,106,.2),rgba(124,58,237,.12));border-color:rgba(215,184,106,.35)}.downloadBtn.locked{opacity:.5;cursor:not-allowed}.downloadNote{margin-top:7px;color:rgba(255,255,255,.38);font-size:11px;line-height:1.5}.taskActions{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px}.actionGroup{display:flex;gap:6px}.smallIcon{width:42px;height:42px;border:0;border-radius:13px;background:rgba(255,255,255,.08);color:#fff;font-size:18px;text-decoration:none;display:grid;place-items:center}.rerun{border:0;border-radius:14px;background:rgba(255,255,255,.09);color:#fff;padding:10px 14px;font-weight:900}.empty{border:1px dashed var(--line);border-radius:20px;padding:18px;text-align:center;color:var(--muted);line-height:1.6}.drawerOverlay{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.55);opacity:0;visibility:hidden;transition:.2s}.drawerOverlay.show{opacity:1;visibility:visible}.drawer{position:fixed;top:0;right:-310px;width:300px;max-width:84vw;height:100dvh;z-index:100;background:#0d1117;border-left:1px solid rgba(255,255,255,.10);padding:16px;transition:right .24s ease;box-shadow:-30px 0 80px rgba(0,0,0,.45)}.drawer.open{right:0}.drawerHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.drawerHead b{font-size:18px}.nav{display:grid;gap:10px}.nav a{width:100%;text-align:left;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.04);color:#fff;border-radius:15px;padding:14px 15px;font-size:15px;font-weight:900;text-decoration:none}.nav a.active{background:linear-gradient(90deg,rgba(255,255,255,.17),rgba(124,58,237,.24));border-color:rgba(124,58,237,.42)}.nav a.danger{color:var(--bad);border-color:rgba(251,113,133,.28);background:rgba(251,113,133,.08)}@media(min-width:720px){.settingsBody{grid-template-columns:1fr 1fr}.estimate{grid-column:1/-1}.taskPreview{height:240px}.taskVideoWrap video{max-height:520px}}@media(max-width:430px){.wrap{padding-left:10px;padding-right:10px}.brand b{font-size:21px}.modeTabs button{font-size:13px}.composer{padding:13px;border-radius:24px}.promptBox textarea{min-height:170px}.taskPreview{height:156px}.downloadActions{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="drawerOverlay" id="overlay"></div>
<aside class="drawer" id="drawer"><div class="drawerHead"><b>メニュー</b><button class="iconBtn" id="closeMenuBtn">×</button></div><nav class="nav"><a href="./index.html">ホーム</a><a class="active" href="./generate.html">生成</a><a href="./profile.html">マイページ</a><a href="./pricing.html">料金</a><a href="./help.html">ヘルプ</a><a class="danger" href="./logout.html">ログアウト</a></nav></aside>
<main class="wrap">
<header class="top"><a class="brand" href="./index.html"><div class="logo">▶</div><div><small>AI VIDEO STUDIO</small><b>FlowVid Studio</b></div></a><button class="iconBtn" id="menuBtn">☰</button></header>
<div class="userBar"><span id="email">確認中</span><span class="creditPill">✦ <span id="creditTotal">-</span></span></div>
<div class="modeTabs" role="tablist"><button class="active" data-mode="reference_to_video">リファレンス</button><button data-mode="image_to_video">画像から動画</button><button data-mode="text_to_video">テキストから動画</button></div>
<section class="composer">
  <div class="assetRow" id="assetRow"><label class="assetTile"><input id="assetInput" type="file" accept="image/*"><div id="assetEmpty"><span>＋</span>スタート</div><img id="assetPreview" alt="" style="display:none"></label><div class="assetHint" id="assetHint">参考画像や元画像を入れて、下に生成したい内容を書きます。実画像アップロード保存は次工程で接続します。</div></div>
  <div class="promptBox"><textarea id="prompt" placeholder="アップロードした画像をもとに、生成したい内容を説明してください。"></textarea><div class="promptTools"><button class="toolLink" id="guideBtn" type="button">▱ ユーザーガイド</button><button class="sampleBtn" id="sampleBtn" type="button">サンプルを試す ›</button></div></div>
  <details class="settings"><summary>設定</summary><div class="settingsBody"><div class="field"><label>モデル</label><select id="model"><option value="models/veo-3.0-fast-generate-001">Veo 3 Fast</option><option value="models/veo-3.1-lite-generate-preview">Veo 3.1 Lite Preview</option><option value="models/veo-2.0-generate-001">Veo 2</option></select></div><div class="field"><label>アスペクト比</label><select id="aspectRatio"><option value="9:16">9:16 スマホ縦</option><option value="16:9">16:9 横動画</option></select></div><div class="field"><label>長さ</label><select id="duration"><option value="5">5秒</option></select></div><div class="field"><label>音声</label><select id="audio"><option value="none">なし</option><option value="auto">あり（後で接続）</option></select></div><div class="estimate"><span>合計報酬 / 見積もり</span><strong id="estimate">128 credits</strong></div></div></details>
  <div class="status" id="status"></div>
</section>
<section class="sectionTitle"><h2>タスク</h2><button id="loadTasksBtn" type="button">更新</button></section>
<div class="taskFeed" id="taskList"><div class="empty">ログインするとタスクが表示されます</div></div>
</main>
<div class="createDock"><div class="createDockInner"><button class="createBtn" id="createBtn">作成する</button><div class="miniStatus"><span id="notice">確認中です。</span><span id="modeLabel">リファレンス</span></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./auth-config.js?v=3844d5ea2"></script>
<script>
const cfg=window.FLOWVID_AUTH||{};const authReady=Boolean(cfg.supabaseUrl&&cfg.supabaseAnonKey);const client=authReady?window.supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey):null;const $=id=>document.getElementById(id);let currentUser=null,totalCredits=0,currentMode='reference_to_video',cleanDownloadEnabled=false;
function openMenu(){$('drawer').classList.add('open');$('overlay').classList.add('show')}function closeMenu(){$('drawer').classList.remove('open');$('overlay').classList.remove('show')}$('menuBtn').onclick=openMenu;$('closeMenuBtn').onclick=closeMenu;$('overlay').onclick=closeMenu;
function esc(s){return String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]))}function fmt(d){try{return new Date(d).toLocaleString('ja-JP')}catch(_){return '-'}}function st(msg,bad=false){$('status').textContent=typeof msg==='string'?msg:JSON.stringify(msg,null,2);$('status').className='status show'+(bad?' bad':'')}function setNotice(text,bad=false){$('notice').textContent=text;$('notice').className=bad?'pill bad':'pill'}
function modeName(mode){return mode==='text_to_video'?'テキスト':mode==='image_to_video'?'画像から動画':'リファレンス'}
function norm(s){return String(s||'').trim().replace(/\s+/g,' ')}
function safePart(s){return String(s||'video').replace(/[^a-zA-Z0-9_-]/g,'').slice(0,36)||'video'}
function videoSrc(row){return '/api/veo-download?uri='+encodeURIComponent(row.video_uri)}
function downloadHref(row,variant){const filename=`flowvid-${variant}-${safePart(row.id||row.operation_name)}.mp4`;return videoSrc(row)+'&download=1&variant='+encodeURIComponent(variant)+'&filename='+encodeURIComponent(filename)}
function hasCleanDownload(profile,balance){const plan=String(profile?.plan||'free').toLowerCase();return profile?.role==='admin'||Boolean(plan&&plan!=='free')||Number(balance?.subscription_credits||0)>0||Number(balance?.purchased_credits||0)>0}
function updateMode(mode){currentMode=mode;document.querySelectorAll('.modeTabs button').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));$('modeLabel').textContent=modeName(mode);const showAsset=mode!=='text_to_video';$('assetRow').style.display=showAsset?'flex':'none';$('prompt').placeholder=mode==='text_to_video'?'生成したい動画の内容を説明してください。':mode==='image_to_video'?'アップロードした画像をもとに、生成したい内容を説明してください。':'キャラ・商品・雰囲気など、残したい特徴と動きを説明してください。'}
document.querySelectorAll('.modeTabs button').forEach(btn=>btn.onclick=()=>updateMode(btn.dataset.mode));
$('assetInput').onchange=e=>{const file=e.target.files?.[0];if(!file)return;const url=URL.createObjectURL(file);$('assetPreview').src=url;$('assetPreview').style.display='block';$('assetEmpty').style.display='none';};
$('sampleBtn').onclick=()=>{$('prompt').value=currentMode==='text_to_video'?'スマホ縦動画。夜の街で小さなロボットが歩く。ネオンの光、なめらかなカメラワーク、シネマティック。':'アップロードした画像の雰囲気を保ったまま、人物がゆっくり振り向いて微笑む。スマホ縦動画、自然な動き、シネマティック。'};
$('guideBtn').onclick=()=>st('コツ：1行目に主役、2行目に動き、3行目に雰囲気・カメラ・音声を書けば安定しやすいです。');
async function loadAuth(){if(!authReady){$('email').textContent='Supabase未設定';$('creditTotal').textContent='0';setNotice('接続情報が未設定です',true);$('createBtn').disabled=true;return}const {data,error}=await client.auth.getSession();currentUser=data.session?.user||null;if(error||!currentUser){$('email').textContent='未ログイン';$('creditTotal').textContent='0 credits';setNotice('ログインが必要です',true);$('createBtn').disabled=false;return}$('email').textContent=currentUser.email||'-';const [balRes,profileRes]=await Promise.all([client.from('credit_balances').select('free_credits,subscription_credits,purchased_credits').eq('user_id',currentUser.id).maybeSingle(),client.from('profiles').select('display_name,role,plan').eq('id',currentUser.id).maybeSingle()]);if(balRes.error){setNotice('残高を読めません',true);return}const bal=balRes.data||{};const profile=profileRes.data||{};totalCredits=Number(bal.free_credits||0)+Number(bal.subscription_credits||0)+Number(bal.purchased_credits||0);cleanDownloadEnabled=hasCleanDownload(profile,bal);$('creditTotal').textContent=totalCredits+' credits';if(totalCredits<128){setNotice('残高不足：128必要',true)}else{setNotice('作成できます')}await loadTasks()}
async function createTask(){if(!currentUser){location.href='./login.html';return}const prompt=$('prompt').value.trim();if(!prompt){st('プロンプトを入力してください。',true);return}if(totalCredits<128){st('残高不足です。料金ページでクレジットを追加してください。',true);return}const payload={user_id:currentUser.id,mode:currentMode,prompt,resolution:'veo',duration_seconds:Number($('duration').value||5),aspect_ratio:$('aspectRatio').value,credit_cost:128,status:'draft',api_provider:'veo'};const {error}=await client.from('generation_tasks').insert(payload);if(error){st('保存エラー：'+error.message,true);return}st('生成リクエストを保存しました。管理画面の生成タスクに追加されています。');$('prompt').value='';await loadTasks()}
async function loadGeneratedRows(){try{const res=await fetch('/api/generated-videos?email='+encodeURIComponent(currentUser.email||'')+'&limit=50');const data=await res.json();if(!res.ok||!data.ok)return[];return data.rows||[]}catch(_){return[]}}
function findVideoForTask(task,rows){const p=norm(task.prompt);return rows.find(v=>norm(v.prompt)===p&&v.video_uri&&v.status==='completed')||rows.find(v=>norm(v.prompt)===p)||null}
function renderPreview(task,video){if(video?.video_uri&&video.status==='completed'){const src=videoSrc(video);const watermark=downloadHref(video,'watermark');const clean=downloadHref(video,'clean');return `<div class="taskVideoWrap"><video controls playsinline preload="metadata" src="${src}"></video></div><div class="downloadActions"><a class="downloadBtn" href="${watermark}" download>ウォーターマークあり<br><span>ダウンロード</span></a>${cleanDownloadEnabled?`<a class="downloadBtn clean" href="${clean}" download>ウォーターマークなし<br><span>ダウンロード</span></a>`:`<button class="downloadBtn locked" type="button" disabled>ウォーターマークなし<br><span>課金後に利用</span></button>`}</div><div class="downloadNote">この動画は生成済みです。ここから再生・保存できます。</div>`}const status=video?.status||task.status||'draft';return `<div class="taskPreview">${esc(task.aspect_ratio||'-')} ｜ ${Number(task.duration_seconds||0)}秒 ｜ ${Number(task.credit_cost||0)} credits<br>${esc(status)}</div>`}
async function loadTasks(){if(!currentUser){$('taskList').innerHTML='<div class="empty">ログインするとタスクが表示されます</div>';return}const [{data,error},videos]=await Promise.all([client.from('generation_tasks').select('id,status,mode,prompt,duration_seconds,aspect_ratio,credit_cost,created_at').eq('user_id',currentUser.id).order('created_at',{ascending:false}).limit(12),loadGeneratedRows()]);if(error){$('taskList').innerHTML='<div class="empty">読み込みエラー：'+esc(error.message)+'</div>';return}if(!data.length){$('taskList').innerHTML='<div class="empty">タスクはまだありません</div>';return}$('taskList').innerHTML=data.map(t=>{const v=findVideoForTask(t,videos);const status=v?.status==='completed'?'completed':(v?.status||t.status||'-');const openLink=v?.video_uri?videoSrc(v):'';return `<article class="taskCard"><div class="taskTop"><div class="taskThumb">▶</div><div class="taskPrompt"><b>${esc(modeName(t.mode))}</b> ${esc(t.prompt||'プロンプトなし')}</div><div class="taskStatus">${esc(status)}</div></div>${renderPreview(t,v)}<div class="taskActions"><div class="actionGroup"><button class="smallIcon" type="button">✦</button>${openLink?`<a class="smallIcon" href="${openLink}" target="_blank" rel="noreferrer">↗</a>`:`<button class="smallIcon" type="button">↗</button>`}<button class="smallIcon" type="button">…</button></div><button class="rerun" type="button">再作成</button></div><div style="margin-top:7px;color:rgba(255,255,255,.36);font-size:11px">${fmt(t.created_at)}</div></article>`}).join('')}
$('createBtn').onclick=createTask;$('loadTasksBtn').onclick=loadTasks;updateMode(currentMode);loadAuth();
</script>
</body>
</html>
