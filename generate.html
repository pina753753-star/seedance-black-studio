<div class="drawerOverlay" id="overlay"></div>
<aside class="drawer" id="drawer"><div class="drawerHead"><b>メニュー</b><button class="iconBtn" id="closeMenuBtn">×</button></div><nav class="nav"><a href="./index.html">ホーム</a><a class="active" href="./generate.html">生成</a><a href="./profile.html">マイページ</a><a href="./pricing.html">料金</a><a href="./help.html">ヘルプ</a><a class="danger" href="./logout.html">ログアウト</a></nav></aside>
<main class="wrap">

<div class="taskFeed" id="taskList"><div class="empty">ログインするとタスクが表示されます</div></div>
</main>
<div class="createDock"><div class="createDockInner"><button class="createBtn" id="createBtn">作成する</button><div class="miniStatus"><span id="notice">確認中です。</span><span id="modeLabel">リファレンス</span></div></div></div>

<script>
const cfg=window.FLOWVID_AUTH||{};const authReady=Boolean(cfg.supabaseUrl&&cfg.supabaseAnonKey);const client=authReady?window.supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey):null;const $=id=>document.getElementById(id);let currentUser=null,totalCredits=0,currentMode='reference_to_video',cleanDownloadEnabled=false;
function openMenu(){$('drawer').classList.add('open');$('overlay').classList.add('show')}function closeMenu(){$('drawer').classList.remove('open');$('overlay').classList.remove('show')}$('menuBtn').onclick=openMenu;$('closeMenuBtn').onclick=closeMenu;$('overlay').onclick=closeMenu;
function esc(s){return String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]))}function fmt(d){try{return new Date(d).toLocaleString('ja-JP')}catch(_){return '-'}}function st(msg,bad=false){$('status').textContent=typeof msg==='string'?msg:JSON.stringify(msg,null,2);$('status').className='status show'+(bad?' bad':'')}function setNotice(text,bad=false){$('notice').textContent=text;$('notice').className=bad?'pill bad':'pill'}
function modeName(mode){return mode==='text_to_video'?'テキスト':mode==='image_to_video'?'画像から動画':'リファレンス'}function norm(s){return String(s||'').trim().replace(/\s+/g,' ')}function safePart(s){return String(s||'video').replace(/[^a-zA-Z0-9_-]/g,'').slice(0,36)||'video'}function videoSrc(row){return '/api/veo-download?uri='+encodeURIComponent(row.video_uri)}function downloadHref(row,variant){const filename=`flowvid-${variant}-${safePart(row.id||row.operation_name)}.mp4`;return videoSrc(row)+'&download=1&variant='+encodeURIComponent(variant)+'&filename='+encodeURIComponent(filename)}function hasCleanDownload(profile,balance){const plan=String(profile?.plan||'free').toLowerCase();return profile?.role==='admin'||Boolean(plan&&plan!=='free')||Number(balance?.subscription_credits||0)>0||Number(balance?.purchased_credits||0)>0}
function showPrompt(text){$('promptText').textContent=text||'プロンプトなし';$('promptModal').classList.add('show')}function hidePrompt(){$('promptModal').classList.remove('show')}$('promptClose').onclick=hidePrompt;$('promptModal').addEventListener('click',e=>{if(e.target.id==='promptModal')hidePrompt()});
function showDetail(el){$('detailVideo').src=el.dataset.src;$('detailPrompt').textContent=el.dataset.prompt||'プロンプトなし';$('detailMeta').textContent=el.dataset.meta||'';$('detailDownload').href=el.dataset.download||'#';$('detailView').classList.add('show');$('detailVideo').play().catch(()=>{})}function hideDetail(){$('detailVideo').pause();$('detailVideo').removeAttribute('src');$('detailVideo').load();$('detailView').classList.remove('show')}$('detailBack').onclick=hideDetail;
function attachCardHandlers(){let timer=null;document.querySelectorAll('[data-full-prompt]').forEach(el=>{if(el.dataset.promptHooked)return;el.dataset.promptHooked='1';const open=()=>showPrompt(el.dataset.fullPrompt||el.textContent||'');el.addEventListener('click',open);el.addEventListener('touchstart',()=>{timer=setTimeout(open,420)},{passive:true});['touchmove','touchend','touchcancel'].forEach(t=>el.addEventListener(t,()=>{if(timer)clearTimeout(timer);timer=null},{passive:true}));el.addEventListener('contextmenu',e=>{e.preventDefault();open()});});document.querySelectorAll('[data-video-detail]').forEach(el=>{if(el.dataset.detailHooked)return;el.dataset.detailHooked='1';el.addEventListener('click',()=>showDetail(el));});}
function updateMode(mode){currentMode=mode;document.querySelectorAll('.modeTabs button').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));$('modeLabel').textContent=modeName(mode);$('assetRow').style.display=mode!=='text_to_video'?'flex':'none';$('prompt').placeholder=mode==='text_to_video'?'生成したい動画の内容を説明してください。':mode==='image_to_video'?'アップロードした画像をもとに、生成したい内容を説明してください。':'キャラ・商品・雰囲気など、残したい特徴と動きを説明してください。'}
document.querySelectorAll('.modeTabs button').forEach(btn=>btn.onclick=()=>updateMode(btn.dataset.mode));$('assetInput').onchange=e=>{const file=e.target.files?.[0];if(!file)return;const url=URL.createObjectURL(file);$('assetPreview').src=url;$('assetPreview').style.display='block';$('assetEmpty').style.display='none'};$('sampleBtn').onclick=()=>{$('prompt').value=currentMode==='text_to_video'?'スマホ縦動画。夜の街で小さなロボットが歩く。ネオンの光、なめらかなカメラワーク、シネマティック。':'アップロードした画像の雰囲気を保ったまま、人物がゆっくり振り向いて微笑む。スマホ縦動画、自然な動き、シネマティック。'};$('guideBtn').onclick=()=>st('コツ：1行目に主役、2行目に動き、3行目に雰囲気・カメラ・音声を書けば安定しやすいです。');
async function loadAuth(){if(!authReady){$('email').textContent='Supabase未設定';$('creditTotal').textContent='0';setNotice('接続情報が未設定です',true);return}const {data,error}=await client.auth.getSession();currentUser=data.session?.user||null;if(error||!currentUser){$('email').textContent='未ログイン';$('creditTotal').textContent='0 credits';setNotice('ログインが必要です',true);return}$('email').textContent=currentUser.email||'-';const [balRes,profileRes]=await Promise.all([client.from('credit_balances').select('free_credits,subscription_credits,purchased_credits').eq('user_id',currentUser.id).maybeSingle(),client.from('profiles').select('display_name,role,plan').eq('id',currentUser.id).maybeSingle()]);const bal=balRes.data||{};const profile=profileRes.data||{};totalCredits=Number(bal.free_credits||0)+Number(bal.subscription_credits||0)+Number(bal.purchased_credits||0);cleanDownloadEnabled=hasCleanDownload(profile,bal);$('creditTotal').textContent=totalCredits+' credits';setNotice(totalCredits<128?'残高不足：128必要':'作成できます',totalCredits<128);await loadTasks()}
async function createTask(){if(!currentUser){location.href='./login.html';return}const prompt=$('prompt').value.trim();if(!prompt){st('プロンプトを入力してください。',true);return}if(totalCredits<128){st('残高不足です。料金ページでクレジットを追加してください。',true);return}const payload={user_id:currentUser.id,mode:currentMode,prompt,resolution:'veo',duration_seconds:Number($('duration').value||5),aspect_ratio:$('aspectRatio').value,credit_cost:128,status:'draft',api_provider:'veo'};const {error}=await client.from('generation_tasks').insert(payload);if(error){st('保存エラー：'+error.message,true);return}st('生成リクエストを保存しました。管理画面の生成タスクに追加されています。');$('prompt').value='';await loadTasks()}
async function loadGeneratedRows(){try{const res=await fetch('/api/generated-videos?email='+encodeURIComponent(currentUser.email||'')+'&limit=50');const data=await res.json();if(!res.ok||!data.ok)return[];return data.rows||[]}catch(_){return[]}}function promptMatches(a,b){const x=norm(a),y=norm(b);if(!x||!y)return false;if(x===y)return true;return x.includes(y.slice(0,28))||y.includes(x.slice(0,28))}function findVideoForTask(task,rows){return rows.find(v=>promptMatches(v.prompt,task.prompt)&&v.video_uri&&v.status==='completed')||rows.find(v=>promptMatches(v.prompt,task.prompt))||null}
function renderPreview(task,video){if(video?.video_uri&&video.status==='completed'){const src=videoSrc(video),watermark=downloadHref(video,'watermark'),clean=downloadHref(video,'clean'),prompt=task.prompt||video.prompt||'';const meta=`${video.aspect_ratio||task.aspect_ratio||'-'} ｜ ${Number(video.duration_seconds||task.duration_seconds||0)}秒 ｜ ${Number(video.credit_cost||task.credit_cost||0)} credits ｜ ${fmt(video.created_at||task.created_at)}`;return `<div class="taskVideoWrap" data-video-detail="1" data-src="${esc(src)}" data-prompt="${esc(prompt)}" data-meta="${esc(meta)}" data-download="${esc(watermark)}"><video muted playsinline preload="metadata" src="${src}"></video><span class="previewHint">タップで詳細</span></div><div class="downloadActions"><a class="downloadBtn" href="${watermark}" download>ウォーターマークあり<br><span>ダウンロード</span></a>${cleanDownloadEnabled?`<a class="downloadBtn clean" href="${clean}" download>ウォーターマークなし<br><span>ダウンロード</span></a>`:`<button class="downloadBtn locked" type="button" disabled>ウォーターマークなし<br><span>課金後に利用</span></button>`}</div><div class="downloadNote">この動画は生成済みです。ここから再生・保存できます。</div>`}const status=video?.status||task.status||'draft';return `<div class="taskPreview">${esc(task.aspect_ratio||'-')} ｜ ${Number(task.duration_seconds||0)}秒 ｜ ${Number(task.credit_cost||0)} credits<br>${esc(status)}</div>`}
function renderTaskCard(t,v){const status=v?.status==='completed'?'completed':(v?.status||t.status||'-');const openLink=v?.video_uri?videoSrc(v):'';const prompt=t.prompt||v?.prompt||'プロンプトなし';return `<article class="taskCard"><div class="taskTop"><div class="taskThumb">▶</div><div class="taskPrompt" data-full-prompt="${esc(prompt)}"><b>${esc(modeName(t.mode))}</b> ${esc(prompt)}</div><div class="taskStatus">${esc(status)}</div></div>${renderPreview(t,v)}<div class="taskActions"><div class="actionGroup"><button class="smallIcon" type="button">✦</button>${openLink?`<a class="smallIcon" href="${openLink}" target="_blank" rel="noreferrer">↗</a>`:`<button class="smallIcon" type="button">↗</button>`}<button class="smallIcon" type="button">…</button></div><button class="rerun" type="button">再作成</button></div><div style="margin-top:7px;color:rgba(255,255,255,.36);font-size:11px">${fmt(t.created_at||v?.created_at)}</div></article>`}
function renderVideoOnlyCard(v){const fake={status:v.status||'completed',mode:'text_to_video',prompt:v.prompt,aspect_ratio:v.aspect_ratio,duration_seconds:v.duration_seconds,credit_cost:v.credit_cost,created_at:v.created_at};return renderTaskCard(fake,v)}
async function loadTasks(){if(!currentUser){$('taskList').innerHTML='<div class="empty">ログインするとタスクが表示されます</div>';return}const [{data,error},videos]=await Promise.all([client.from('generation_tasks').select('id,status,mode,prompt,duration_seconds,aspect_ratio,credit_cost,created_at').eq('user_id',currentUser.id).order('created_at',{ascending:false}).limit(12),loadGeneratedRows()]);if(error){$('taskList').innerHTML='<div class="empty">読み込みエラー：'+esc(error.message)+'</div>';return}const used=new Set();const cards=[];(data||[]).forEach(t=>{const v=findVideoForTask(t,videos);if(v?.id)used.add(String(v.id));cards.push(renderTaskCard(t,v))});(videos||[]).filter(v=>v.video_uri&&v.status==='completed'&&!used.has(String(v.id))).forEach(v=>cards.unshift(renderVideoOnlyCard(v)));$('taskList').innerHTML=cards.length?cards.join(''):'<div class="empty">タスクも完成動画もまだありません</div>';attachCardHandlers()}
$('createBtn').onclick=createTask;$('loadTasksBtn').onclick=loadTasks;updateMode(currentMode);loadAuth();
</script>
</body>
