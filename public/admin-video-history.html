<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>生成動画履歴 | FlowVid Studio</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;min-height:100%;overflow-x:hidden;background:#050506;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.bg{position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 18% 0%,rgba(251,113,133,.18),transparent 34%),radial-gradient(circle at 88% 10%,rgba(124,58,237,.22),transparent 36%),linear-gradient(180deg,#050506,#08070d 62%,#030304)}.top{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;background:rgba(5,5,6,.82);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.08)}.wrap{position:relative;max-width:760px;margin:0 auto;padding:18px 12px 42px}.brand{display:flex;align-items:center;gap:10px;color:#fff;text-decoration:none;min-width:0}.logo{width:42px;height:42px;min-width:42px;border-radius:16px;background:linear-gradient(135deg,#6ee7f9,#7c3aed);display:grid;place-items:center;font-weight:950}.brand small{display:block;color:rgba(255,255,255,.4);letter-spacing:.22em;font-size:8px}.brand b{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.iconBtn{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:#fff;border-radius:14px;padding:10px 12px;font-weight:900}.btn{display:block;width:100%;text-align:center;border:0;border-radius:16px;padding:14px 13px;margin-top:10px;font-weight:950;color:#050506;background:linear-gradient(90deg,#fff,#d7b86a,#7c3aed);text-decoration:none}.btn.secondary{background:rgba(255,255,255,.06);color:#fff;border:1px solid rgba(255,255,255,.14)}h1{font-size:36px;letter-spacing:-.06em;line-height:1.1;margin:18px 0 10px;background:linear-gradient(135deg,#fff,#f5b8c2 54%,#9be7ff);-webkit-background-clip:text;color:transparent}.lead{color:rgba(255,255,255,.62);line-height:1.7;font-size:14px}.card{border:1px solid rgba(255,255,255,.14);border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.03));padding:14px;margin:12px 0;overflow:hidden}.card h2{font-size:20px;margin:0 0 10px}.status{white-space:pre-wrap;word-break:break-word;border:1px solid rgba(134,239,172,.24);background:rgba(134,239,172,.08);color:#dcfce7;border-radius:16px;padding:12px;margin-top:12px;font-size:12px;line-height:1.6}.bad{border-color:rgba(251,113,133,.35);background:rgba(251,113,133,.10);color:#fecdd3}.item{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);border-radius:18px;padding:12px;margin-top:10px}.meta{color:rgba(255,255,255,.56);font-size:12px;line-height:1.65}.prompt{font-size:13px;line-height:1.55;color:rgba(255,255,255,.86);margin:8px 0}.pill{display:inline-flex;border:1px solid rgba(215,184,106,.28);background:rgba(215,184,106,.08);border-radius:999px;padding:4px 8px;font-size:11px;margin-top:6px}video{width:100%;aspect-ratio:9/16;max-height:70vh;border-radius:14px;background:#000;object-fit:contain;margin-top:10px}.link{display:block;margin-top:8px;color:#dcfce7;word-break:break-all;font-size:12px;font-weight:900}.empty{border:1px dashed rgba(255,255,255,.14);border-radius:18px;padding:18px;text-align:center;color:rgba(255,255,255,.62)}textarea{width:100%;min-height:130px;background:#08090c;color:#fff;border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:12px;font-size:13px;line-height:1.5}.overlay{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.52);opacity:0;visibility:hidden;transition:.2s}.overlay.show{opacity:1;visibility:visible}.drawer{position:fixed;top:0;left:-310px;width:300px;max-width:84vw;height:100dvh;z-index:100;background:#0d0e12;border-right:1px solid rgba(255,255,255,.10);padding:16px;transition:left .24s ease;box-shadow:30px 0 80px rgba(0,0,0,.45)}.drawer.open{left:0}.drawerHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.drawerHead b{font-size:18px}.nav{display:grid;gap:10px}.nav a,.nav button{width:100%;text-align:left;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.04);color:#fff;border-radius:15px;padding:14px 15px;font-size:15px;font-weight:900;text-decoration:none}.nav a.active{background:linear-gradient(90deg,rgba(255,255,255,.17),rgba(124,58,237,.24));border-color:rgba(124,58,237,.42)}.nav a.danger{color:#fecdd3;border-color:rgba(251,113,133,.28);background:rgba(251,113,133,.08)}@media(max-width:430px){.wrap{padding-left:10px;padding-right:10px}.brand b{font-size:18px}h1{font-size:33px}.card{padding:13px;border-radius:22px}}
</style>
</head>
<body><div class="bg"></div><div class="overlay" id="overlay"></div><aside class="drawer" id="drawer"><div class="drawerHead"><b>管理メニュー</b><button class="iconBtn" id="closeMenuBtn">✕</button></div><nav class="nav"><a href="./admin.html">ダッシュボード</a><a href="./admin.html#veo">Veo生成テスト</a><a href="./admin.html#result">生成結果確認</a><a class="active" href="./admin-video-history.html">生成動画履歴</a><a href="./admin.html#settings">API / 利用状況</a><a class="danger" href="./index.html">ログアウト</a></nav></aside><header class="top"><button class="iconBtn" id="menuBtn">☰</button><a class="brand" href="./admin.html"><div class="logo">▶</div><div><small>AI VIDEO STUDIO</small><b>FlowVid Studio</b></div></a><a class="btn secondary" style="width:auto;margin:0;padding:10px 13px;border-radius:999px" href="./admin.html">管理画面</a></header><main class="wrap"><h1>生成動画履歴</h1><p class="lead">generated_videos に保存された動画を確認します。Veoの結果JSONを貼れば、過去の生成動画もここに保存できます。</p><section class="card"><h2>履歴を読み込み</h2><button class="btn" id="loadBtn">生成動画を読み込む</button><div id="list"><div class="empty">まだ読み込んでいません</div></div></section><section class="card"><h2>手動保存</h2><p class="lead">Veo生成結果のJSONを貼ると video.uri を見つけてDBへ保存します。</p><textarea id="jsonInput" placeholder="ここにVeo生成結果JSONを貼る"></textarea><button class="btn" id="saveBtn">この動画をDBに保存</button><div id="saveStatus" class="status">待機中</div></section></main><script>
const $=id=>document.getElementById(id);function openMenu(){$('drawer').classList.add('open');$('overlay').classList.add('show')}function closeMenu(){$('drawer').classList.remove('open');$('overlay').classList.remove('show')}$('menuBtn').onclick=openMenu;$('closeMenuBtn').onclick=closeMenu;$('overlay').onclick=closeMenu;function esc(s){return String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]))}function fmt(d){try{return new Date(d).toLocaleString('ja-JP')}catch(_){return '-'}}function findUri(o){if(!o||typeof o!=='object')return'';if(o.video&&o.video.uri)return o.video.uri;if(o.uri&&String(o.uri).includes('/files/'))return o.uri;for(const k of Object.keys(o)){const r=findUri(o[k]);if(r)return r}return''}function findOperation(o){if(!o||typeof o!=='object')return'';if(o.operationName)return o.operationName;if(o.name&&String(o.name).includes('/operations/'))return o.name;for(const k of Object.keys(o)){const r=findOperation(o[k]);if(r)return r}return''}function setStatus(id,msg,bad=false){$(id).textContent=typeof msg==='string'?msg:JSON.stringify(msg,null,2);$(id).className='status'+(bad?' bad':'')}function render(rows){if(!rows||!rows.length){$('list').innerHTML='<div class="empty">保存済み動画はまだありません</div>';return}$('list').innerHTML=rows.map(r=>{const proxy=r.video_uri?'/api/veo-download?uri='+encodeURIComponent(r.video_uri):'';return `<div class="item"><b>${esc(r.model||'Veo')}</b><div class="pill">${esc(r.status||'-')} / ${Number(r.credit_cost||0)}円</div><div class="prompt">${esc(r.prompt||'プロンプトなし')}</div><div class="meta">${esc(r.aspect_ratio||'-')} ｜ ${Number(r.duration_seconds||0)}秒 ｜ ${fmt(r.created_at)}<br>${esc(r.operation_name||'')}</div>${proxy?`<video controls playsinline src="${proxy}"></video><a class="link" href="${proxy}" target="_blank" rel="noreferrer">動画を別タブで開く</a>`:''}</div>`}).join('')}async function load(){setStatus('saveStatus','履歴を読み込み中…');try{const res=await fetch('/api/generated-videos?limit=20');const data=await res.json();render(data.rows||[]);setStatus('saveStatus',data,!res.ok)}catch(e){setStatus('saveStatus',e.message||String(e),true)}}async function save(){try{const raw=$('jsonInput').value.trim();if(!raw){setStatus('saveStatus','JSONを貼ってください',true);return}const data=JSON.parse(raw);const operationName=findOperation(data);const videoUri=findUri(data);if(!operationName||!videoUri){setStatus('saveStatus','operationName または video.uri が見つかりません',true);return}const res=await fetch('/api/generated-videos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({operationName,videoUri,response:data,model:data.model||'models/veo-3.0-fast-generate-001',provider:'veo',status:'completed'})});const saved=await res.json();setStatus('saveStatus',saved,!res.ok);await load()}catch(e){setStatus('saveStatus','保存エラー：'+(e.message||String(e)),true)}}$('loadBtn').onclick=load;$('saveBtn').onclick=save;load();</script></body></html>
