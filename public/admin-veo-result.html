<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Veo結果 | FlowVid Studio</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;min-height:100%;overflow-x:hidden;background:#050506;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.wrap{width:100%;max-width:720px;margin:0 auto;padding:20px 14px 40px}h1{font-size:34px;letter-spacing:-.05em;line-height:1.1;margin:28px 0 18px}.lead{color:rgba(255,255,255,.62);line-height:1.7}.card{width:100%;max-width:100%;border:1px solid rgba(255,255,255,.14);border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));padding:16px;margin:12px 0;overflow:hidden}input{display:block;width:100%;max-width:100%;min-width:0;border:1px solid rgba(255,255,255,.14);border-radius:16px;background:#08090c;color:#fff;padding:13px;font-size:14px;overflow:hidden;text-overflow:ellipsis}button,a.btn{display:block;width:100%;max-width:100%;text-align:center;border:0;border-radius:16px;padding:14px;margin-top:12px;font-weight:900;color:#050506;background:linear-gradient(90deg,#fff,#d7b86a,#7c3aed);text-decoration:none}video{display:none;width:100%;max-width:100%;aspect-ratio:9/16;max-height:70vh;border-radius:16px;background:#000;margin-top:12px;object-fit:contain}.status{max-width:100%;overflow-x:auto;white-space:pre-wrap;word-break:break-word;border:1px solid rgba(134,239,172,.24);background:rgba(134,239,172,.08);color:#dcfce7;border-radius:16px;padding:12px;margin-top:12px;font-size:12px}.bad{border-color:rgba(251,113,133,.35);background:rgba(251,113,133,.10);color:#fecdd3}.link{color:#dcfce7;word-break:break-all;display:block;margin-top:10px}@media(max-width:430px){.wrap{padding-left:12px;padding-right:12px}h1{font-size:31px}.card{border-radius:22px;padding:12px}}</style></head><body><main class="wrap"><h1>Veo結果確認</h1><p class="lead">operationNameを入れると、生成状況を取得して動画を表示します。</p><section class="card"><input id="op" placeholder="models/veo-3.0-fast-generate-001/operations/..."><button id="check">生成結果を確認</button><video id="player" controls playsinline></video><a id="openLink" class="link" target="_blank" rel="noreferrer"></a><div id="status" class="status">待機中</div></section><a class="btn" href="./admin-veo.html">Veoテスト画面へ戻る</a></main><script>const $=id=>document.getElementById(id);function findUri(o){if(!o||typeof o!=='object')return'';if(o.video&&o.video.uri)return o.video.uri;if(o.uri&&String(o.uri).includes('/files/'))return o.uri;for(const k of Object.keys(o)){const r=findUri(o[k]);if(r)return r}return''}function setStatus(x,bad){$('status').textContent=typeof x==='string'?x:JSON.stringify(x,null,2);$('status').className='status'+(bad?' bad':'')}async function check(){const op=$('op').value.trim();if(!op){setStatus('operationNameを入力してください',true);return}setStatus('確認中…');try{const res=await fetch('/api/veo-status?operation='+encodeURIComponent(op));const data=await res.json();const uri=findUri(data);if(uri){const proxy='/api/veo-download?uri='+encodeURIComponent(uri);$('player').src=proxy;$('player').style.display='block';$('openLink').href=proxy;$('openLink').textContent='動画を別タブで開く';}setStatus(data,!res.ok)}catch(e){setStatus(e.message||String(e),true)}}$('check').onclick=check;const p=new URLSearchParams(location.search);const op=p.get('operation');if(op){$('op').value=op;check()}</script></body></html>
