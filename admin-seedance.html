<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Seedance テスト | FlowVid Studio</title>
<meta name="theme-color" content="#050506">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;650;750;850&family=Noto+Sans+JP:wght@500;700;800&display=swap');
:root{--bg:#050506;--line:rgba(255,255,255,.13);--muted:rgba(255,255,255,.58);--gold:#e8cb74;--blue:#9fcaff;--violet:#b895ff;--cyan:#63e3ff;--text:#f8fafc;--danger:#fb7185;--ok:#86efac}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:'Inter','Noto Sans JP',system-ui,sans-serif;letter-spacing:-.02em}body{background:radial-gradient(circle at 90% -10%,rgba(131,92,255,.24),transparent 30%),radial-gradient(circle at 0 0,rgba(99,227,255,.10),transparent 26%),linear-gradient(180deg,#08080d,#050608 45%,#030304)}.wrap{max-width:760px;margin:0 auto;padding:18px 14px 58px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}.brand{display:flex;align-items:center;gap:11px;text-decoration:none;color:#fff}.logo{width:48px;height:48px;border-radius:17px;display:grid;place-items:center;background:linear-gradient(135deg,#a5f3ff,#7c5cff 75%);box-shadow:0 18px 70px rgba(124,92,255,.28),inset 0 1px 0 rgba(255,255,255,.45);font-weight:850}.brand small{display:block;font-size:9px;letter-spacing:.2em;color:rgba(255,255,255,.42);font-weight:850}.brand b{font-size:21px;font-weight:850}.back{color:#fff;text-decoration:none;border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:999px;padding:10px 13px;font-weight:750}.hero,.card{border:1px solid var(--line);border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.025));box-shadow:0 20px 72px rgba(0,0,0,.36),inset 0 1px 0 rgba(255,255,255,.055)}.hero{padding:22px 18px;margin-bottom:14px}.pill{display:inline-flex;border:1px solid rgba(232,203,116,.32);background:rgba(232,203,116,.07);color:var(--gold);border-radius:999px;padding:7px 10px;font-size:10px;letter-spacing:.18em;font-weight:850}.hero h1{margin:14px 0 10px;font-size:34px;line-height:1.08;letter-spacing:-.065em;background:linear-gradient(135deg,#fff,#f4de9b 55%,#c8f2ff);-webkit-background-clip:text;color:transparent}.hero p{margin:0;color:var(--muted);font-size:14px;line-height:1.78}.card{padding:17px;margin-bottom:14px}label{display:block;color:rgba(255,255,255,.62);font-size:13px;font-weight:750;margin:14px 0 7px}textarea,input,select{width:100%;border:1px solid var(--line);background:#08090d;color:#fff;border-radius:16px;padding:13px;font-size:16px;outline:none}textarea{min-height:150px;line-height:1.6;resize:vertical}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.modeGrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:0 0 12px}.modeBtn{border:1px solid var(--line);background:#0b0d13;color:rgba(255,255,255,.64);border-radius:15px;padding:12px 8px;font-weight:850}.modeBtn.active{background:linear-gradient(90deg,#fff,#ead185,#c8a9ff);color:#050506;border-color:transparent}.help{color:rgba(255,255,255,.42);font-size:12px;line-height:1.65;margin:7px 0 0}.imagePreview{display:none;margin-top:10px;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#050506}.imagePreview.show{display:block}.imagePreview img{display:block;width:100%;max-height:240px;object-fit:contain}.btn{width:100%;border:0;border-radius:16px;padding:15px;font-weight:850;font-size:14px;background:linear-gradient(90deg,#fff,#ead185,#c8a9ff);color:#050506;margin-top:14px}.btn.secondary{background:#20242d;color:rgba(255,255,255,.78);border:1px solid var(--line)}.btn:disabled{opacity:.55}.status{display:none;white-space:pre-wrap;word-break:break-word;border:1px solid rgba(159,202,255,.25);background:rgba(159,202,255,.07);color:#dbeafe;border-radius:16px;padding:12px;margin-top:12px;font-size:12px;line-height:1.6;max-height:340px;overflow:auto}.status.show{display:block}.status.bad{border-color:rgba(251,113,133,.35);background:rgba(251,113,133,.10);color:#fecdd3}.videoBox{display:none;border:1px solid rgba(134,239,172,.24);background:rgba(134,239,172,.06);border-radius:18px;padding:12px;margin-top:12px}.videoBox.show{display:block}.videoBox h2{font-size:18px;margin:0 0 10px}.videoBox video{display:block;width:100%;aspect-ratio:9/16;max-height:72vh;background:#000;border-radius:14px;object-fit:contain}.link{display:block;margin-top:10px;color:#dcfce7;word-break:break-all;font-size:13px;font-weight:850}.note{color:rgba(255,255,255,.38);font-size:12px;line-height:1.7;text-align:center;margin-top:16px}@media(max-width:430px){.wrap{padding:16px 12px 44px}.brand b{font-size:20px}.brand small{font-size:8px}.hero h1{font-size:32px}.grid,.modeGrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="wrap">
<header class="top"><a class="brand" href="./index.html"><div class="logo">▶</div><div><small>AI VIDEO STUDIO</small><b>FlowVid Studio</b></div></a><a class="back" href="./admin.html">管理へ</a></header>
<section class="hero"><span class="pill">SEEDANCE TEST</span><h1>Seedance 2.0 接続テスト</h1><p>OpenRouter経由でSeedance 2.0を呼び出します。テキスト・画像から動画・リファレンス動画を分けて確認できます。</p></section>
<section class="card">
<div class="modeGrid"><button class="modeBtn active" data-mode="text">テキスト</button><button class="modeBtn" data-mode="image">画像から動画</button><button class="modeBtn" data-mode="reference">リファレンス</button></div>
<label>モデル</label>
<select id="model"><option value="bytedance/seedance-2.0">bytedance/seedance-2.0</option><option value="bytedance/seedance-2.0-lite">bytedance/seedance-2.0-lite</option></select>
<label>プロンプト</label>
<textarea id="prompt">A cinematic vertical smartphone video of a glossy perfume bottle standing on a black reflective surface, neon pink and blue rim light, soft particles, slow camera push-in, premium product ad style, high quality.</textarea>
<div id="imagePanel" style="display:none"><label id="imageLabel">画像URL</label><input id="imageUrl" type="url" placeholder="https://example.com/reference-image.jpg"><p class="help" id="imageHelp">公開URLの画像でテストします。スマホ内の画像アップロードは次工程でSupabase Storageに接続します。</p><div class="imagePreview" id="imagePreview"><img id="previewImg" alt="reference preview"></div></div>
<div class="grid"><div><label>アスペクト比</label><select id="aspect"><option value="9:16">9:16 スマホ縦</option><option value="16:9">16:9 横</option><option value="1:1">1:1 正方形</option></select></div><div><label>長さ</label><select id="duration"><option value="5">5秒</option><option value="8">8秒</option></select></div></div>
<div class="grid"><div><label>解像度</label><select id="resolution"><option value="720p">720p</option><option value="480p">480p</option><option value="1080p">1080p</option></select></div><div><label>音声</label><select id="audio"><option value="false">なし</option><option value="true">あり</option></select></div></div>
<button class="btn" id="startBtn">Seedance生成を開始</button>
<button class="btn secondary" id="statusBtn">生成状況を確認</button>
<div class="videoBox" id="videoBox"><h2>生成された動画</h2><video id="player" controls playsinline></video><a id="openLink" class="link" target="_blank" rel="noreferrer">動画を別タブで開く</a></div>
<div class="status" id="status"></div>
</section>
<p class="note">テスト中はOpenRouterの残高を見ながら進めてください。APIキーは画面に表示しません。</p>
</main>
<script>
const $=id=>document.getElementById(id);let jobId=localStorage.getItem('flowvidSeedanceJobId')||'';let mode='text';
function showStatus(data,bad=false){const el=$('status');el.textContent=typeof data==='string'?data:JSON.stringify(data,null,2);el.className='status show'+(bad?' bad':'')}
function findVideoUrl(data){if(!data||typeof data!=='object')return'';if(typeof data.videoUrl==='string'&&data.videoUrl)return data.videoUrl;if(typeof data.video_url==='string'&&data.video_url)return data.video_url;if(typeof data.url==='string'&&/\.mp4|video|blob|http/i.test(data.url))return data.url;if(data.output){const r=findVideoUrl(data.output);if(r)return r}if(data.response){const r=findVideoUrl(data.response);if(r)return r}for(const k of Object.keys(data)){const v=data[k];if(v&&typeof v==='object'){const r=findVideoUrl(v);if(r)return r}}return''}
function showVideo(url){if(!url)return;const box=$('videoBox');$('player').src=url;$('openLink').href=url;box.classList.add('show')}
function setMode(next){mode=next;document.querySelectorAll('.modeBtn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));$('imagePanel').style.display=mode==='text'?'none':'block';$('imageLabel').textContent=mode==='image'?'最初のフレーム画像URL':'リファレンス画像URL';$('imageHelp').textContent=mode==='image'?'この画像を最初のフレームとして動かすテストです。':'この画像のキャラ・商品・雰囲気を参考にして動画化するテストです。';}
function preview(){const url=$('imageUrl').value.trim();if(!url){$('imagePreview').classList.remove('show');return}$('previewImg').src=url;$('imagePreview').classList.add('show')}
async function start(){const imageUrl=$('imageUrl').value.trim();if(mode!=='text'&&!imageUrl){showStatus('画像URLを入れてください。',true);return}if(!confirm('Seedance 2.0の生成を開始します。OpenRouter残高を消費する可能性があります。実行しますか？'))return;$('startBtn').disabled=true;showStatus('送信中…');$('videoBox').classList.remove('show');try{const body={model:$('model').value,prompt:$('prompt').value,duration:$('duration').value,resolution:$('resolution').value,aspect_ratio:$('aspect').value,generate_audio:$('audio').value==='true'};if(mode==='image')body.first_frame_url=imageUrl;if(mode==='reference')body.reference_url=imageUrl;const res=await fetch('/api/seedance-start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const data=await res.json();jobId=data.jobId||data.id||data.response?.id||'';if(jobId)localStorage.setItem('flowvidSeedanceJobId',jobId);showVideo(findVideoUrl(data));showStatus(data,!res.ok)}catch(e){showStatus(e.message||String(e),true)}finally{$('startBtn').disabled=false}}
async function status(){if(!jobId){showStatus('まだjobIdがありません。先に生成を開始してください。',true);return}showStatus('確認中…');try{const res=await fetch('/api/seedance-status?id='+encodeURIComponent(jobId));const data=await res.json();showVideo(findVideoUrl(data));showStatus(data,!res.ok)}catch(e){showStatus(e.message||String(e),true)}}
document.querySelectorAll('.modeBtn').forEach(btn=>btn.onclick=()=>setMode(btn.dataset.mode));$('imageUrl').oninput=preview;$('startBtn').onclick=start;$('statusBtn').onclick=status;
</script>
</body>
</html>
