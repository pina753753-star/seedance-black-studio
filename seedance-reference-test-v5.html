<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Seedance Test v5 | FlowVid</title><style>*{box-sizing:border-box}body{margin:0;background:#050506;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Hiragino Sans','Noto Sans JP',system-ui,sans-serif;letter-spacing:-.03em}.wrap{max-width:720px;margin:auto;padding:18px 14px 54px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.brand{font-size:24px;font-weight:820}.back{color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:10px 14px;font-weight:760}.hero{border:1px solid rgba(255,255,255,.14);border-radius:28px;padding:22px;background:linear-gradient(135deg,rgba(124,92,255,.7),rgba(255,255,255,.04));box-shadow:0 24px 90px rgba(124,92,255,.18)}.hero small{color:#f5dc8c;font-weight:820;letter-spacing:.18em}.hero h1{font-size:34px;line-height:1.05;margin:12px 0 8px}.hero p{margin:0;color:rgba(255,255,255,.72);line-height:1.7}.card{margin-top:16px;border-radius:28px;background:#111318;border:1px solid rgba(255,255,255,.12);padding:18px}.mode{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}.mode button{border:0;border-radius:16px;padding:14px;font-weight:820;background:#090a0f;color:#fff}.mode button.active{background:linear-gradient(90deg,#fff4c7,#d4a7ff);color:#050506}label{display:block;margin:14px 0 7px;color:rgba(255,255,255,.82);font-weight:820}textarea,input,select{width:100%;border:1px solid rgba(255,255,255,.10);background:#090a0f;color:#fff;border-radius:16px;padding:14px;font-size:16px}textarea{min-height:190px;line-height:1.65}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.upload{border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:14px;background:#0f1118}.upload button,.primary,.secondary{width:100%;border:0;border-radius:16px;padding:15px;font-weight:820;font-size:15px}.upload button{background:#252936;color:#fff}.primary{background:linear-gradient(90deg,#fff4c7,#d4a7ff);color:#050506;margin-top:14px}.secondary{background:#252936;color:#fff;margin-top:10px}.meta{font-size:12px;color:rgba(255,255,255,.62);line-height:1.6;margin-top:8px}.useInfo{margin:10px 0 0;padding:10px 12px;border-radius:14px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.72);font-size:12px;line-height:1.5;font-weight:720}.previews{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}.previewItem{position:relative;border-radius:18px;background:#080a10;overflow:hidden;border:1px solid rgba(255,255,255,.12);min-height:132px}.previewItem img{display:block;width:100%;height:132px;object-fit:cover;background:#000}.previewItem small{position:absolute;left:8px;bottom:8px;max-width:calc(100% - 16px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:rgba(0,0,0,.64);color:#fff;border-radius:999px;padding:5px 8px;font-size:12px;font-weight:800}.previewItem .del{position:absolute;right:8px;bottom:8px;width:30px;height:30px;border-radius:999px;border:1px solid rgba(255,255,255,.22);background:rgba(0,0,0,.68);color:#fff;font-size:18px;padding:0;z-index:4}.previewItem.is-unused{opacity:.38;filter:grayscale(.8)}.previewItem.is-unused:after{content:'未使用';position:absolute;right:8px;top:8px;background:rgba(0,0,0,.72);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:4px 7px;font-size:10px;font-weight:800;color:#ddd}.previewItem.is-active:before{content:'使用中';position:absolute;right:8px;top:8px;background:rgba(134,239,172,.16);border:1px solid rgba(134,239,172,.35);border-radius:999px;padding:4px 7px;font-size:10px;font-weight:800;color:#dcfce7;z-index:3}.previewItem.is-main:before{content:'最初のフレーム';position:absolute;right:8px;top:8px;background:rgba(147,197,253,.16);border:1px solid rgba(147,197,253,.35);border-radius:999px;padding:4px 7px;font-size:10px;font-weight:800;color:#dbeafe;z-index:3}.jobBox{display:none;margin-top:12px;border:1px solid rgba(215,184,106,.3);background:rgba(215,184,106,.08);border-radius:16px;padding:12px}.jobBox.show{display:block}.jobBox b{display:block;margin-bottom:6px}.jobBox code{display:block;word-break:break-all;color:#f8e7b5;font-size:12px}.status{display:none;margin-top:12px;background:#101827;color:#dbeafe;border:1px solid rgba(147,197,253,.24);border-radius:16px;padding:12px;white-space:pre-wrap;word-break:break-word;font-size:12px;line-height:1.6;max-height:360px;overflow:auto}.status.show{display:block}.status.bad{background:#2b1017;color:#fecdd3;border-color:rgba(251,113,133,.35)}.video{display:none;margin-top:12px;background:#07120b;border:1px solid rgba(134,239,172,.28);border-radius:18px;padding:12px}.video.show{display:block}.video video{width:100%;aspect-ratio:9/16;max-height:72vh;background:#000;border-radius:14px}.note{text-align:center;color:rgba(255,255,255,.38);font-size:12px;line-height:1.6;margin-top:16px}@media(max-width:430px){.grid,.mode{grid-template-columns:1fr}.previews{grid-template-columns:repeat(3,1fr)}.previewItem,.previewItem img{height:106px;min-height:106px}.hero h1{font-size:31px}}</style></head><body><main class="wrap"><header class="top"><div class="brand">FlowVid Studio</div><a class="back" href="./admin.html">管理へ</a></header><section class="hero"><small>SEEDANCE REFERENCE TEST v5</small><h1>リファレンス専用テスト</h1><p>URLではなく、画像サムネイルで使用画像を確認できます。不要な画像は×で削除できます。</p></section><section class="card"><div class="mode"><button id="referenceBtn" class="active" type="button">リファレンス</button><button id="imageBtn" type="button">画像から動画</button></div><label>モデル</label><select id="model"><option value="bytedance/seedance-2.0">bytedance/seedance-2.0</option><option value="bytedance/seedance-2.0-lite">bytedance/seedance-2.0-lite</option></select><label>プロンプト</label><textarea id="prompt">アップロードした絵コンテ画像を参考資料として使用してください。紙面レイアウト、表、文字、見出し、ページ番号、枠線、説明文は映像化しないでください。参照するのは写真シーンの内容、雰囲気、構図、光、自然な動きだけです。5秒の実写風ショートCM動画。9:16、720p、音声なし。文字、字幕、ロゴは入れないでください。</textarea><label id="imageLabel">リファレンス画像</label><div class="upload"><input id="file" type="file" accept="image/png,image/jpeg,image/webp" multiple style="display:none"><button id="pick" type="button">画像を選択してアップロード</button><div class="meta" id="meta">最大5枚まで選択できます。</div><div class="useInfo" id="useInfo">リファレンス：最大5枚まで画像を使えます。</div><div class="previews" id="previews"></div></div><div class="grid"><div><label>アスペクト比</label><select id="aspect"><option value="9:16">9:16 スマホ縦</option><option value="16:9">16:9 横</option><option value="1:1">1:1 正方形</option></select></div><div><label>長さ</label><select id="duration"><option value="5">5秒</option><option value="8">8秒</option></select></div></div><div class="grid"><div><label>解像度</label><select id="resolution"><option value="720p">720p</option><option value="480p">480p</option><option value="1080p">1080p</option></select></div><div><label>音声</label><select id="audio"><option value="false">なし</option><option value="true">あり</option></select></div></div><button class="primary" id="start" type="button">Seedance生成を開始</button><button class="secondary" id="check" type="button">生成状況を確認</button><div class="jobBox" id="jobBox"><b>生成タスク</b><code id="jobText"></code></div><div class="video" id="videoBox"><video id="player" controls playsinline></video><a id="openLink" target="_blank" rel="noreferrer" style="display:block;margin-top:10px;color:#dcfce7;word-break:break-all">動画を別タブで開く</a></div><div class="status" id="status"></div></section><p class="note">このページは v5。URL羅列は表示しません。</p></main><script>const $=id=>document.getElementById(id);let mode='reference';let jobId=localStorage.getItem('flowvidSeedanceJobId')||'';let uploaded=[];let autoTimer=null;function status(data,bad=false){const el=$('status');el.textContent=typeof data==='string'?data:JSON.stringify(data,null,2);el.className='status show'+(bad?' bad':'')}function showJob(id){if(!id)return;$('jobText').textContent=id;$('jobBox').classList.add('show')}function saveUploaded(){localStorage.setItem('flowvidSeedanceImagesV5',JSON.stringify(uploaded.map(x=>({url:x.url,name:x.name}))))}function applyUseState(){const items=[...document.querySelectorAll('.previewItem')];items.forEach((item,i)=>{item.classList.remove('is-active','is-unused','is-main');if(mode==='image'){if(i===0)item.classList.add('is-main');else item.classList.add('is-unused')}else item.classList.add('is-active')});$('useInfo').textContent=!items.length?(mode==='image'?'画像から動画：画像を1枚アップロードしてください。':'リファレンス：最大5枚まで画像を使えます。'):(mode==='image'?'画像から動画：図1だけを最初のフレームとして使います。図2以降は使いません。':'リファレンス：表示中の画像をまとめて参考画像として使います。')}function setMode(next){mode=next;$('referenceBtn').classList.toggle('active',mode==='reference');$('imageBtn').classList.toggle('active',mode==='image');$('imageLabel').textContent=mode==='image'?'最初のフレーム画像':'リファレンス画像';localStorage.setItem('flowvidSeedanceMode',mode);applyUseState()}function readFile(file){return new Promise((ok,ng)=>{const r=new FileReader();r.onload=()=>ok(String(r.result||''));r.onerror=()=>ng(r.error||new Error('File read failed'));r.readAsDataURL(file)})}function render(){const box=$('previews');box.innerHTML='';uploaded.forEach((item,i)=>{const div=document.createElement('div');div.className='previewItem';div.dataset.index=String(i);div.innerHTML='<img alt="preview"><small></small><button class="del" type="button">×</button>';div.querySelector('img').src=item.preview||item.url;div.querySelector('small').textContent='図'+(i+1)+'｜'+(item.name||'image');box.appendChild(div)});applyUseState();saveUploaded()}async function uploadFiles(files){files=Array.from(files||[]).slice(0,5);if(!files.length)return;uploaded=[];$('meta').textContent=files.length+'枚をアップロード中…';for(let i=0;i<files.length;i++){const file=files[i];$('meta').textContent=(i+1)+'/'+files.length+'枚目をアップロード中…';const dataUrl=await readFile(file);uploaded.push({name:file.name,preview:dataUrl,url:''});render();const res=await fetch('/api/upload-reference-image',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dataUrl,filename:file.name,contentType:file.type||'image/jpeg'})});const data=await res.json();if(!res.ok||!data.ok){$('meta').textContent='アップロード失敗';status(data,true);return}uploaded[i].url=data.publicUrl||data.url||'';render()}$('meta').textContent='アップロード完了：'+uploaded.length+'枚';status({ok:true,uploaded:true,count:uploaded.length})}function removeImage(i){uploaded.splice(i,1);$('meta').textContent=uploaded.length?'使用中：'+uploaded.length+'枚':'画像は未選択です。';render()}function findVideo(data){if(!data||typeof data!=='object')return'';for(const k of ['videoUrl','video_url','output_url','download_url','signed_url','url','uri']){const v=data[k];if(typeof v==='string'&&/^https?:\/\//.test(v))return v}for(const k of Object.keys(data)){const r=findVideo(data[k]);if(r)return r}return''}function showVideo(url){if(!url)return;$('player').src=url;$('openLink').href=url;$('videoBox').classList.add('show')}function extractJob(data){return data.jobId||data.id||data.response?.id||data.response?.data?.id||data.response?.request_id||data.raw?.id||''}async function start(){const urls=uploaded.map(x=>x.url).filter(Boolean);const firstUrl=urls[0];if(!firstUrl){status('画像をアップロードしてください。',true);return}if(!confirm('Seedance 2.0の生成を開始します。実行しますか？'))return;$('start').disabled=true;status('送信中…');try{const body={model:$('model').value,prompt:$('prompt').value,duration:$('duration').value,resolution:$('resolution').value,aspect_ratio:$('aspect').value,generate_audio:$('audio').value==='true'};if(mode==='image')body.first_frame_url=firstUrl;else{body.reference_url=firstUrl;body.reference_urls=urls}const res=await fetch('/api/seedance-start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const data=await res.json();jobId=extractJob(data);if(jobId){localStorage.setItem('flowvidSeedanceJobId',jobId);localStorage.setItem('flowvidLastSeedanceJobId',jobId);showJob(jobId)}showVideo(findVideo(data));status(data,!res.ok);if(jobId)startAutoCheck()}catch(e){status(e.message||String(e),true)}finally{$('start').disabled=false}}async function check(){if(!jobId){status('まだjobIdがありません。',true);return}showJob(jobId);status('確認中…');try{const res=await fetch('/api/seedance-status?id='+encodeURIComponent(jobId));const data=await res.json();showVideo(findVideo(data));status(data,!res.ok)}catch(e){status(e.message||String(e),true)}}function startAutoCheck(){if(autoTimer)clearInterval(autoTimer);check();autoTimer=setInterval(check,15000);setTimeout(()=>{if(autoTimer)clearInterval(autoTimer)},5*60*1000)}$('referenceBtn').onclick=()=>setMode('reference');$('imageBtn').onclick=()=>setMode('image');$('pick').onclick=()=>$('file').click();$('file').onchange=e=>uploadFiles(e.target.files);$('previews').onclick=e=>{const btn=e.target.closest('.del');if(!btn)return;removeImage(Number(btn.closest('.previewItem').dataset.index||0))};$('start').onclick=start;$('check').onclick=check;try{uploaded=JSON.parse(localStorage.getItem('flowvidSeedanceImagesV5')||'[]').map(x=>({name:x.name,url:x.url,preview:x.url})).filter(x=>x.url);render()}catch(_){uploaded=[]}setMode(localStorage.getItem('flowvidSeedanceMode')==='image'?'image':'reference');if(jobId)showJob(jobId);</script></body></html>
