<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>FlowVid Studio</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#050b12;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Hiragino Sans','Noto Sans JP',system-ui,sans-serif}.wrap{max-width:760px;margin:auto;padding:22px 12px 70px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}.brand{display:flex;gap:12px;align-items:center;text-decoration:none;color:#fff}.logo{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,#fff,#7dd3fc,#8b5cf6);display:grid;place-items:center;color:#050506;font-weight:800}.brand b{font-size:25px;font-weight:800;letter-spacing:-.04em}.home{width:44px;height:44px;border-radius:50%;background:#1b2029;color:#fff;display:grid;place-items:center;text-decoration:none}.tabs{display:grid;grid-template-columns:repeat(3,1fr);background:#1b1f27;border-radius:17px;overflow:hidden;margin-bottom:14px}.tabs button{border:0;background:transparent;color:#777;padding:16px 4px;font-weight:700}.tabs .on{background:#343742;color:#fff}.card,.now,.done,.old{background:#1b1e25;border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:14px}.assets{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}.add,.thumb{height:104px;border-radius:15px;background:#101319;border:1px solid rgba(255,255,255,.07);overflow:hidden;position:relative}.add{display:grid;place-items:center;text-align:center;font-weight:700}.add input{position:absolute;inset:0;opacity:0}.add b{display:block;font-size:34px;font-weight:600}.add span{font-size:13px;color:#aaa}.thumb img{width:100%;height:100%;object-fit:cover}.thumb small{position:absolute;left:7px;bottom:7px;background:rgba(0,0,0,.65);border-radius:8px;padding:3px 6px;font-size:11px}.thumb .remove{position:absolute;right:6px;top:6px;width:26px;height:26px;border:0;border-radius:50%;background:rgba(0,0,0,.65);color:#fff;font-size:18px;font-weight:900;line-height:1;display:grid;place-items:center}.prompt{background:#111319;border:1px solid rgba(255,255,255,.07);border-radius:18px;overflow:hidden}textarea{width:100%;min-height:178px;border:0;background:transparent;color:#fff;padding:16px;font-size:16px;line-height:1.65;outline:0;resize:vertical;font-weight:500}textarea::placeholder{color:#666}.tools{display:flex;gap:14px;border-top:1px solid rgba(255,255,255,.06);padding:11px 14px}.tools button{border:0;background:transparent;color:#bbb;font-weight:700}.tools button:last-child{margin-left:auto}.settings{margin-top:12px;background:#1b1e25;border:1px solid rgba(255,255,255,.08);border-radius:17px;overflow:hidden}summary{list-style:none;padding:16px 18px;font-weight:800;display:flex;justify-content:space-between}summary:after{content:'⌄';font-size:24px}.settings[open] summary:after{transform:rotate(180deg)}.settingsBody{padding:0 14px 14px;display:grid;gap:10px}.field label{display:block;color:#999;font-size:12px;margin-bottom:6px;font-weight:700}.field select{width:100%;background:#0e1117;color:#fff;border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:12px}.create{width:100%;border:0;border-radius:18px;margin-top:16px;padding:18px 14px;background:linear-gradient(90deg,#eee8ff,#8ed8ff);font-size:21px;font-weight:800;color:#050506}.create:disabled{opacity:.55}.mini{display:flex;justify-content:flex-end;gap:10px;align-items:center;margin-top:12px;color:#777;font-size:12px}.pill{display:inline-flex;background:rgba(134,239,172,.08);border:1px solid rgba(134,239,172,.25);color:#dcfce7;border-radius:999px;padding:7px 10px;font-weight:800}.pill.bad{background:rgba(251,113,133,.1);border-color:rgba(251,113,133,.3);color:#fecdd3}.now,.done{display:none;margin-top:16px}.show{display:block}.row{display:flex;justify-content:space-between;align-items:center}.spin{width:22px;height:22px;border-radius:50%;border:3px solid rgba(255,255,255,.18);border-top-color:#8ed8ff;animation:s 1s linear infinite}@keyframes s{to{transform:rotate(360deg)}}.bar{height:8px;background:#0d1015;border-radius:999px;overflow:hidden;margin-top:12px}.bar span{display:block;height:100%;width:42%;background:linear-gradient(90deg,#fff,#8ed8ff,#8b5cf6);animation:m 1.2s ease-in-out infinite alternate}@keyframes m{to{transform:translateX(138%)}}.job{margin-top:9px;color:#777;font-size:11px;word-break:break-all}.log{display:none!important}.done video,.old video{width:100%;max-height:420px;background:#000;border-radius:16px}.head,.section{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.icons{display:flex;gap:8px;margin-top:10px}.icon{width:43px;height:38px;border:0;border-radius:12px;background:#2b303a;color:#fff;text-decoration:none;display:grid;place-items:center;font-size:18px}.section{margin:22px 2px 10px}.section h2{font-size:17px;margin:0;font-weight:800}.section button{border:1px solid rgba(255,255,255,.08);background:#1b2029;color:#fff;border-radius:13px;padding:8px 10px;font-weight:700}.history{display:grid;gap:12px}.oldTop{margin-bottom:9px;color:#aaa;font-weight:700}.empty{border:1px dashed rgba(255,255,255,.1);border-radius:18px;padding:18px;text-align:center;color:#888}@media(min-width:620px){.assets{grid-template-columns:repeat(5,1fr)}.settingsBody{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<main class="wrap">
<header class="top"><a class="brand" href="./index.html"><div class="logo">▶</div><b>FlowVid Studio</b></a><a class="home" href="./index.html">⌂</a></header>
<div class="tabs"><button class="on" data-mode="reference_to_video">リファレンス</button><button data-mode="image_to_video">画像から動画</button><button data-mode="text_to_video">テキストから動画</button></div>
<section class="card">
  <div class="assets" id="assets"><label class="add"><input id="file" type="file" accept="image/png,image/jpeg,image/webp" multiple><div><b>＋</b><span>画像追加</span></div></label></div>
  <div class="prompt"><textarea id="prompt" placeholder="キャラクター、商品、シーン、動きを入力してください。"></textarea><div class="tools"><button id="guide" type="button">▱ ユーザーガイド</button><button id="sample" type="button">サンプルを試す ›</button></div></div>
  <details class="settings"><summary>設定</summary><div class="settingsBody"><div class="field"><label>モデル</label><select id="model"><option value="bytedance/seedance-2.0">Seedance 2.0</option><option value="bytedance/seedance-2.0-lite">Seedance 2.0 Lite</option></select></div><div class="field"><label>アスペクト比</label><select id="aspect"><option value="9:16">9:16 スマホ縦</option><option value="16:9">16:9 横動画</option><option value="1:1">1:1 正方形</option></select></div><div class="field"><label>長さ</label><select id="duration"><option value="5">5秒</option><option value="8">8秒</option><option value="10">10秒</option><option value="15">15秒</option></select></div><div class="field"><label>解像度</label><select id="resolution"><option value="720p">720p</option><option value="480p">480p</option><option value="1080p">1080p</option></select></div><div class="field"><label>音声</label><select id="audio"><option value="false">なし</option><option value="true">あり</option></select></div></div></details>
  <button class="create" id="create">作成する ✦ 80</button>
  <div class="mini"><span id="modeLabel">リファレンス</span></div>
  <pre class="log" id="log"></pre>
</section>
<section class="now" id="now"><div class="row"><b>処理中</b><span class="spin"></span></div><div class="bar"><span></span></div><div class="job" id="job">jobId待機中</div></section>
<section class="done" id="done"><div class="head"><b>完成動画</b><span class="pill">completed</span></div><video id="video" controls playsinline></video><div class="icons"><a class="icon" id="open" target="_blank" rel="noreferrer">↗</a><a class="icon" id="download" download>↓</a><button class="icon" id="copy" type="button">⛓</button><button class="icon" id="rerun" type="button">↻</button></div></section>
<section class="section"><h2>過去動画</h2><button id="clear" type="button">消去</button></section>
<div class="history" id="history"><div class="empty">まだ動画がありません</div></div>
</main>
<script src="./flowvid-history.js?v=105"></script>
<script src="./flowvid-open-inline.js?v=1"></script>
<script>
const $=id=>document.getElementById(id);
const DRAFT_KEY='flowvidGenerateDraft';
function readDraft(){try{return JSON.parse(localStorage.getItem(DRAFT_KEY)||'{}')}catch(_){return {}}}
function writeDraft(patch){const d={...readDraft(),...patch,updatedAt:new Date().toISOString()};localStorage.setItem(DRAFT_KEY,JSON.stringify(d));return d}
let draft=readDraft();
let mode=draft.mode||'reference_to_video',urls=Array.isArray(draft.referenceUrls)?draft.referenceUrls.filter(Boolean):[],files=[],jobId='',pollingUrl='',timer=null,started=0,lastPrompt='';
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function modeName(m){return m==='text_to_video'?'テキストから動画':m==='image_to_video'?'画像から動画':'リファレンス'}
function notice(t,b=false){}
function log(x,b=false){}
function getPlan(){return localStorage.getItem('flowvidPlan')||localStorage.getItem('plan')||'free'}
function isPaid(){return /^(paid|pro|premium|business|creator)$/i.test(getPlan())}
function persistDraft(){writeDraft({mode,prompt:$('prompt')?.value||'',model:$('model')?.value||'bytedance/seedance-2.0',aspect:$('aspect')?.value||'9:16',duration:$('duration')?.value||'5',resolution:$('resolution')?.value||'720p',audio:$('audio')?.value||'false',referenceUrls:urls})}
function creditEstimate(){const duration=Number($('duration')?.value||5);const resolution=$('resolution')?.value||'720p';const refs=mode==='text_to_video'?0:Math.max(1,urls.length||files.length||1);let credits=80;credits+=Math.max(0,duration-5)*15;if(resolution==='1080p')credits+=100;if(resolution==='480p')credits-=20;if(mode==='reference_to_video')credits+=Math.max(0,refs-1)*10;if(mode==='text_to_video')credits-=10;if($('audio')?.value==='true')credits+=15;return Math.max(50,credits)}
function updateCreditUi(){const c=creditEstimate();$('create').textContent='作成する ✦ '+c;persistDraft();return c}
function setMode(m){mode=m;document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.mode===m));$('modeLabel').textContent=modeName(m);$('assets').style.display=m==='text_to_video'?'none':'grid';$('file').multiple=m==='reference_to_video';localStorage.setItem('flowvidGenerateMode',m);if(mode==='text_to_video')urls=[];updateCreditUi();renderAssets()}
function readFile(f){return new Promise((ok,ng)=>{const r=new FileReader();r.onload=()=>ok(String(r.result||''));r.onerror=()=>ng(r.error);r.readAsDataURL(f)})}
function removeAsset(index){if(Number.isNaN(index)||index<0)return;if(files.length){files.splice(index,1)}else{urls.splice(index,1)}$('file').value='';persistDraft();renderAssets()}
function renderAssets(){const box=$('assets'),add=box.querySelector('.add');box.querySelectorAll('.thumb').forEach(el=>el.remove());const items=files.length?files.map(f=>({src:URL.createObjectURL(f)})):urls.map(u=>({src:u}));items.forEach((it,i)=>{const d=document.createElement('div');d.className='thumb';d.innerHTML='<img src="'+esc(it.src)+'"><button class="remove" type="button" data-index="'+i+'" aria-label="画像を削除">×</button><small>図'+(i+1)+'</small>';box.insertBefore(d,add)});updateCreditUi()}
async function upload(fs){files=Array.from(fs||[]).slice(0,mode==='reference_to_video'?9:1);urls=[];renderAssets();if(!files.length)return;for(let i=0;i<files.length;i++){const dataUrl=await readFile(files[i]);const res=await fetch('/api/upload-reference-image',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dataUrl,filename:files[i].name,contentType:files[i].type||'image/jpeg'})});const data=await res.json();if(!res.ok||!data.ok)return;urls.push(data.publicUrl||data.url);writeDraft({mode,referenceUrls:urls})}files=[];renderAssets();persistDraft()}
function sample(){if(mode==='text_to_video')return 'スマホ縦動画。日本のアウトドア施設で、家族が芝生の遊び場へ向かい、子どもが走り出す。自然光、明るいCMトーン、実写風、高品質、5秒。文字、字幕、ロゴは入れない。';if(mode==='image_to_video')return 'アップロードした画像を最初のフレームとして使い、自然なカメラワークで実写風ショート動画にしてください。人物や背景の雰囲気を保ち、やわらかい光で5秒。文字、字幕、ロゴは入れない。';return '図1〜図9を時系列の参考画像として使ってください。紙面・文字・番号は映像化せず、各画像のシーン内容、家族の動き、光、雰囲気だけを参考にしてください。実写風CM。文字・字幕・ロゴなし。'}
function findVideo(d){return(d&&d.done===true&&typeof d.videoUrl==='string'&&/^https?:\/\//.test(d.videoUrl))?d.videoUrl:''}
function extractPollingUrl(d){if(!d||typeof d!=='object')return'';for(const k of ['pollingUrl','polling_url','statusUrl','status_url']){const v=d[k];if(typeof v==='string'&&/^https?:\/\//.test(v))return v}for(const k of Object.keys(d)){const r=extractPollingUrl(d[k]);if(r)return r}return''}
function extractJobId(d){if(!d||typeof d!=='object')return'';for(const k of ['jobId','job_id','id','request_id']){const v=d[k];if(typeof v==='string'&&v.trim())return v.trim()}for(const k of Object.keys(d)){const r=extractJobId(d[k]);if(r)return r}return''}
function done(d){return d?.done===true}
function failed(d){const s=String(d?.jobStatus||d?.status||d?.response?.status||d?.response?.data?.status||'').toLowerCase();return ['failed','error','cancelled','canceled'].includes(s)||Number(d?.status) >= 400}
function normalizeHistoryItem(it){const url=it?.url||it?.video_url||it?.video_uri||it?.src||'';if(!/^https?:\/\//.test(url))return null;if(/openrouter\.ai\/api\/v1\/videos\/[^/?#]+\/?(?:[?#].*)?$/i.test(url))return null;return{url,prompt:it.prompt||it.title||'生成動画',mode:it.mode||mode,jobId:it.jobId||it.job_id||'',createdAt:it.createdAt||it.created_at||new Date().toISOString()}}
function save(item){const current=JSON.parse(localStorage.getItem('flowvidHistory')||'[]').map(normalizeHistoryItem).filter(Boolean);const next=normalizeHistoryItem(item);if(next&&!current.some(v=>v.url===next.url))current.unshift(next);localStorage.setItem('flowvidHistory',JSON.stringify(current.slice(0,20)))}
function historyCard(it){return'<article class="old"><div class="oldTop">'+esc((it.prompt||'生成動画').slice(0,42))+'</div><video controls playsinline src="'+esc(it.url)+'"></video><div class="icons"><a class="icon" href="'+esc(it.url)+'" target="_blank">↗</a><a class="icon" href="'+esc(it.url)+'" download>↓</a></div></article>'}
function renderHistoryList(list){$('history').innerHTML=list.length?list.map(historyCard).join(''):'<div class="empty">まだ動画がありません</div>'}
async function renderHistory(){const local=JSON.parse(localStorage.getItem('flowvidHistory')||'[]').map(normalizeHistoryItem).filter(Boolean);try{const res=await fetch('/api/generated-videos?limit=50&t='+Date.now(),{cache:'no-store'});const data=await res.json();const remote=(data?.rows||[]).map(normalizeHistoryItem).filter(Boolean);const byUrl=new Map();for(const item of [...remote,...local]){if(!byUrl.has(item.url))byUrl.set(item.url,item)}const merged=Array.from(byUrl.values()).slice(0,20);localStorage.setItem('flowvidHistory',JSON.stringify(merged));renderHistoryList(merged)}catch(_){renderHistoryList(local)}}
function stop(){if(timer){clearInterval(timer);timer=null}}
async function check(){if(!jobId&&!pollingUrl)return;const params=new URLSearchParams();if(pollingUrl)params.set('pollingUrl',pollingUrl);else params.set('id',jobId);const res=await fetch('/api/seedance-status?'+params.toString());const data=await res.json();const u=findVideo(data);if(u){stop();$('create').disabled=false;showVideo(u,lastPrompt);return}if(failed(data)){stop();$('create').disabled=false;$('now').classList.remove('show');return}if(done(data)||Date.now()-started>10*60*1000){stop();$('create').disabled=false;$('now').classList.remove('show');return}}
function poll(){stop();started=Date.now();check();timer=setInterval(check,12000)}
function showVideo(u,p){$('video').src=u;$('open').href=u;$('download').href=u;$('done').classList.add('show');$('now').classList.remove('show');save({url:u,prompt:p,mode,jobId,createdAt:new Date().toISOString()});renderHistory();setTimeout(()=>$('done').scrollIntoView({behavior:'smooth'}),200)}
async function start(){persistDraft();const prompt=$('prompt').value.trim();lastPrompt=prompt;if(!prompt)return;if(mode!=='text_to_video'&&!urls.length)return;const c=updateCreditUi();$('create').disabled=true;$('done').classList.remove('show');$('now').classList.add('show');$('job').textContent='送信中…';jobId='';pollingUrl='';const body={model:$('model').value,prompt,duration:$('duration').value,resolution:$('resolution').value,aspect_ratio:$('aspect').value,generate_audio:$('audio').value==='true',estimated_credits:c};if(mode==='image_to_video')body.first_frame_url=urls[0];if(mode==='reference_to_video'){body.reference_url=urls[0];body.reference_urls=urls}try{const res=await fetch('/api/seedance-start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const data=await res.json();jobId=data.jobId||extractJobId(data.response)||extractJobId(data)||'';pollingUrl=data.pollingUrl||extractPollingUrl(data.response)||extractPollingUrl(data)||'';if(jobId)localStorage.setItem('flowvidLastSeedanceJobId',jobId);if(pollingUrl)localStorage.setItem('flowvidLastSeedancePollingUrl',pollingUrl);if(!res.ok||(!jobId&&!pollingUrl)){$('create').disabled=false;return}$('job').textContent=pollingUrl||jobId;const u=findVideo(data);if(u){$('create').disabled=false;return showVideo(u,prompt)}poll()}catch(e){$('create').disabled=false;$('now').classList.remove('show')}}
function handleDownload(e){if(isPaid())return;const ok=confirm('無料プランではウォーターマーク付き保存になります。\nウォーターマーク付き保存処理は次の修正で有効化します。\n\n現時点ではプレビューを開きますか？');if(!ok)e.preventDefault()}
function restoreDraft(){draft=readDraft();if(draft.prompt)$('prompt').value=draft.prompt;[['model',draft.model],['aspect',draft.aspect],['duration',draft.duration],['resolution',draft.resolution],['audio',draft.audio]].forEach(([id,val])=>{if($(id)&&val)$(id).value=val});urls=Array.isArray(draft.referenceUrls)?draft.referenceUrls.filter(Boolean):urls}
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));
['duration','resolution','audio','model','aspect'].forEach(id=>$(id)?.addEventListener('change',()=>{persistDraft();updateCreditUi()}));
$('prompt').addEventListener('input',persistDraft);
$('assets').addEventListener('click',e=>{const btn=e.target.closest('.remove');if(!btn)return;e.preventDefault();e.stopPropagation();removeAsset(Number(btn.dataset.index))});
$('file').onchange=e=>upload(e.target.files);
$('sample').onclick=()=>{$('prompt').value=sample();persistDraft();updateCreditUi()};
$('guide').onclick=()=>{};
$('download').addEventListener('click',handleDownload);
$('copy').onclick=()=>navigator.clipboard?.writeText($('open').href);
$('clear').onclick=()=>{localStorage.removeItem('flowvidHistory');renderHistoryList([])};
restoreDraft();
const q=new URLSearchParams(location.search).get('mode')||draft.mode||localStorage.getItem('flowvidGenerateMode')||'reference_to_video';
setMode(['reference_to_video','image_to_video','text_to_video'].includes(q)?q:'reference_to_video');
renderAssets();updateCreditUi();renderHistory();
</script>
</body>
</html>
