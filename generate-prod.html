<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">

<title>FlowVid Studio</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#050b12;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Hiragino Sans','Noto Sans JP',system-ui,sans-serif}.wrap{max-width:760px;margin:auto;padding:22px 12px 70px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}.brand{display:flex;gap:12px;align-items:center;text-decoration:none;color:#fff}.logo{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,#fff,#7dd3fc,#8b5cf6);display:grid;place-items:center;color:#050506;font-weight:800}.brand b{font-size:25px;font-weight:800;letter-spacing:-.04em}.home{width:44px;height:44px;border-radius:50%;background:#1b2029;color:#fff;display:grid;place-items:center;border:0;cursor:pointer;font-size:22px}.tabs{display:grid;grid-template-columns:repeat(3,1fr);background:#1b1f27;border-radius:17px;overflow:hidden;margin-bottom:14px}.tabs button{border:0;background:transparent;color:#777;padding:16px 4px;font-weight:700}.tabs .on{background:#343742;color:#fff}.card,.now,.done,.old{background:#1b1e25;border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:14px}.assets{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}.add,.thumb{height:104px;border-radius:15px;background:#101319;border:1px solid rgba(255,255,255,.07);overflow:hidden;position:relative}.add{display:grid;place-items:center;text-align:center;font-weight:700}.add input{position:absolute;inset:0;opacity:0}.add b{display:block;font-size:34px;font-weight:600}.add span{font-size:13px;color:#aaa}.thumb img{width:100%;height:100%;object-fit:cover}.thumb small{position:absolute;left:7px;bottom:7px;background:rgba(0,0,0,.65);border-radius:8px;padding:3px 6px;font-size:11px}.thumb .remove{position:absolute;right:6px;top:6px;width:26px;height:26px;border:0;border-radius:50%;background:rgba(0,0,0,.65);color:#fff;font-size:18px;font-weight:900;line-height:1;display:grid;place-items:center}.prompt{background:#111319;border:1px solid rgba(255,255,255,.07);border-radius:18px;overflow:hidden}textarea{width:100%;min-height:178px;border:0;background:transparent;color:#fff;padding:16px;font-size:16px;line-height:1.65;outline:0;resize:vertical;font-weight:500}textarea::placeholder{color:#666}.tools{display:flex;gap:14px;border-top:1px solid rgba(255,255,255,.06);padding:11px 14px}.tools button{border:0;background:transparent;color:#bbb;font-weight:700}.tools button:last-child{margin-left:auto}.settings{margin-top:12px;background:#1b1e25;border:1px solid rgba(255,255,255,.08);border-radius:17px;overflow:hidden}summary{list-style:none;padding:16px 18px;font-weight:800;display:flex;justify-content:space-between}summary:after{content:'⌄';font-size:24px}.settings[open] summary:after{transform:rotate(180deg)}.settingsBody{padding:0 14px 14px;display:grid;gap:10px}.field label{display:block;color:#999;font-size:12px;margin-bottom:6px;font-weight:700}.field select{width:100%;background:#0e1117;color:#fff;border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:12px}.create{width:100%;border:0;border-radius:18px;margin-top:16px;padding:18px 14px;background:linear-gradient(90deg,#eee8ff,#8ed8ff);font-size:21px;font-weight:800;color:#050506}.create:disabled{opacity:.55}.mini{display:flex;justify-content:flex-end;gap:10px;align-items:center;margin-top:12px;color:#777;font-size:12px}.pill{display:inline-flex;background:rgba(134,239,172,.08);border:1px solid rgba(134,239,172,.25);color:#dcfce7;border-radius:999px;padding:7px 10px;font-weight:800}.pill.bad{background:rgba(251,113,133,.1);border-color:rgba(251,113,133,.3);color:#fecdd3}.now,.done{display:none;margin-top:16px}.show{display:block}.row{display:flex;justify-content:space-between;align-items:center}.spin{width:22px;height:22px;border-radius:50%;border:3px solid rgba(255,255,255,.18);border-top-color:#8ed8ff;animation:s 1s linear infinite}@keyframes s{to{transform:rotate(360deg)}}.bar{height:8px;background:#0d1015;border-radius:999px;overflow:hidden;margin-top:12px}.bar span{display:block;height:100%;width:42%;background:linear-gradient(90deg,#fff,#8ed8ff,#8b5cf6);animation:m 1.2s ease-in-out infinite alternate}@keyframes m{to{transform:translateX(138%)}}.job{margin-top:9px;color:#777;font-size:11px;word-break:break-all}.log{display:none!important}.done video{width:100%;max-height:420px;background:#000;border-radius:16px}.head,.section{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.icons{display:flex;gap:8px;margin-top:10px}.icon{width:43px;height:38px;border:0;border-radius:12px;background:#2b303a;color:#fff;text-decoration:none;display:grid;place-items:center;font-size:18px}.section{margin:22px 2px 10px}.section h2{font-size:17px;margin:0;font-weight:800}.section button{border:1px solid rgba(255,255,255,.08);background:#1b2029;color:#fff;border-radius:13px;padding:8px 10px;font-weight:700}.history{display:grid;gap:12px}.oldTop{margin-bottom:9px;color:#aaa;font-weight:700}.empty{border:1px dashed rgba(255,255,255,.1);border-radius:18px;padding:18px;text-align:center;color:#888}#pendingSection{margin-top:20px}@media(min-width:620px){.assets{grid-template-columns:repeat(5,1fr)}.settingsBody{grid-template-columns:1fr 1fr}}.drawer{position:fixed;inset:0;z-index:20;display:none}.drawer.open{display:block}.shade{position:absolute;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(8px)}.menu{position:absolute;right:12px;top:12px;width:min(340px,calc(100vw - 24px));border:1px solid rgba(255,255,255,.08);border-radius:28px;background:linear-gradient(180deg,#151821,#07080c);padding:18px}.menuHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.menuClose{border:0;background:rgba(255,255,255,.08);color:#fff;border-radius:50%;width:38px;height:38px;font-size:24px;cursor:pointer}.menu a{display:flex;justify-content:space-between;color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.045);border-radius:18px;padding:15px;margin-top:8px;font-weight:850}.menu .logout{border-color:rgba(251,113,133,.28)!important;background:rgba(251,113,133,.08)!important}
</style>
</head>
<body>
<main class="wrap">
<header class="top"><a class="brand" href="./index.html"><div class="logo">▶</div><b>FlowVid Studio</b></a><button class="home" id="menuBtn">☰</button></header>
<div class="tabs"><button class="on" data-mode="reference_to_video">リファレンス</button><button data-mode="image_to_video">画像から動画</button><button data-mode="text_to_video">テキストから動画</button></div>
<section class="card">
  <div class="assets" id="assets"><label class="add"><input id="file" type="file" accept="image/png,image/jpeg,image/webp" multiple><div><b>＋</b><span>画像追加</span></div></label></div>
  <div class="prompt"><textarea id="prompt" placeholder="キャラクター、商品、シーン、動きを入力してください。"></textarea><div class="tools"><button id="guide" type="button">▱ ユーザーガイド</button><button id="sample" type="button">サンプルを試す ›</button></div></div>
  <details class="settings"><summary>設定</summary><div class="settingsBody"><div class="field"><label>モデル</label><select id="model"><option value="bytedance/seedance-2.0">Seedance 2.0</option><option value="bytedance/seedance-2.0-lite">Seedance 2.0 Lite</option></select></div><div class="field"><label>アスペクト比</label><select id="aspect"><option value="9:16">9:16 スマホ縦</option><option value="16:9">16:9 横動画</option><option value="1:1">1:1 正方形</option></select></div><div class="field"><label>長さ</label><select id="duration"><option value="5">5秒</option><option value="8">8秒</option><option value="10">10秒</option><option value="15">15秒</option></select></div><div class="field"><label>解像度</label><select id="resolution"><option value="720p">720p</option><option value="480p">480p</option><option value="1080p">1080p</option></select></div><div class="field"><label>音声</label><select id="audio"><option value="false">なし</option><option value="true">あり</option></select></div></div></details>
  <button class="create" id="create">作成する ✦ 80</button>
  <div id="creditStatus" style="display:none;margin-top:12px;background:rgba(251,113,133,.07);border:1px solid rgba(251,113,133,.28);border-radius:14px;padding:14px 16px;"></div>
  <div class="mini"><span id="modeLabel">リファレンス</span></div>
  <pre class="log" id="log"></pre>
</section>
<div id="pendingSection" style="display:none"><div style="display:flex;justify-content:space-between;align-items:center;margin:22px 2px 10px"><h2 style="font-size:17px;margin:0;font-weight:800">生成中</h2></div><div id="pendingList"></div></div>
<section class="now" id="now"><div class="row"><b>処理中</b><span class="spin"></span></div><div class="bar"><span></span></div><div class="job" id="job">jobId待機中</div></section>
<section class="done" id="done"><div class="head"><b>完成動画</b><span class="pill">completed</span></div><video id="video" controls playsinline></video><div class="icons"><a class="icon" id="open" target="_blank" rel="noreferrer">↗</a><a class="icon" id="download" download>↓</a><button class="icon" id="copy" type="button">⛓</button><button class="icon" id="rerun" type="button">↻</button></div></section>
</main>
<div class="drawer" id="drawer"><div class="shade" id="shade"></div><div class="menu"><div class="menuHead"><b>メニュー</b><button class="menuClose" id="menuClose">×</button></div><a href="./index.html">ホーム <span>›</span></a><a href="./generate-prod.html">生成 <span>›</span></a><a href="./profile.html">マイページ <span>›</span></a><a href="./pricing.html">料金 <span>›</span></a><a class="logout" href="./logout.html">ログアウト <span>›</span></a></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./auth-config.js?v=3844d5ea2"></script>
<script src="./flowvid-history.js?v=108"></script>
<script src="./flowvid-open-inline.js?v=1"></script>
<script>
const $=id=>document.getElementById(id);
const DRAFT_KEY='flowvidGenerateDraft';
function readDraft(){try{return JSON.parse(localStorage.getItem(DRAFT_KEY)||'{}')}catch(_){return {}}}
function writeDraft(patch){const d={...readDraft(),...patch,updatedAt:new Date().toISOString()};localStorage.setItem(DRAFT_KEY,JSON.stringify(d));return d}
let draft=readDraft();
let mode=draft.mode||'reference_to_video',urls=Array.isArray(draft.referenceUrls)?draft.referenceUrls.filter(Boolean):[],files=[],jobId='',pollingUrl='',timer=null,started=0,lastPrompt='';
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function modeName(m){return m==='text_to_video'?'テキストから動画':m==='image_to_video'?'画像から動画':'リファレンス'}
function notice(t,b=false){}
function log(x,b=false){}
function getPlan(){return localStorage.getItem('flowvidPlan')||localStorage.getItem('plan')||'free'}
function isPaid(){return /^(paid|pro|premium|business|creator)$/i.test(getPlan())}
function persistDraft(){writeDraft({mode,prompt:$('prompt')?.value||'',model:$('model')?.value||'bytedance/seedance-2.0',aspect:$('aspect')?.value||'9:16',duration:$('duration')?.value||'5',resolution:$('resolution')?.value||'720p',audio:$('audio')?.value||'false',referenceUrls:urls})}
function creditEstimate(){const duration=Number($('duration')?.value||5);const resolution=$('resolution')?.value||'720p';const refs=mode==='text_to_video'?0:Math.max(1,urls.length||files.length||1);let credits=80;credits+=Math.max(0,duration-5)*15;if(resolution==='1080p')credits+=100;if(resolution==='480p')credits-=20;if(mode==='reference_to_video')credits+=Math.max(0,refs-1)*10;if(mode==='text_to_video')credits-=10;if($('audio')?.value==='true')credits+=15;return Math.max(50,credits)}
function updateCreditUi(){const c=creditEstimate();$('create').textContent='作成する ✦ '+c;persistDraft();return c}
function setMode(m){mode=m;document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.mode===m));$('modeLabel').textContent=modeName(m);$('assets').style.display=m==='text_to_video'?'none':'grid';$('file').multiple=m==='reference_to_video';localStorage.setItem('flowvidGenerateMode',m);if(mode==='text_to_video')urls=[];updateCreditUi();renderAssets()}
function readFile(f){return new Promise((ok,ng)=>{const r=new FileReader();r.onload=()=>ok(String(r.result||''));r.onerror=()=>ng(r.error);r.readAsDataURL(f)})}
function removeAsset(index){if(Number.isNaN(index)||index<0)return;if(files.length){files.splice(index,1)}else{urls.splice(index,1)}$('file').value='';persistDraft();renderAssets()}
function renderAssets(){const box=$('assets'),add=box.querySelector('.add');box.querySelectorAll('.thumb').forEach(el=>el.remove());const items=files.length?files.map(f=>({src:URL.createObjectURL(f)})):urls.map(u=>({src:u}));items.forEach((it,i)=>{const d=document.createElement('div');d.className='thumb';d.innerHTML='<img src="'+esc(it.src)+'"><button class="remove" type="button" data-index="'+i+'" aria-label="画像を削除">×</button><small>図'+(i+1)+'</small>';box.insertBefore(d,add)});updateCreditUi()}
async function upload(fs){files=Array.from(fs||[]).slice(0,mode==='reference_to_video'?9:1);urls=[];renderAssets();if(!files.length)return;for(let i=0;i<files.length;i++){const dataUrl=await readFile(files[i]);const res=await fetch('/api/upload-reference-image',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dataUrl,filename:files[i].name,contentType:files[i].type||'image/jpeg'})});const data=await res.json();if(!res.ok||!data.ok)return;urls.push(data.publicUrl||data.url);writeDraft({mode,referenceUrls:urls})}files=[];renderAssets();persistDraft()}
function sample(){if(mode==='text_to_video')return 'スマホ縦動画。日本のアウトドア施設で、家族が芝生の遊び場へ向かい、子どもが走り出す。自然光、明るいCMトーン、実写風、高品質、5秒。文字、字幕、ロゴは入れない。';if(mode==='image_to_video')return 'アップロードした画像を最初のフレームとして使い、自然なカメラワークで実写風ショート動画にしてください。人物や背景の雰囲気を保ち、やわらかい光で5秒。文字、字幕、ロゴは入れない。';return '図1〜図9を時系列の参考画像として使ってください。紙面・文字・番号は映像化せず、各画像のシーン内容、家族の動き、光、雰囲気だけを参考にしてください。実写風CM。文字・字幕・ロゴなし。'}
function findVideo(d){return(d&&d.done===true&&typeof d.videoUrl==='string'&&/^https?:\/\//.test(d.videoUrl))?d.videoUrl:''}
function extractPollingUrl(d){if(!d||typeof d!=='object')return'';for(const k of ['pollingUrl','polling_url','statusUrl','status_url']){const v=d[k];if(typeof v==='string'&&/^https?:\/\//.test(v))return v}for(const k of Object.keys(d)){const r=extractPollingUrl(d[k]);if(r)return r}return''}
function extractJobId(d){if(!d||typeof d!=='object')return'';for(const k of ['jobId','job_id','id','request_id']){const v=d[k];if(typeof v==='string'&&v.trim())return v.trim()}for(const k of Object.keys(d)){const r=extractJobId(d[k]);if(r)return r}return''}
function done(d){return d?.done===true}
function failed(d){const s=String(d?.jobStatus||d?.status||d?.response?.status||d?.response?.data?.status||'').toLowerCase();return ['failed','error','cancelled','canceled'].includes(s)||Number(d?.status) >= 400}
function normalizeHistoryItem(it){const url=it?.url||it?.video_url||it?.video_uri||it?.src||'';if(!/^https?:\/\//.test(url))return null;if(/openrouter\.ai\/api\/v1\/videos\/[^/?#]+\/?(?:[?#].*)?$/i.test(url))return null;return{url,prompt:it.prompt||it.title||'生成動画',mode:it.mode||mode,jobId:it.jobId||it.job_id||'',createdAt:it.createdAt||it.created_at||new Date().toISOString()}}
function save(item){const current=JSON.parse(localStorage.getItem('flowvidHistory')||'[]').map(normalizeHistoryItem).filter(Boolean);const next=normalizeHistoryItem(item);if(next&&!current.some(v=>v.url===next.url))current.unshift(next);localStorage.setItem('flowvidHistory',JSON.stringify(current.slice(0,20)))}
function stop(){if(timer){clearInterval(timer);timer=null}}
async function check(){if(!jobId&&!pollingUrl)return;const params=new URLSearchParams();if(pollingUrl)params.set('pollingUrl',pollingUrl);else params.set('id',jobId);const res=await fetch('/api/seedance-status?'+params.toString());const data=await res.json();const u=findVideo(data);if(u){stop();$('create').disabled=false;showVideo(u,lastPrompt);return}if(failed(data)){stop();$('create').disabled=false;$('now').classList.remove('show');return}if(done(data)||Date.now()-started>10*60*1000){stop();$('create').disabled=false;$('now').classList.remove('show');return}}
function poll(){stop();started=Date.now();check();timer=setInterval(check,12000)}
function showVideo(u,p){$('video').src=u;$('open').href=u;$('download').href=u;$('done').classList.add('show');$('now').classList.remove('show');save({url:u,prompt:p,mode,jobId,createdAt:new Date().toISOString()});setTimeout(()=>$('done').scrollIntoView({behavior:'smooth'}),200)}
async function getToken(){try{const cfg=window.FLOWVID_AUTH||{};if(!window.supabase||!cfg.supabaseUrl||!cfg.supabaseAnonKey)return '';if(!window.__flowvidUserClient){window.__flowvidUserClient=window.supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey)}const{data}=await window.__flowvidUserClient.auth.getSession();return data?.session?.access_token||''}catch(_){return ''}}
async function getBalance(){try{const cfg=window.FLOWVID_AUTH||{};if(!window.supabase||!cfg.supabaseUrl||!cfg.supabaseAnonKey)return null;if(!window.__flowvidUserClient){window.__flowvidUserClient=window.supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey)}const{data:sd}=await window.__flowvidUserClient.auth.getSession();const user=sd?.session?.user;if(!user)return null;const{data}=await window.__flowvidUserClient.from('credit_balances').select('free_credits,subscription_credits,purchased_credits').eq('user_id',user.id).maybeSingle();return Number(data?.free_credits||0)+Number(data?.subscription_credits||0)+Number(data?.purchased_credits||0)}catch(_){return null}}
function showCreditShortage(needed,balance){const el=$('creditStatus');if(!el)return;el.innerHTML='<div style="color:#fca5a5;font-weight:700;margin-bottom:10px;">クレジットが足りません。必要'+needed+'cr / 残高'+balance+'cr</div><a href="./pricing.html" style="display:inline-block;background:linear-gradient(90deg,#eee8ff,#8ed8ff);color:#050506;border-radius:12px;padding:10px 18px;font-weight:800;text-decoration:none;">料金・クレジットへ →</a>';el.style.display='block';setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'nearest'}),50)}
function hideCreditStatus(){const el=$('creditStatus');if(el)el.style.display='none'}
async function start(){persistDraft();hideCreditStatus();const prompt=$('prompt').value.trim();lastPrompt=prompt;if(!prompt)return;if(mode!=='text_to_video'&&!urls.length)return;const token=await getToken();if(!token){location.href='./login.html';return}const c=updateCreditUi();const balance=await getBalance();if(balance!==null&&balance<c){showCreditShortage(c,balance);return}$('create').disabled=true;$('done').classList.remove('show');$('now').classList.add('show');$('job').textContent='送信中…';jobId='';pollingUrl='';const body={model:$('model').value,prompt,duration:$('duration').value,resolution:$('resolution').value,aspect_ratio:$('aspect').value,generate_audio:$('audio').value==='true',mode,estimated_credits:c};if(mode==='image_to_video')body.first_frame_url=urls[0];if(mode==='reference_to_video'){body.reference_url=urls[0];body.reference_urls=urls}try{const res=await fetch('/api/seedance-start',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(body)});const data=await res.json();if(res.status===401){$('create').disabled=false;$('now').classList.remove('show');location.href='./login.html';return}if(res.status===402){$('create').disabled=false;$('now').classList.remove('show');const bal=await getBalance();showCreditShortage(c,bal!==null?bal:0);return}jobId=data.jobId||extractJobId(data.response)||extractJobId(data)||'';pollingUrl=data.pollingUrl||extractPollingUrl(data.response)||extractPollingUrl(data)||'';if(jobId)localStorage.setItem('flowvidLastSeedanceJobId',jobId);if(pollingUrl)localStorage.setItem('flowvidLastSeedancePollingUrl',pollingUrl);if(!res.ok||(!jobId&&!pollingUrl)){$('create').disabled=false;return}$('job').textContent=pollingUrl||jobId;const u=findVideo(data);if(u){$('create').disabled=false;return showVideo(u,prompt)}poll()}catch(e){$('create').disabled=false;$('now').classList.remove('show')}}
function handleDownload(e){if(isPaid())return;const ok=confirm('無料プランではウォーターマーク付き保存になります。\nウォーターマーク付き保存処理は次の修正で有効化します。\n\n現時点ではプレビューを開きますか？');if(!ok)e.preventDefault()}
function restoreDraft(){draft=readDraft();if(draft.prompt)$('prompt').value=draft.prompt;[['model',draft.model],['aspect',draft.aspect],['duration',draft.duration],['resolution',draft.resolution],['audio',draft.audio]].forEach(([id,val])=>{if($(id)&&val)$(id).value=val});urls=Array.isArray(draft.referenceUrls)?draft.referenceUrls.filter(Boolean):urls}
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{setMode(b.dataset.mode);if(typeof window.flowvidLoadHistory==='function')window.flowvidLoadHistory(b.dataset.mode);});
['duration','resolution','audio','model','aspect'].forEach(id=>$(id)?.addEventListener('change',()=>{persistDraft();updateCreditUi()}));
$('prompt').addEventListener('input',persistDraft);
$('assets').addEventListener('click',e=>{const btn=e.target.closest('.remove');if(!btn)return;e.preventDefault();e.stopPropagation();removeAsset(Number(btn.dataset.index))});
$('file').onchange=e=>upload(e.target.files);
$('sample').onclick=()=>{$('prompt').value=sample();persistDraft();updateCreditUi()};
$('guide').onclick=()=>{};
$('create').onclick=start;window.flowvidCreateHandler=start;
$('download').addEventListener('click',handleDownload);
$('copy').onclick=()=>navigator.clipboard?.writeText($('open').href);
restoreDraft();
const q=new URLSearchParams(location.search).get('mode')||draft.mode||localStorage.getItem('flowvidGenerateMode')||'reference_to_video';
setMode(['reference_to_video','image_to_video','text_to_video'].includes(q)?q:'reference_to_video');
renderAssets();updateCreditUi();
// ---- pending tasks (resume across reloads) ----
const _pendingPollers={};
function _ptShortDate(v){const d=v?new Date(v):null;if(!d||Number.isNaN(d.getTime()))return'';const m=Math.floor((Date.now()-d.getTime())/60000);if(m<1)return'今';if(m<60)return m+'分前';const h=Math.floor(m/60);if(h<24)return h+'時間前';return Math.floor(h/24)+'日前'}
const _modeLabel={reference_to_video:'リファレンス',image_to_video:'画像から動画',text_to_video:'テキストから動画'};
function _ptCard(task,isFailed){
  const chips=[
    task.mode?'<span class="fv-chip fv-chip-mode">'+esc(_modeLabel[task.mode]||task.mode)+'</span>':'',
    task.aspect_ratio?'<span class="fv-chip">'+esc(task.aspect_ratio)+'</span>':'',
    task.duration_seconds?'<span class="fv-chip">'+task.duration_seconds+'秒</span>':'',
    task.resolution?'<span class="fv-chip">'+esc(task.resolution)+'</span>':'',
    _ptShortDate(task.created_at)?'<span class="fv-chip">'+_ptShortDate(task.created_at)+'</span>':''
  ].filter(Boolean).join('');
  const arCss=String(task.aspect_ratio||'9:16').replace(':','/');
  const frameBg=isFailed?'background:rgba(251,113,133,.06)':'background:#050506';
  const frameInner=isFailed
    ?'<div style="display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center"><span style="font-size:24px">⚠</span><span style="color:#fca5a5;font-weight:700;font-size:13px">生成に失敗しました</span></div>'
    :'<div style="display:flex;flex-direction:column;align-items:center;gap:10px"><div class="spin"></div><span style="color:#8ed8ff;font-weight:700;font-size:13px">生成中...</span></div>';
  return '<article class="old" data-ptask-id="'+esc(task.id)+'" style="padding:12px;border-radius:22px;background:#1b1e25;border:1px solid rgba(255,255,255,.08)"><div class="fv-prompt-wrap" style="min-width:0;margin-bottom:10px"><div style="color:#c8cad6;font-weight:700;line-height:1.4;font-size:14px">'+esc((task.prompt||'生成動画').slice(0,72))+'</div><div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:6px">'+chips+'</div></div><div data-ptask-frame style="width:100%;'+frameBg+';border-radius:14px;overflow:hidden;display:flex;align-items:center;justify-content:center;aspect-ratio:'+arCss+';max-height:260px">'+frameInner+'</div></article>';
}
function _ptRemove(taskId){const c=document.querySelector('[data-ptask-id="'+taskId+'"]');if(c)c.remove();const l=$('pendingList');if(l&&!l.querySelector('[data-ptask-id]'))$('pendingSection').style.display='none'}
function _ptFail(taskId){const c=document.querySelector('[data-ptask-id="'+taskId+'"]');if(!c)return;const f=c.querySelector('[data-ptask-frame]');if(f){f.style.background='rgba(251,113,133,.06)';f.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center"><span style="font-size:24px">⚠</span><span style="color:#fca5a5;font-weight:700;font-size:13px">生成に失敗しました</span></div>'}}
function _ptComplete(taskId,videoUrl){const c=document.querySelector('[data-ptask-id="'+taskId+'"]');if(c){const f=c.querySelector('[data-ptask-frame]');if(f){f.style.background='#000';f.innerHTML='<video muted playsinline preload="auto" src="'+esc(videoUrl)+'#t=0.2" style="width:100%;height:100%;object-fit:contain;display:block;pointer-events:none"></video>'}setTimeout(()=>{_ptRemove(taskId);if(typeof window.flowvidLoadHistory==='function')window.flowvidLoadHistory()},1500)}else{if(typeof window.flowvidLoadHistory==='function')window.flowvidLoadHistory()}}
function _ptStartPoll(task){
  if(!task.api_task_id||_pendingPollers[task.id])return;
  const pu='https://openrouter.ai/api/v1/videos/'+encodeURIComponent(task.api_task_id);
  let n=0;
  _pendingPollers[task.id]=setInterval(async()=>{
    n++;
    try{
      const r=await fetch('/api/seedance-status?'+new URLSearchParams({pollingUrl:pu}));
      const d=await r.json();
      if(findVideo(d)){clearInterval(_pendingPollers[task.id]);delete _pendingPollers[task.id];_ptComplete(task.id,findVideo(d));return}
      if(failed(d)||n>60){clearInterval(_pendingPollers[task.id]);delete _pendingPollers[task.id];_ptFail(task.id)}
    }catch(_){if(n>5){clearInterval(_pendingPollers[task.id]);delete _pendingPollers[task.id]}}
  },12000);
}
async function loadPendingTasks(){
  const token=await getToken();if(!token)return;
  try{
    const r=await fetch('/api/pending-tasks',{headers:{'Authorization':'Bearer '+token}});
    if(!r.ok)return;
    const d=await r.json();
    const tasks=d.tasks||[];
    const list=$('pendingList');if(!list)return;
    if(!tasks.length){$('pendingSection').style.display='none';return}
    $('pendingSection').style.display='block';
    list.innerHTML=tasks.map(t=>_ptCard(t,false)).join('');
    tasks.forEach(t=>_ptStartPoll(t));
  }catch(_){}
}
setTimeout(loadPendingTasks,1200);
// ---- end pending tasks ----
(function(){const d=document.getElementById('drawer');document.getElementById('menuBtn').onclick=()=>d.classList.add('open');document.getElementById('shade').onclick=()=>d.classList.remove('open');document.getElementById('menuClose').onclick=()=>d.classList.remove('open');}());
</script>
</body>
</html>
