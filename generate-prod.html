<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>FlowVid Studio</title><style>*{box-sizing:border-box}body{margin:0;background:#050b12;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Hiragino Sans','Noto Sans JP',system-ui,sans-serif}.wrap{max-width:760px;margin:auto;padding:22px 12px 70px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}.brand{display:flex;gap:12px;align-items:center;text-decoration:none;color:#fff}.logo{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,#fff,#7dd3fc,#8b5cf6);display:grid;place-items:center;color:#050506;font-weight:800}.brand b{font-size:25px;font-weight:800;letter-spacing:-.04em}.home{width:44px;height:44px;border-radius:50%;background:#1b2029;color:#fff;display:grid;place-items:center;text-decoration:none}.tabs{display:grid;grid-template-columns:repeat(3,1fr);background:#1b1f27;border-radius:17px;overflow:hidden;margin-bottom:14px}.tabs button{border:0;background:transparent;color:#777;padding:16px 4px;font-weight:700}.tabs .on{background:#343742;color:#fff}.card,.now,.done,.old{background:#1b1e25;border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:14px}.assets{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}.add,.thumb{height:104px;border-radius:15px;background:#101319;border:1px solid rgba(255,255,255,.07);overflow:hidden;position:relative}.add{display:grid;place-items:center;text-align:center;font-weight:700}.add input{position:absolute;inset:0;opacity:0}.add b{display:block;font-size:34px;font-weight:600}.add span{font-size:13px;color:#aaa}.thumb img{width:100%;height:100%;object-fit:cover}.thumb small{position:absolute;left:7px;bottom:7px;background:rgba(0,0,0,.65);border-radius:8px;padding:3px 6px;font-size:11px}.prompt{background:#111319;border:1px solid rgba(255,255,255,.07);border-radius:18px;overflow:hidden}textarea{width:100%;min-height:178px;border:0;background:transparent;color:#fff;padding:16px;font-size:16px;line-height:1.65;outline:0;resize:vertical;font-weight:500}textarea::placeholder{color:#666}.tools{display:flex;gap:14px;border-top:1px solid rgba(255,255,255,.06);padding:11px 14px}.tools button{border:0;background:transparent;color:#bbb;font-weight:700}.tools button:last-child{margin-left:auto}.settings{margin-top:12px;background:#1b1e25;border:1px solid rgba(255,255,255,.08);border-radius:17px;overflow:hidden}summary{list-style:none;padding:16px 18px;font-weight:800;display:flex;justify-content:space-between}summary:after{content:'⌄';font-size:24px}.settings[open] summary:after{transform:rotate(180deg)}.settingsBody{padding:0 14px 14px;display:grid;gap:10px}.field label{display:block;color:#999;font-size:12px;margin-bottom:6px;font-weight:700}.field select{width:100%;background:#0e1117;color:#fff;border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:12px}.create{width:100%;border:0;border-radius:18px;margin-top:16px;padding:18px 14px;background:linear-gradient(90deg,#eee8ff,#8ed8ff);font-size:21px;font-weight:800;color:#050506}.create:disabled{opacity:.55}.mini{display:flex;justify-content:space-between;align-items:center;margin-top:12px;color:#777;font-size:12px}.pill{display:inline-flex;background:rgba(134,239,172,.08);border:1px solid rgba(134,239,172,.25);color:#dcfce7;border-radius:999px;padding:7px 10px;font-weight:800}.pill.bad{background:rgba(251,113,133,.1);border-color:rgba(251,113,133,.3);color:#fecdd3}.now,.done{display:none;margin-top:16px}.show{display:block}.row{display:flex;justify-content:space-between;align-items:center}.spin{width:22px;height:22px;border-radius:50%;border:3px solid rgba(255,255,255,.18);border-top-color:#8ed8ff;animation:s 1s linear infinite}@keyframes s{to{transform:rotate(360deg)}}.bar{height:8px;background:#0d1015;border-radius:999px;overflow:hidden;margin-top:12px}.bar span{display:block;height:100%;width:42%;background:linear-gradient(90deg,#fff,#8ed8ff,#8b5cf6);animation:m 1.2s ease-in-out infinite alternate}@keyframes m{to{transform:translateX(138%)}}.job{margin-top:9px;color:#777;font-size:11px;word-break:break-all}.log{display:none!important}.done video,.old video{width:100%;max-height:420px;background:#000;border-radius:16px}.head,.section{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.icons{display:flex;gap:8px;margin-top:10px}.icon{width:43px;height:38px;border:0;border-radius:12px;background:#2b303a;color:#fff;text-decoration:none;display:grid;place-items:center;font-size:18px}.section{margin:22px 2px 10px}.section h2{font-size:17px;margin:0;font-weight:800}.section button{border:1px solid rgba(255,255,255,.08);background:#1b2029;color:#fff;border-radius:13px;padding:8px 10px;font-weight:700}.history{display:grid;gap:12px}.oldTop{margin-bottom:9px;color:#aaa;font-weight:700}.empty{border:1px dashed rgba(255,255,255,.1);border-radius:18px;padding:18px;text-align:center;color:#888}@media(min-width:620px){.assets{grid-template-columns:repeat(5,1fr)}.settingsBody{grid-template-columns:1fr 1fr}}</style></head><body><main class="wrap"><header class="top"><a class="brand" href="./index.html"><div class="logo">▶</div><b>FlowVid Studio</b></a><a class="home" href="./index.html">⌂</a></header><div class="tabs"><button class="on" data-mode="reference_to_video">リファレンス</button><button data-mode="image_to_video">画像から動画</button><button data-mode="text_to_video">テキストから動画</button></div><section class="card"><div class="assets" id="assets"><label class="add"><input id="file" type="file" accept="image/png,image/jpeg,image/webp" multiple><div><b>＋</b><span>画像追加</span></div></label></div><div class="prompt"><textarea id="prompt" placeholder="キャラクター、商品、シーン、動きを入力してください。"></textarea><div class="tools"><button id="guide" type="button">▱ ユーザーガイド</button><button id="sample" type="button">サンプルを試す ›</button></div></div><details class="settings"><summary>設定</summary><div class="settingsBody"><div class="field"><label>モデル</label><select id="model"><option value="bytedance/seedance-2.0">Seedance 2.0</option><option value="bytedance/seedance-2.0-lite">Seedance 2.0 Lite</option></select></div><div class="field"><label>アスペクト比</label><select id="aspect"><option value="9:16">9:16 スマホ縦</option><option value="16:9">16:9 横動画</option><option value="1:1">1:1 正方形</option></select></div><div class="field"><label>長さ</label><select id="duration"><option value="5">5秒</option><option value="8">8秒</option></select></div><div class="field"><label>解像度</label><select id="resolution"><option value="720p">720p</option><option value="480p">480p</option><option value="1080p">1080p</option></select></div><div class="field"><label>音声</label><select id="audio"><option value="false">なし</option><option value="true">あり</option></select></div></div></details><button class="create" id="create">作成する ✦ 48</button><div class="mini"><span id="notice" class="pill">準備OK</span><span id="modeLabel">リファレンス</span></div><pre class="log" id="log"></pre></section><section class="now" id="now"><div class="row"><b>処理中</b><span class="spin"></span></div><div class="bar"><span></span></div><div class="job" id="job">jobId待機中</div></section><section class="done" id="done"><div class="head"><b>完成動画</b><span class="pill">completed</span></div><video id="video" controls playsinline></video><div class="icons"><a class="icon" id="open" target="_blank" rel="noreferrer">↗</a><a class="icon" id="download" download>↓</a><button class="icon" id="copy" type="button">⛓</button><button class="icon" id="rerun" type="button">↻</button></div></section><section class="section"><h2>過去動画</h2><button id="clear" type="button">消去</button></section><div class="history" id="history"><div class="empty">まだ動画がありません</div></div></main><script>const $=id=>document.getElementById(id);let mode='reference_to_video',urls=[],files=[],jobId='',timer=null,started=0,lastPrompt='';function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function modeName(m){return m==='text_to_video'?'テキストから動画':m==='image_to_video'?'画像から動画':'リファレンス'}function notice(t,b=false){$('notice').textContent=t;$('notice').className='pill'+(b?' bad':'')}function log(x,b=false){}function setMode(m){mode=m;document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.mode===m));$('modeLabel').textContent=modeName(m);$('assets').style.display=m==='text_to_video'?'none':'grid';$('file').multiple=m==='reference_to_video';localStorage.setItem('flowvidGenerateMode',m)}function readFile(f){return new Promise((ok,ng)=>{const r=new FileReader();r.onload=()=>ok(String(r.result||''));r.onerror=()=>ng(r.error);r.readAsDataURL(f)})}function renderAssets(){const box=$('assets'),add=box.querySelector('.add');box.innerHTML='';files.forEach((f,i)=>{const d=document.createElement('div');d.className='thumb';d.innerHTML='<img><small>図'+(i+1)+'</small>';d.querySelector('img').src=URL.createObjectURL(f);box.appendChild(d)});box.appendChild(add)}async function upload(fs){files=Array.from(fs||[]).slice(0,mode==='reference_to_video'?5:1);urls=[];renderAssets();if(!files.length)return;notice('アップロード中…');for(let i=0;i<files.length;i++){const dataUrl=await readFile(files[i]);const res=await fetch('/api/upload-reference-image',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dataUrl,filename:files[i].name,contentType:files[i].type||'image/jpeg'})});const data=await res.json();if(!res.ok||!data.ok){notice('アップロード失敗',true);return}urls.push(data.publicUrl||data.url)}notice(urls.length+'枚アップロード済み')}function sample(){if(mode==='text_to_video')return 'スマホ縦動画。日本のアウトドア施設で、家族が芝生の遊び場へ向かい、子どもが走り出す。自然光、明るいCMトーン、実写風、高品質、5秒。文字、字幕、ロゴは入れない。';if(mode==='image_to_video')return 'アップロードした画像を最初のフレームとして使い、自然なカメラワークで実写風ショート動画にしてください。人物や背景の雰囲気を保ち、やわらかい光で5秒。文字、字幕、ロゴは入れない。';return 'アップロードした絵コンテ画像を参考資料として使用してください。紙面レイアウト、表、文字、見出し、ページ番号、枠線、説明文は映像化しないでください。参照するのは写真シーンの内容、雰囲気、構図、光、自然な動きだけです。5秒の実写風ショートCM動画。9:16。文字、字幕、ロゴは入れない。'}function findVideo(d){if(!d||typeof d!=='object')return'';for(const k of ['videoUrl','video_url','output_url','url']){const v=d[k];if(typeof v==='string'&&/^https?:\/\//.test(v))return v}for(const k of Object.keys(d)){const r=findVideo(d[k]);if(r)return r}return''}function done(d){const s=String(d?.jobStatus||d?.status||d?.response?.status||d?.response?.data?.status||'').toLowerCase();return d?.done||['completed','succeeded','success','done'].includes(s)}function failed(d){const s=String(d?.jobStatus||d?.status||d?.response?.status||d?.response?.data?.status||'').toLowerCase();return ['failed','error','cancelled','canceled'].includes(s)}function save(item){const list=JSON.parse(localStorage.getItem('flowvidHistory')||'[]');list.unshift(item);localStorage.setItem('flowvidHistory',JSON.stringify(list.slice(0,12)))}function showVideo(u,p){$('video').src=u;$('open').href=u;$('download').href=u;$('done').classList.add('show');$('now').classList.remove('show');save({url:u,prompt:p,mode,createdAt:new Date().toISOString()});renderHistory();setTimeout(()=>$('done').scrollIntoView({behavior:'smooth'}),200)}function renderHistory(){const list=JSON.parse(localStorage.getItem('flowvidHistory')||'[]');$('history').innerHTML=list.length?list.map(it=>'<article class="old"><div class="oldTop">'+esc((it.prompt||'生成動画').slice(0,42))+'</div><video controls playsinline src="'+esc(it.url)+'"></video><div class="icons"><a class="icon" href="'+esc(it.url)+'" target="_blank">↗</a><a class="icon" href="'+esc(it.url)+'" download>↓</a></div></article>').join(''):'<div class="empty">まだ動画がありません</div>'}function stop(){if(timer){clearInterval(timer);timer=null}}async function check(){if(!jobId)return;const res=await fetch('/api/seedance-status?id='+encodeURIComponent(jobId));const data=await res.json();const u=findVideo(data);if(u){stop();notice('生成完了');$('create').disabled=false;showVideo(u,lastPrompt);return}if(done(data)||failed(data)||Date.now()-started>10*60*1000){stop();notice(failed(data)?'生成失敗':'動画URL未確認',true);$('create').disabled=false;$('now').classList.remove('show');return}notice('処理中')}function poll(){stop();started=Date.now();check();timer=setInterval(check,12000)}async function start(){const prompt=$('prompt').value.trim();lastPrompt=prompt;if(!prompt){notice('プロンプト未入力',true);return}if(mode!=='text_to_video'&&!urls.length){notice('画像未アップロード',true);return}if(!confirm('Seedance生成を開始します。実行しますか？'))return;$('create').disabled=true;$('done').classList.remove('show');$('now').classList.add('show');$('job').textContent='送信中…';notice('送信中…');const body={model:$('model').value,prompt,duration:$('duration').value,resolution:$('resolution').value,aspect_ratio:$('aspect').value,generate_audio:$('audio').value==='true'};if(mode==='image_to_video')body.first_frame_url=urls[0];if(mode==='reference_to_video'){body.reference_url=urls[0];body.reference_urls=urls}try{const res=await fetch('/api/seedance-start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const data=await res.json();jobId=data.jobId||data.id||data.response?.id||data.response?.data?.id||'';if(!res.ok||!jobId){notice('jobId取得失敗',true);$('create').disabled=false;return}$('job').textContent=jobId;notice('処理中');const u=findVideo(data);if(u){$('create').disabled=false;return showVideo(u,prompt)}poll()}catch(e){notice('送信失敗',true);$('create').disabled=false;$('now').classList.remove('show')}}document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));$('file').onchange=e=>upload(e.target.files);$('sample').onclick=()=>$('prompt').value=sample();$('guide').onclick=()=>notice('主役→動き→雰囲気→禁止事項の順で書くと安定します');$('create').onclick=start;$('rerun').onclick=start;$('copy').onclick=()=>navigator.clipboard?.writeText($('open').href);$('clear').onclick=()=>{localStorage.removeItem('flowvidHistory');renderHistory()};const q=new URLSearchParams(location.search).get('mode')||localStorage.getItem('flowvidGenerateMode')||'reference_to_video';setMode(['reference_to_video','image_to_video','text_to_video'].includes(q)?q:'reference_to_video');renderHistory();</script></body></html>
