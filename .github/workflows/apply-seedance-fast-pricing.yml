name: Apply Seedance Fast credit pricing

on:
  push:
    branches:
      - fix/seedance-fast-credit-pricing

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, 'fix: price Seedance Fast credits correctly') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/seedance-fast-credit-pricing
          fetch-depth: 0

      - name: Patch model names and credit calculation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'{label}: expected 1 match, found {count}')
              return text.replace(old, new, 1)

          # Replace the invalid Lite video slug everywhere it is exposed.
          for filename in ['generate-prod.html', 'admin-seedance.html', 'seedance-reference-test.html']:
              path = Path(filename)
              text = path.read_text(encoding='utf-8')
              count = text.count('bytedance/seedance-2.0-lite')
              if count < 1:
                  raise RuntimeError(f'{filename}: Lite slug not found')
              text = text.replace('bytedance/seedance-2.0-lite', 'bytedance/seedance-2.0-fast')
              text = text.replace('Seedance 2.0 Lite', 'Seedance 2.0 Fast')
              path.write_text(text, encoding='utf-8')

          generate = Path('generate-prod.html')
          text = generate.read_text(encoding='utf-8')
          old_credit = "function creditEstimate(){const duration=Number($('duration')?.value||5);const resolution=$('resolution')?.value||'720p';const refs=mode==='text_to_video'?0:Math.max(1,urls.length||files.length||1);let credits=80;credits+=Math.max(0,duration-5)*15;if(resolution==='1080p')credits+=100;if(resolution==='480p')credits-=20;if(mode==='reference_to_video')credits+=Math.max(0,refs-1)*10;if(mode==='text_to_video')credits-=10;credits+=15;return Math.max(50,credits)}"
          new_credit = "function baseCreditEstimate(){const duration=Number($('duration')?.value||5);const resolution=$('resolution')?.value||'720p';const refs=mode==='text_to_video'?0:Math.max(1,urls.length||files.length||1);let credits=80;credits+=Math.max(0,duration-5)*15;if(resolution==='1080p')credits+=100;if(resolution==='480p')credits-=20;if(mode==='reference_to_video')credits+=Math.max(0,refs-1)*10;if(mode==='text_to_video')credits-=10;credits+=15;return Math.max(50,credits)}function creditEstimate(){const model=$('model')?.value||'bytedance/seedance-2.0';const multiplier=model==='bytedance/seedance-2.0-fast'?0.8:1;return Math.max(50,Math.round(baseCreditEstimate()*multiplier))}"
          text = replace_once(text, old_credit, new_credit, 'generate-prod creditEstimate')
          generate.write_text(text, encoding='utf-8')

          server = Path('api/seedance-start.js')
          text = server.read_text(encoding='utf-8')

          old_top = """const OPENROUTER_VIDEO_ENDPOINT = 'https://openrouter.ai/api/v1/videos';
          const DEFAULT_MODEL = 'bytedance/seedance-2.0';

          const SUPABASE_URL = process.env.SUPABASE_URL || 'https://jflpjsdjmlkmkqfahxwy.supabase.co';
          const SUPABASE_SERVICE_KEY = process.env.SUPABASE_SERVICE_ROLE_KEY || '';

          // Credit cost comes from the client's creditEstimate() display value.
          // Server enforces a safe range to prevent manipulation.
          const MIN_CREDITS = 50;
          const MAX_CREDITS = 500;
          """
          new_top = """const OPENROUTER_VIDEO_ENDPOINT = 'https://openrouter.ai/api/v1/videos';
          const DEFAULT_MODEL = 'bytedance/seedance-2.0';
          const FAST_MODEL = 'bytedance/seedance-2.0-fast';
          const ALLOWED_MODELS = new Set([DEFAULT_MODEL, FAST_MODEL]);

          const SUPABASE_URL = process.env.SUPABASE_URL || 'https://jflpjsdjmlkmkqfahxwy.supabase.co';
          const SUPABASE_SERVICE_KEY = process.env.SUPABASE_SERVICE_ROLE_KEY || '';

          const MIN_CREDITS = 50;
          const MAX_CREDITS = 500;
          // OpenRouter advertises Fast at 0.0000056 vs Standard at 0.000007,
          // so FlowVid applies the same 0.8 ratio to the existing credit formula.
          const MODEL_CREDIT_MULTIPLIERS = {
            [DEFAULT_MODEL]: 1,
            [FAST_MODEL]: 0.8
          };
          """
          text = replace_once(text, old_top, new_top, 'seedance-start constants')

          old_mode = """function normalizeMode(value) {
            const m = String(value || '').trim();
            return ['text_to_video', 'image_to_video', 'reference_to_video', 'storyboard'].includes(m) ? m : 'reference_to_video';
          }
          """
          new_mode = """function normalizeMode(value) {
            const m = String(value || '').trim();
            return ['text_to_video', 'image_to_video', 'reference_to_video', 'storyboard'].includes(m) ? m : 'reference_to_video';
          }

          function normalizeModel(value) {
            const model = String(value || DEFAULT_MODEL).trim() || DEFAULT_MODEL;
            return ALLOWED_MODELS.has(model) ? model : null;
          }

          function inputCount(value) {
            return Array.isArray(value) ? value.filter(Boolean).length : 0;
          }

          function countReferenceInputs(body, mode) {
            if (mode === 'text_to_video') return 0;
            const singleReference = body.first_frame_url || body.reference_url ? 1 : 0;
            return Math.max(
              1,
              singleReference,
              inputCount(body.reference_urls || body.referenceUrls),
              inputCount(body.input_references),
              inputCount(body.frame_images)
            );
          }

          function calculateCreditCost({ model, mode, duration, resolution, referenceCount }) {
            let credits;
            if (mode === 'storyboard') {
              // Preserve the existing storyboard price (duration * 12, minimum 50).
              credits = Math.max(MIN_CREDITS, duration * 12);
            } else {
              credits = 80;
              credits += Math.max(0, duration - 5) * 15;
              if (resolution === '1080p') credits += 100;
              if (resolution === '480p') credits -= 20;
              if (mode === 'reference_to_video') credits += Math.max(0, referenceCount - 1) * 10;
              if (mode === 'text_to_video') credits -= 10;
              credits += 15;
            }
            const multiplier = MODEL_CREDIT_MULTIPLIERS[model] || 1;
            return Math.max(MIN_CREDITS, Math.min(MAX_CREDITS, Math.round(credits * multiplier)));
          }
          """
          text = replace_once(text, old_mode, new_mode, 'seedance-start pricing helpers')

          old_handler = """    const resolution = normalizeResolution(body.resolution);
              const aspectRatio = normalizeAspectRatio(body.aspect_ratio || body.aspectRatio);
              const duration = normalizeDuration(body.duration || body.duration_seconds);
              const mode = normalizeMode(body.mode);
              const model = String(body.model || DEFAULT_MODEL).trim() || DEFAULT_MODEL;

              // Credit cost is the value shown in the UI (estimated_credits).
              // Clamped to a safe range to prevent client-side manipulation.
              const rawCredits = Math.round(Number(body.estimated_credits) || 0);
              const creditCost = Math.max(MIN_CREDITS, Math.min(MAX_CREDITS, rawCredits)) || MIN_CREDITS;
          """
          new_handler = """    const resolution = normalizeResolution(body.resolution);
              const aspectRatio = normalizeAspectRatio(body.aspect_ratio || body.aspectRatio);
              const duration = normalizeDuration(body.duration || body.duration_seconds);
              const mode = normalizeMode(body.mode);
              const model = normalizeModel(body.model);
              if (!model) {
                return res.status(400).json({
                  ok: false,
                  error: 'unsupported_model',
                  message: '対応していない動画モデルです。',
                  allowedModels: Array.from(ALLOWED_MODELS)
                });
              }

              // Recalculate on the server. Never trust the client-provided estimate.
              const referenceCount = countReferenceInputs(body, mode);
              const creditCost = calculateCreditCost({ model, mode, duration, resolution, referenceCount });
              const clientEstimate = Math.round(Number(body.estimated_credits) || 0);
              if (clientEstimate && clientEstimate !== creditCost) {
                console.warn('[seedance-start] client credit estimate mismatch:', clientEstimate, 'server:', creditCost, 'model:', model);
              }
          """
          text = replace_once(text, old_handler, new_handler, 'seedance-start handler pricing')
          server.write_text(text, encoding='utf-8')
          PY

      - name: Validate changes
        shell: bash
        run: |
          node --check api/seedance-start.js
          python - <<'PY'
          from pathlib import Path

          files = ['generate-prod.html', 'admin-seedance.html', 'seedance-reference-test.html']
          for filename in files:
              text = Path(filename).read_text(encoding='utf-8')
              assert 'bytedance/seedance-2.0-lite' not in text, filename
              assert 'bytedance/seedance-2.0-fast' in text, filename

          server = Path('api/seedance-start.js').read_text(encoding='utf-8')
          assert 'function normalizeModel' in server
          assert 'function calculateCreditCost' in server
          assert 'const rawCredits' not in server
          assert "error: 'unsupported_model'" in server

          def credits(model, mode='reference_to_video', duration=15, resolution='720p', refs=1):
              if mode == 'storyboard':
                  base = max(50, duration * 12)
              else:
                  base = 80 + max(0, duration - 5) * 15
                  if resolution == '1080p': base += 100
                  if resolution == '480p': base -= 20
                  if mode == 'reference_to_video': base += max(0, refs - 1) * 10
                  if mode == 'text_to_video': base -= 10
                  base += 15
              multiplier = 0.8 if model == 'bytedance/seedance-2.0-fast' else 1
              return max(50, min(500, round(base * multiplier)))

          assert credits('bytedance/seedance-2.0') == 245
          assert credits('bytedance/seedance-2.0-fast') == 196
          assert credits('bytedance/seedance-2.0', mode='storyboard', duration=5) == 60
          assert credits('bytedance/seedance-2.0-fast', mode='text_to_video', duration=5, resolution='480p', refs=0) == 52
          print('credit checks: standard 245 / fast 196 / storyboard unchanged 60')
          PY
          git diff --check

      - name: Remove temporary workflow
        run: rm .github/workflows/apply-seedance-fast-pricing.yml

      - name: Commit and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/seedance-start.js generate-prod.html admin-seedance.html seedance-reference-test.html .github/workflows/apply-seedance-fast-pricing.yml
          git commit -m "fix: price Seedance Fast credits correctly"
          git push origin HEAD:fix/seedance-fast-credit-pricing
