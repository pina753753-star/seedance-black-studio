name: PR94 cache bust

on:
  push:
    branches:
      - claude/video-edit-multi-clip

permissions:
  contents: write

jobs:
  update-cache-versions:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/video-edit-multi-clip
          fetch-depth: 0

      - name: Update exact cache versions
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          html = Path('generate-prod.html')
          html_text = html.read_text(encoding='utf-8')
          old_outer = './flowvid-open-inline.js?v=2'
          new_outer = './flowvid-open-inline.js?v=3'
          if html_text.count(old_outer) != 1:
              raise SystemExit(f'expected exactly one {old_outer!r}, found {html_text.count(old_outer)}')
          html.write_text(html_text.replace(old_outer, new_outer, 1), encoding='utf-8')

          loader = Path('flowvid-open-inline.js')
          loader_text = loader.read_text(encoding='utf-8')
          old_inner = './flowvid-video-edit-vllo.js?v=12669ba3'
          new_inner = './flowvid-video-edit-vllo.js?v=31c03589'
          if loader_text.count(old_inner) != 1:
              raise SystemExit(f'expected exactly one {old_inner!r}, found {loader_text.count(old_inner)}')
          loader.write_text(loader_text.replace(old_inner, new_inner, 1), encoding='utf-8')
          PY

      - name: Verify and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          grep -F './flowvid-open-inline.js?v=3' generate-prod.html
          grep -F './flowvid-video-edit-vllo.js?v=31c03589' flowvid-open-inline.js
          rm .github/workflows/pr94-cache-bust.yml
          git diff --check

      - name: Commit to existing PR branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add generate-prod.html flowvid-open-inline.js .github/workflows/pr94-cache-bust.yml
          git commit -m 'chore: bust video editor script caches'
          git push origin HEAD:claude/video-edit-multi-clip
