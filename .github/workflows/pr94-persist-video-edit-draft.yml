name: PR94 persist video edit draft

on:
  push:
    branches:
      - claude/video-edit-multi-clip
    paths:
      - .github/workflows/pr94-persist-video-edit-draft.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/video-edit-multi-clip
          fetch-depth: 0
      - name: Add safe local draft persistence
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('flowvid-video-edit-vllo.js')
          text = path.read_text()

          old = """    let sequenceToken=0;\n    let sequencePlaying=false;\n"""
          new = """    let sequenceToken=0;\n    let sequencePlaying=false;\n    let draftRestoreDone=false;\n    const VIDEO_EDIT_DRAFT_KEY='flowvidVideoEditDraftV1';\n"""
          if old not in text:
              raise SystemExit('state insertion point not found')
          text = text.replace(old, new, 1)

          old = """    const originalRenderList=veRenderList;\n    const originalAddClip=veAddClip;\n\n    function getClip(clipId){return veSelected.find(c=>c.clipId===clipId)||null}\n"""
          new = """    const originalRenderList=veRenderList;\n    const originalAddClip=veAddClip;\n\n    function saveDraft(){\n      if(!draftRestoreDone)return;\n      try{\n        const clips=veSelected.slice(0,6).map(c=>({clipId:String(c.clipId||''),videoId:String(c.videoId||''),start:Number(c.start)||0,end:Number(c.end)||0,duration:Number(c.duration)||5}));\n        localStorage.setItem(VIDEO_EDIT_DRAFT_KEY,JSON.stringify({version:1,activeClipId:activeClipId||null,clips,updatedAt:new Date().toISOString()}));\n      }catch(_){}\n    }\n    function restoreDraftOnce(){\n      if(draftRestoreDone||!veVideos.length)return;\n      draftRestoreDone=true;\n      try{\n        const raw=JSON.parse(localStorage.getItem(VIDEO_EDIT_DRAFT_KEY)||'null');\n        const available=new Set(veVideos.map(v=>String(v.id)));\n        const restored=[];\n        for(const item of Array.isArray(raw?.clips)?raw.clips:[]){\n          if(restored.length>=6)break;\n          const videoId=String(item?.videoId||'');\n          if(!videoId||!available.has(videoId))continue;\n          const clip={clipId:String(item?.clipId||'')||crypto.randomUUID(),videoId,start:Number(item?.start)||0,end:Number(item?.end)||Number(item?.duration)||5,duration:Number(item?.duration)||5};\n          veClampClip(clip,clip.duration);\n          restored.push(clip);\n        }\n        if(restored.length){\n          veSelected.splice(0,veSelected.length,...restored);\n          const requested=String(raw?.activeClipId||'');\n          activeClipId=restored.some(c=>c.clipId===requested)?requested:restored[0].clipId;\n          if(typeof veRenderBar==='function')veRenderBar();\n        }\n      }catch(_){localStorage.removeItem(VIDEO_EDIT_DRAFT_KEY)}\n      saveDraft();\n    }\n\n    function getClip(clipId){return veSelected.find(c=>c.clipId===clipId)||null}\n"""
          if old not in text:
              raise SystemExit('draft functions insertion point not found')
          text = text.replace(old, new, 1)

          old = """    function renderAll(){const c=selected();renderPreview(c);renderTimeline();renderTrim(c);syncButtons(c);syncFilmstrips();if(empty)empty.style.display=veVideos.length?'none':'block';setLegacyVisibility()}\n"""
          new = """    function renderAll(){const c=selected();renderPreview(c);renderTimeline();renderTrim(c);syncButtons(c);syncFilmstrips();if(empty)empty.style.display=veVideos.length?'none':'block';setLegacyVisibility();saveDraft()}\n"""
          if old not in text:
              raise SystemExit('renderAll replacement point not found')
          text = text.replace(old, new, 1)

          old = """    veRenderList=function(){if(!veVideos.length){if(empty)empty.style.display='block';list.innerHTML=''}else{if(empty)empty.style.display='none';list.innerHTML=veVideos.map(v=>veMaterialCard(v)).join('')}renderAll()};\n"""
          new = """    veRenderList=function(){restoreDraftOnce();if(!veVideos.length){if(empty)empty.style.display='block';list.innerHTML=''}else{if(empty)empty.style.display='none';list.innerHTML=veVideos.map(v=>veMaterialCard(v)).join('')}renderAll()};\n"""
          if old not in text:
              raise SystemExit('veRenderList replacement point not found')
          text = text.replace(old, new, 1)

          path.write_text(text)

          loader = Path('flowvid-open-inline.js')
          loader_text = loader.read_text()
          old_loader = "script.src='./flowvid-video-edit-vllo.js?v=31c03589';"
          new_loader = "script.src='./flowvid-video-edit-vllo.js?v=14491fc-draft1';"
          if old_loader not in loader_text:
              raise SystemExit('loader cache version point not found')
          loader.write_text(loader_text.replace(old_loader,new_loader,1))
          PY
      - name: Validate JavaScript
        run: |
          node --check flowvid-video-edit-vllo.js
          node --check flowvid-open-inline.js
          git diff --check
      - name: Commit update and remove one-time workflow
        run: |
          rm .github/workflows/pr94-persist-video-edit-draft.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flowvid-video-edit-vllo.js flowvid-open-inline.js
          git rm --cached .github/workflows/pr94-persist-video-edit-draft.yml || true
          git add -u .github/workflows/pr94-persist-video-edit-draft.yml
          git commit -m "feat: persist video edit timeline draft across reloads"
          git push origin HEAD:claude/video-edit-multi-clip
