# TEMP workflow — delete before merging PR #37.
# Applies the Supabase Preview Branch (pr37-annual-preview) connection settings
# as Vercel Preview branch-specific env vars, redeploys the PR preview, and
# verifies the deployed /auth-config.js points at the preview Supabase project.
# Touches ONLY the preview target for branch claude/add-annual-embedded-checkout.

name: TEMP - Preview Ops Apply Supabase Env to Vercel

on:
  push:
    branches:
      - claude/add-annual-embedded-checkout
    paths:
      - .github/workflows/temp-preview-ops-apply-supabase-vercel-env.yml
      - package.json
      - scripts/build-auth-config.js
      - auth-config.js

permissions:
  contents: read

concurrency:
  group: temp-preview-ops-apply-supabase-vercel-env
  cancel-in-progress: false

jobs:
  apply-preview-env:
    if: github.repository == 'pina753753-star/seedance-black-studio' && github.ref == 'refs/heads/claude/add-annual-embedded-checkout'
    environment: preview-ops
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      SUPABASE_PREVIEW_URL: ${{ secrets.SUPABASE_PREVIEW_URL }}
      SUPABASE_PREVIEW_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PREVIEW_PUBLISHABLE_KEY }}
      SUPABASE_PREVIEW_SECRET_KEY: ${{ secrets.SUPABASE_PREVIEW_SECRET_KEY }}
      VERCEL_SCOPE: pina-s-projects
      VERCEL_PROJECT: flowvid-studio
      TARGET_BRANCH: claude/add-annual-embedded-checkout
      EXPECTED_PREVIEW_SUPABASE_URL: https://odlrcvygupkjhspnhksf.supabase.co
      PROD_SUPABASE_HOST: jflpjsdjmlkmkqfahxwy.supabase.co
      SOURCE_DEPLOYMENT: https://flowvid-studio-8utop1v7n-pina-s-projects.vercel.app

    steps:
      - name: Validate secrets are present and well-formed (no values printed)
        shell: bash
        run: |
          set -euo pipefail
          set +x
          test -n "${VERCEL_TOKEN:-}" || { echo "Blocked: VERCEL_TOKEN unavailable."; exit 1; }
          test -n "${SUPABASE_PREVIEW_URL:-}" || { echo "Blocked: SUPABASE_PREVIEW_URL unavailable."; exit 1; }
          test -n "${SUPABASE_PREVIEW_PUBLISHABLE_KEY:-}" || { echo "Blocked: SUPABASE_PREVIEW_PUBLISHABLE_KEY unavailable."; exit 1; }
          test -n "${SUPABASE_PREVIEW_SECRET_KEY:-}" || { echo "Blocked: SUPABASE_PREVIEW_SECRET_KEY unavailable."; exit 1; }
          test "${SUPABASE_PREVIEW_URL}" = "${EXPECTED_PREVIEW_SUPABASE_URL}" || { echo "Blocked: SUPABASE_PREVIEW_URL is not the expected preview branch URL."; exit 1; }
          case "${SUPABASE_PREVIEW_PUBLISHABLE_KEY}" in
            sb_publishable_*) : ;;
            *) echo "Blocked: publishable key does not start with sb_publishable_."; exit 1 ;;
          esac
          case "${SUPABASE_PREVIEW_SECRET_KEY}" in
            sb_secret_*) : ;;
            *) echo "Blocked: secret key does not start with sb_secret_."; exit 1 ;;
          esac
          echo "Secrets present and classified OK (values not shown)."

      - name: Link Vercel project (preview scope only)
        shell: bash
        run: |
          set -euo pipefail
          set +x
          npx --yes vercel@latest link --yes --project "${VERCEL_PROJECT}" --scope "${VERCEL_SCOPE}" --token "${VERCEL_TOKEN}"

      - name: Set Vercel Preview branch-specific env vars
        shell: bash
        run: |
          set -euo pipefail
          set +x
          tmp="$(mktemp)"
          trap 'rm -f "$tmp"' EXIT

          set_env() {
            name="$1"; value="$2"
            printf '%s' "$value" > "$tmp"
            npx --yes vercel@latest env add "$name" preview "${TARGET_BRANCH}" \
              --force --sensitive --yes \
              --scope "${VERCEL_SCOPE}" --token "${VERCEL_TOKEN}" < "$tmp"
            echo "Set preview/${TARGET_BRANCH} env: $name"
          }

          set_env SUPABASE_URL                    "${SUPABASE_PREVIEW_URL}"
          set_env NEXT_PUBLIC_SUPABASE_URL        "${SUPABASE_PREVIEW_URL}"
          set_env SUPABASE_PUBLISHABLE_KEY        "${SUPABASE_PREVIEW_PUBLISHABLE_KEY}"
          set_env SUPABASE_ANON_KEY               "${SUPABASE_PREVIEW_PUBLISHABLE_KEY}"
          set_env NEXT_PUBLIC_SUPABASE_ANON_KEY   "${SUPABASE_PREVIEW_PUBLISHABLE_KEY}"
          set_env SUPABASE_SERVICE_ROLE_KEY       "${SUPABASE_PREVIEW_SECRET_KEY}"
          set_env SUPABASE_SERVICE_KEY            "${SUPABASE_PREVIEW_SECRET_KEY}"

          rm -f "$tmp"
          echo "Preview env names now set for ${TARGET_BRANCH}:"
          npx --yes vercel@latest env ls preview "${TARGET_BRANCH}" --scope "${VERCEL_SCOPE}" --token "${VERCEL_TOKEN}" | awk '{print $1}'

      - name: Redeploy preview deployment
        id: redeploy
        shell: bash
        run: |
          set -euo pipefail
          set +x
          out="$(npx --yes vercel@latest redeploy "${SOURCE_DEPLOYMENT}" --target=preview --scope "${VERCEL_SCOPE}" --token "${VERCEL_TOKEN}" --no-color)"
          url="$(printf '%s\n' "$out" | grep -oE 'https://[a-z0-9.-]+\.vercel\.app' | tail -1)"
          test -n "$url" || { echo "Blocked: could not extract new preview URL from redeploy output."; exit 1; }
          echo "New preview URL: $url"
          echo "preview_url=$url" >> "$GITHUB_OUTPUT"

      - name: Verify deployed preview (GET only, no secrets printed)
        shell: bash
        run: |
          set -euo pipefail
          set +x
          url="${{ steps.redeploy.outputs.preview_url }}"

          check_status() {
            path="$1"; expected="$2"
            code="$(curl -sS -o /tmp/body -w '%{http_code}' "${url}${path}")"
            echo "GET ${path} -> HTTP ${code}"
            test "$code" = "$expected" || { echo "FAIL: ${path} expected HTTP ${expected}"; exit 1; }
          }

          # 1. /auth-config.js
          check_status /auth-config.js 200
          grep -q "${EXPECTED_PREVIEW_SUPABASE_URL}" /tmp/body || { echo "FAIL: auth-config.js does not contain preview Supabase URL"; exit 1; }
          if grep -q "${PROD_SUPABASE_HOST}" /tmp/body; then echo "FAIL: auth-config.js still contains production Supabase URL"; exit 1; fi
          if grep -qE 'sb_secret_|sk_live_|sk_test_' /tmp/body; then echo "FAIL: auth-config.js contains secret-shaped material"; exit 1; fi
          grep -q 'sb_publishable_' /tmp/body || { echo "FAIL: auth-config.js key is not sb_publishable classified"; exit 1; }
          echo "auth-config.js OK: preview URL present, prod URL absent, key classification sb_publishable"

          # 2. /api/stripe-config (classification only)
          check_status /api/stripe-config 200
          if grep -q '"publishableKey"[[:space:]]*:[[:space:]]*"pk_test' /tmp/body; then
            echo "stripe-config OK: publishableKey classification pk_test"
          else
            echo "FAIL: stripe-config publishableKey is not pk_test classified"; exit 1
          fi

          # 3. /api/stripe-webhook GET only
          check_status /api/stripe-webhook 200
          grep -q '"ok"[[:space:]]*:[[:space:]]*true' /tmp/body || { echo "FAIL: stripe-webhook GET missing ok:true"; exit 1; }
          grep -q '"/api/stripe-webhook"' /tmp/body || { echo "FAIL: stripe-webhook GET missing endpoint"; exit 1; }
          echo "stripe-webhook GET OK"

          # 4. /login.html
          check_status /login.html 200
          grep -qiE 'FlowVid Studio|ログイン' /tmp/body || { echo "FAIL: login.html missing expected content"; exit 1; }
          echo "login.html OK"

          rm -f /tmp/body
          echo "All preview verifications passed. Final preview URL: ${url}"
