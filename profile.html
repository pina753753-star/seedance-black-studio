<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>マイページ | Seedance Black Studio</title>
  <meta name="theme-color" content="#050506" />
  <style>
    :root{--bg:#050506;--panel:#11141b;--panel2:#1a202b;--line:rgba(255,255,255,.12);--muted:rgba(255,255,255,.55);--gold:#d7b86a;--blue:#38bdf8;--violet:#7c3aed;--green:#8ef0c2}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#050506;color:#fff;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{max-width:900px;margin:0 auto;padding:18px 14px 44px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px}.brand{display:flex;gap:12px;align-items:center}.logo{width:44px;height:44px;border-radius:17px;background:linear-gradient(135deg,#6ee7f9,#7c3aed);display:grid;place-items:center;font-weight:900}.brand small{display:block;color:rgba(255,255,255,.38);letter-spacing:.24em;font-size:10px}.brand b{font-size:21px}.nav{display:flex;gap:8px}.nav a{color:#fff;text-decoration:none;border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:999px;padding:10px 12px;font-size:13px}.profileCard{position:relative;overflow:hidden;border:1px solid rgba(96,165,250,.35);border-radius:28px;background:linear-gradient(135deg,#202a35,#141b2a 62%,#1b2130);padding:22px;margin-bottom:18px;box-shadow:0 28px 90px rgba(0,0,0,.45)}.profileCard:after{content:"";position:absolute;right:-50px;top:30px;width:190px;height:190px;border:26px solid rgba(255,255,255,.05);border-radius:60px;transform:rotate(25deg)}.user{position:relative;display:flex;align-items:center;gap:14px}.avatar{width:74px;height:74px;border-radius:50%;background:linear-gradient(135deg,#313846,#111 55%);display:grid;place-items:center;font-size:24px;font-weight:900;color:rgba(255,255,255,.76)}.name h1{margin:0;font-size:25px}.name p{margin:6px 0 0;color:rgba(255,255,255,.68);font-size:14px}.guestBadge{display:inline-flex;margin-top:8px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);border-radius:999px;padding:5px 9px;color:rgba(255,255,255,.68);font-size:12px}.credits{position:relative;margin:24px 0 20px;display:flex;align-items:flex-end;gap:13px}.credits strong{font-size:72px;line-height:.9;color:#38bdf8;letter-spacing:-.05em}.credits span{color:rgba(255,255,255,.68);font-weight:800;margin-bottom:8px}.breakdown{position:relative;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.mini b{display:block;font-size:28px}.mini span{display:block;color:rgba(255,255,255,.58);font-size:13px;line-height:1.45;margin-top:4px}.trial{position:relative;margin-top:18px;border:1px solid rgba(215,184,106,.28);background:rgba(215,184,106,.08);border-radius:20px;padding:14px;color:rgba(255,255,255,.76);line-height:1.6;font-size:14px}.trial b{color:#fff}.actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0}.actions a,.rowLink{display:flex;align-items:center;justify-content:center;text-decoration:none;color:#fff;background:rgba(255,255,255,.09);border:1px solid var(--line);border-radius:18px;padding:15px;font-weight:900}.list{display:grid;gap:8px;margin-top:16px}.rowLink{justify-content:space-between;background:rgba(255,255,255,.04);padding:16px 18px}.section{border:1px solid var(--line);border-radius:26px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.025));padding:18px;margin-top:18px}.tabs{display:flex;gap:22px;border-bottom:1px solid var(--line);margin:0 -18px;padding:0 18px 12px}.tabs span{color:rgba(255,255,255,.45);font-weight:900}.tabs .active{color:#fff;border-bottom:3px solid #fff;padding-bottom:10px;margin-bottom:-15px}.empty{min-height:260px;display:grid;place-items:center;text-align:center;color:rgba(255,255,255,.55)}.emptyIcon{width:140px;height:110px;border-radius:48px;background:radial-gradient(circle at 50% 35%,rgba(255,255,255,.18),rgba(255,255,255,.04) 55%,transparent 60%);display:grid;place-items:center;margin:auto}.empty b{display:block;margin-top:16px;font-size:18px;color:#fff}.note{color:rgba(255,255,255,.36);font-size:12px;line-height:1.7;text-align:center;margin-top:14px}@media(max-width:430px){.wrap{padding:16px 12px 38px}.credits strong{font-size:62px}.profileCard{padding:18px}.actions{grid-template-columns:1fr}.breakdown{gap:8px}.mini b{font-size:25px}.nav a{padding:9px 10px}}
  </style>
</head>
<body>
  <main class="wrap">
    <header class="top"><div class="brand"><div class="logo">▶</div><div><small>AI VIDEO STUDIO</small><b>Seedance Black</b></div></div><nav class="nav"><a href="./index.html">生成</a><a href="./pricing.html">料金</a></nav></header>
    <section class="profileCard">
      <div class="user"><div class="avatar">G</div><div class="name"><h1>ゲスト</h1><p>ログインしていません</p><span class="guestBadge">Guest mode</span></div></div>
      <div class="credits"><strong>0</strong><span>現在のプラン｜フリー</span></div>
      <div class="breakdown"><div class="mini"><b>0</b><span>無料クレジット</span></div><div class="mini"><b>0</b><span>サブスククレジット</span></div><div class="mini"><b>0</b><span>購入クレジット</span></div></div>
      <div class="trial"><b>無料お試し：</b>初回1回だけ生成テスト可能。ログイン後に利用できます。</div>
    </section>
    <section class="actions"><a href="#">ログイン</a><a href="#">アカウント作成</a></section>
    <section class="list"><a class="rowLink" href="./profile.html">プロフィール <span>›</span></a><a class="rowLink" href="./pricing.html">サブスクリプションプラン <span>›</span></a><a class="rowLink" href="./pricing.html#credit">クレジット購入 <span>›</span></a><a class="rowLink" href="#">ヘルプセンター <span>›</span></a></section>
    <section class="section"><div class="tabs"><span class="active">投稿済み</span><span>いいね 🔒</span><span>コレクション 🔒</span></div><div class="empty"><div><div class="emptyIcon">▱</div><b>投稿された作品はまだありません</b><p>生成した動画を保存すると、ここに表示されます。</p></div></div></section>
    <p class="note">これは静的プレビューです。ログイン・実データ連携は本番実装で追加します。</p>
  </main>
</body>
</html>
