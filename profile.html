<!doctype html>
<html lang='ja'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1, viewport-fit=cover'>

<meta name='theme-color' content='#050506'>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#050506;--line:rgba(255,255,255,.12);--muted:rgba(255,255,255,.58);--gold:#d7b86a;--cyan:#6ee7f9;--violet:#7c3aed;--pink:#f0abfc}*{box-sizing:border-box}html{background:#000}html,body{margin:0;min-height:100%;background:var(--bg);color:#fff;font-family:'Noto Sans JP',system-ui,-apple-system,sans-serif}body{overflow-x:hidden;background:#000}.wrap{max-width:900px;margin:0 auto;padding:18px 14px 44px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px}.brand{display:flex;gap:12px;align-items:center;color:#fff;text-decoration:none}.logo{width:44px;height:44px;border-radius:17px;background:conic-gradient(from 180deg,var(--cyan),var(--violet),var(--pink),var(--cyan));display:grid;place-items:center;font-weight:900}.brand small{display:block;color:rgba(255,255,255,.38);letter-spacing:.24em;font-size:10px}.brand b{font-size:21px}.nav{display:flex;gap:8px;align-items:center}.nav a,.menuBtn{color:#fff;text-decoration:none;border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:999px;padding:10px 12px;font-size:13px}.menuBtn{width:42px;height:42px;display:grid;place-items:center;padding:0;font-size:21px}.hero{margin:8px 0 18px}.hero p{margin:0;color:rgba(255,255,255,.45);font-size:13px;letter-spacing:.18em}.hero h1{margin:8px 0 0;font-size:32px;line-height:1.12;letter-spacing:-.05em;background:linear-gradient(135deg,#fff,#d7b86a 54%,#6ee7f9);-webkit-background-clip:text;color:transparent}.dashboard{display:grid;gap:14px}.panel,.section{border:1px solid rgba(255,255,255,.13);border-radius:28px;background:linear-gradient(160deg,rgba(255,255,255,.08),rgba(255,255,255,.025));padding:18px;box-shadow:0 28px 90px rgba(0,0,0,.48)}.user{display:flex;align-items:center;gap:14px}.avatar{width:66px;height:66px;border-radius:22px;background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.14);display:grid;place-items:center;font-size:24px;font-weight:950}.name h2{margin:0;font-size:25px}.name p{margin:5px 0 0;color:var(--muted);font-size:14px;word-break:break-all}.badge{display:inline-flex;margin-top:8px;border:1px solid rgba(110,231,249,.27);background:rgba(110,231,249,.08);border-radius:999px;padding:5px 9px;color:rgba(255,255,255,.72);font-size:12px}.creditMain{margin-top:22px;display:grid;grid-template-columns:1fr auto;gap:14px;align-items:end}.creditMain strong{font-size:68px;line-height:.9;letter-spacing:-.065em;font-family:'Inter',system-ui,sans-serif}.creditMain span{color:var(--muted);font-weight:800;font-size:14px}.planPill{justify-self:end;border:1px solid rgba(215,184,106,.28);background:rgba(215,184,106,.08);color:var(--gold);border-radius:999px;padding:8px 11px;font-size:12px;font-weight:900}.trial{margin-top:18px;border:1px solid rgba(215,184,106,.26);background:linear-gradient(135deg,rgba(215,184,106,.12),rgba(124,58,237,.08));border-radius:22px;padding:15px;color:rgba(255,255,255,.8);line-height:1.65;font-size:14px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stat{border:1px solid var(--line);border-radius:24px;background:rgba(255,255,255,.045);padding:16px}.stat b{display:block;font-size:30px;font-family:'Inter',system-ui,sans-serif}.stat span{display:block;color:var(--muted);font-size:13px;line-height:1.45;margin-top:5px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:12px}.actions a,.actions button,.rowLink{display:flex;align-items:center;justify-content:center;text-decoration:none;color:#fff;background:rgba(255,255,255,.08);border:1px solid var(--line);border-radius:20px;padding:15px;font-weight:900;font:inherit}.actions .primary{background:linear-gradient(90deg,#fff,var(--gold),var(--violet));color:#050506;border:0}.list{display:grid;gap:8px}.rowLink{justify-content:space-between;background:rgba(255,255,255,.04);padding:16px 18px}.section{margin-top:4px}.tabs{display:flex;gap:22px;border-bottom:1px solid var(--line);margin:0 -18px;padding:0 18px 12px;overflow:auto}.tabs span{color:rgba(255,255,255,.45);font-weight:900;white-space:nowrap}.tabs .active{color:#fff;border-bottom:3px solid #fff;padding-bottom:10px;margin-bottom:-15px}.empty{min-height:250px;display:grid;place-items:center;text-align:center;color:rgba(255,255,255,.55)}.emptyIcon{width:128px;height:108px;border-radius:34px;border:1px solid rgba(255,255,255,.12);background:linear-gradient(135deg,rgba(110,231,249,.08),rgba(124,58,237,.08));display:grid;place-items:center;margin:auto;font-size:34px}.empty b{display:block;margin-top:16px;font-size:18px;color:#fff}.videos{display:grid;gap:12px;margin-top:14px;background:#000}.videoCard{border:1px solid rgba(255,255,255,.1);border-radius:22px;background:#14161d;padding:12px;overflow:hidden}.videoCard video{width:100%;aspect-ratio:9/16;max-height:68vh;border-radius:16px;background:#000;object-fit:contain}.videoMeta{color:var(--muted);font-size:12px;line-height:1.6;margin-top:8px}.videoPrompt{font-size:13px;line-height:1.55;margin:8px 0;color:rgba(255,255,255,.82)}.openVideo{display:block;margin-top:8px;color:#d7fff2;font-weight:900;font-size:13px}.downloadActions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.downloadBtn{display:flex;align-items:center;justify-content:center;min-height:54px;border-radius:16px;border:1px solid rgba(255,255,255,.14);background:#1e2230;color:#fff;text-decoration:none;text-align:center;font-weight:950;font-size:13px;line-height:1.3}.downloadBtn span{display:block;color:rgba(255,255,255,.56);font-size:11px;font-weight:850;margin-top:2px}.downloadBtn.clean{background:linear-gradient(135deg,rgba(215,184,106,.2),rgba(124,58,237,.12));border-color:rgba(215,184,106,.35)}.downloadBtn.locked{opacity:.5;color:rgba(255,255,255,.7);cursor:not-allowed}.downloadNote{margin-top:7px;color:rgba(255,255,255,.38);font-size:11px;line-height:1.5}.note{color:rgba(255,255,255,.36);font-size:12px;line-height:1.7;text-align:center;margin-top:14px}.drawer{position:fixed;inset:0;z-index:20;display:none}.drawer.open{display:block}.shade{position:absolute;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(8px)}.menu{position:absolute;right:12px;top:12px;width:min(340px,calc(100vw - 24px));border:1px solid var(--line);border-radius:28px;background:#000;padding:18px}.menuHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.close{border:0;background:rgba(255,255,255,.08);color:#fff;border-radius:50%;width:38px;height:38px;font-size:24px}.menu a{display:flex;justify-content:space-between;color:#fff;text-decoration:none;border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:18px;padding:15px;margin-top:8px;font-weight:500;font-size:14px}.menu a.logout{border-color:rgba(251,113,133,.28);background:rgba(251,113,133,.08)}@media(min-width:820px){.dashboard{grid-template-columns:1.15fr .85fr}.panel{grid-row:span 2}.section{grid-column:1/-1}.hero h1{font-size:44px}.videos{grid-template-columns:repeat(2,1fr)}}@media(max-width:430px){.wrap{padding:16px 12px 38px}.brand b{font-size:21px}.hero h1{font-size:30px}.creditMain strong{font-size:60px}.actions{grid-template-columns:1fr}.stats{gap:8px}.stat{padding:13px}.stat b{font-size:26px}.nav a{display:none}.downloadActions{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class='wrap'>
<header class='top'><a class='brand' href='./index.html'><img src="/logo.png" alt="FlowVid Studio" style="height:auto;width:120px;display:block"></a><button class='menuBtn' id='menuBtn'>☰</button></header>
<section class='hero'><p>MY PAGE</p><h1>アカウントとクレジットを管理</h1></section>
<section class='dashboard'>
<section class='panel'><div class='user'><div class='avatar' id='avatar'>G</div><div class='name'><h2 id='displayName'>ゲスト</h2><p id='displayEmail'>ログインしていません</p><span class='badge' id='statusBadge'>Guest mode</span></div></div><div class='creditMain'><div><strong id='creditAmount'>0</strong><span>利用可能クレジット</span></div><div class='planPill' id='planName'>フリープラン</div></div></section>
<section class='stats' style='grid-template-columns:repeat(2,1fr)'><div class='stat'><b id='totalCredit'>0</b><span>利用可能クレジット</span></div><div class='stat'><b id='paidCredit'>0</b><span>購入クレジット</span></div></section>
<section class='actions' id='actionArea'><a class='primary' href='./login.html'>ログイン</a><a href='./login.html'>アカウント作成</a></section>
<section class='list'><a class='rowLink' href='./pricing.html'>サブスクリプションプラン <span>›</span></a><a class='rowLink' href='./pricing.html#credit'>クレジット購入 <span>›</span></a><a class='rowLink' href='./help.html'>ヘルプセンター <span>›</span></a></section>
</section>
<section class='section' id='historySec' style='display:none;background:#000;border-color:rgba(255,255,255,.07);box-shadow:none'>
<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:14px'><b style='font-size:17px'>生成履歴</b></div>
<div class='tabs' id='histTabs' style='margin-bottom:0'>
  <span class='active' data-tab='all' style='cursor:pointer'>全履歴</span>
  <span data-tab='fav' style='cursor:pointer'>お気に入り</span>
</div>
<div class='videos' id='histList'></div>
</section>
</main>
<div class='drawer' id='drawer'><div class='shade' id='shade'></div><div class='menu'><div class='menuHead'><b>メニュー</b><button class='close' id='close'>×</button></div><a href='./index.html'>ホーム <span>›</span></a><a href='./generate.html'>生成 <span>›</span></a><a href='./login.html'>ログイン / 新規登録 <span>›</span></a><a href='./profile.html'>マイページ <span>›</span></a><a href='./pricing.html'>サブスクリプション <span>›</span></a><a href='./pricing.html#credit'>クレジット購入 <span>›</span></a><a href='./help.html'>ヘルプセンター <span>›</span></a><a class='logout' href='./logout.html'>ログアウト <span>›</span></a></div></div>
<script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script>
<script src='./auth-config.js?v=3844d5ea2'></script>
<script>
const d=document.getElementById('drawer');document.getElementById('menuBtn').onclick=()=>d.classList.add('open');document.getElementById('shade').onclick=()=>d.classList.remove('open');document.getElementById('close').onclick=()=>d.classList.remove('open');
const cfg=window.FLOWVID_AUTH||{};const authReady=Boolean(cfg.supabaseUrl&&cfg.supabaseAnonKey);const client=authReady?window.supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey):null;const $=id=>document.getElementById(id);const jpPlan={free:'フリープラン',standard:'スタンダード',premium:'プレミアム',scale:'スケール',team:'チーム'};
function setCredits(balance){const free=Number(balance?.free_credits||0),sub=Number(balance?.subscription_credits||0),paid=Number(balance?.purchased_credits||0),total=free+sub+paid;$('totalCredit').textContent=total;$('paidCredit').textContent=paid;$('creditAmount').textContent=total;}
function showGuest(){$('avatar').textContent='G';$('displayName').textContent='ゲスト';$('displayEmail').textContent='ログインしていません';$('statusBadge').textContent='Guest mode';setCredits({});$('planName').textContent='フリープラン';$('trialText').innerHTML='<b>無料お試し：</b>原価確認後までOFFです。';$('actionArea').innerHTML='<a class=primary href=./login.html>ログイン</a><a href=./login.html>アカウント作成</a>';}
async function loadDb(user){const email=user.email||'';$('avatar').textContent=(email[0]||'U').toUpperCase();$('displayName').textContent='ログイン中';$('displayEmail').textContent=email;$('statusBadge').textContent='Signed in';$('actionArea').innerHTML='<a class=primary href=./generate.html>生成画面へ</a><button id=logoutBtn>ログアウト</button><button id=portalBtn style="grid-column:1/-1">サブスクリプション設定</button>';$('logoutBtn').onclick=async()=>{await client.auth.signOut();showGuest();};$('portalBtn').onclick=async()=>{const btn=$('portalBtn');const orig=btn.textContent;btn.disabled=true;btn.textContent='処理中…';try{const{data:{session}}=await client.auth.getSession();const token=session?.access_token||'';if(!token){location.href='./login.html';return}const res=await fetch('/api/stripe-portal',{method:'POST',headers:{'Authorization':'Bearer '+token}});const data=await res.json();if(data.url){location.href=data.url}else if(data.error==='no_customer'){alert('サブスクリプションが見つかりません。');btn.disabled=false;btn.textContent=orig}else{alert(data.error||'エラーが発生しました');btn.disabled=false;btn.textContent=orig}}catch(e){alert('通信エラーが発生しました');btn.disabled=false;btn.textContent=orig}};
  const [profileRes,balanceRes]=await Promise.all([
    client.from('profiles').select('display_name,role,plan').eq('id',user.id).maybeSingle(),
    client.from('credit_balances').select('free_credits,subscription_credits,purchased_credits').eq('user_id',user.id).maybeSingle()
  ]);
  const profile=profileRes.data||{};const balance=balanceRes.data||{};
  if(profileRes.data){$('displayName').textContent=profile.display_name||'ログイン中';$('planName').textContent=jpPlan[profile.plan]||profile.plan||'フリープラン';if(profile.role==='admin')$('statusBadge').textContent='Admin signed in';}
  if(balanceRes.data)setCredits(balance);else setCredits({});
  showHistorySection();}
if(!authReady){showGuest('SupabaseのURLとanon keyが未設定です。');}else{client.auth.getSession().then(({data,error})=>{if(error||!data.session){showGuest();return;}loadDb(data.session.user);});client.auth.onAuthStateChange((_event,session)=>{session?loadDb(session.user):showGuest();});}
// ---- 生成履歴セクション ----
(function(){
  const FAVS_KEY='flowvidFavoriteJobs';
  const HIDDEN_KEY='flowvidHiddenVideos';
  const HIST_KEY='flowvidHistory';
  function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
  function safeJson(s,d){try{return JSON.parse(s||'')}catch(_){return d}}
  function favSet(){const a=safeJson(localStorage.getItem(FAVS_KEY),'[]');return new Set(Array.isArray(a)?a:[])}
  function hiddenSet(){const a=safeJson(localStorage.getItem(HIDDEN_KEY),'[]');return new Set(Array.isArray(a)?a:[])}
  function isFav(j){return favSet().has(String(j||''))}
  function toggleFavItem(j){if(!j)return;const s=favSet();const k=String(j);s.has(k)?s.delete(k):s.add(k);localStorage.setItem(FAVS_KEY,JSON.stringify([...s].slice(0,200)))}
  function hideItem(u,j){const s=hiddenSet();if(u)s.add(u);if(j)s.add(j);localStorage.setItem(HIDDEN_KEY,JSON.stringify([...s].slice(0,200)))}
  function modeLabel(v){v=String(v||'');return v==='image_to_video'?'画像から動画':v==='text_to_video'?'テキストから動画':v==='reference_to_video'?'リファレンス':'Seedance'}
  function shortDate(value){const d=value?new Date(value):null;if(!d||Number.isNaN(d.getTime()))return'';const m=Math.floor((Date.now()-d.getTime())/60000);if(m<1)return'今';if(m<60)return m+'分前';const h=Math.floor(m/60);if(h<24)return h+'時間前';return Math.floor(h/24)+'日前'}
  function normalize(row){const url=row?.video_url||row?.video_uri||row?.src||row?.url||'';if(!/^https?:\/\//i.test(url))return null;if(/openrouter\.ai\/api\/v1\/videos\/[^/?#]+\/?(?:[?#].*)?$/i.test(url))return null;return{url,jobId:row?.job_id||row?.jobId||row?.id||'',prompt:row?.prompt||row?.title||'生成動画',mode:row?.mode||'',createdAt:row?.created_at||row?.createdAt||''}}
  function ensurePhModal(){let m=document.getElementById('ph-prompt-modal');if(m)return m;m=document.createElement('div');m.id='ph-prompt-modal';m.style.cssText='position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.72);display:none;align-items:flex-end;padding-bottom:env(safe-area-inset-bottom,0)';m.innerHTML='<div style="background:#14171f;border-radius:24px 24px 0 0;width:100%;max-height:72vh;overflow-y:auto;padding:24px 20px 32px"><p style="color:#6b7280;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin:0 0 10px">プロンプト</p><div id="ph-prompt-modal-text" style="color:#e8eaf0;font-size:15px;line-height:1.4;white-space:pre-wrap;word-break:break-word;margin:0 0 16px;padding:10px 13px;background:rgba(255,255,255,.05);border-radius:14px;border:1px solid rgba(255,255,255,.09)"></div><div style="display:flex;gap:10px"><button type="button" id="ph-pm-copy" style="flex:1;height:48px;border:0;border-radius:14px;font-size:15px;font-weight:800;background:linear-gradient(90deg,#eee8ff,#8ed8ff);color:#050506;cursor:pointer">コピー</button><button type="button" id="ph-pm-close" style="flex:1;height:48px;border:0;border-radius:14px;font-size:15px;font-weight:800;background:#2b303a;color:#fff;cursor:pointer">閉じる</button></div></div>';document.body.appendChild(m);m.addEventListener('click',e=>{if(e.target===m)m.style.display='none'});document.getElementById('ph-pm-close').addEventListener('click',()=>m.style.display='none');document.getElementById('ph-pm-copy').addEventListener('click',()=>{const text=document.getElementById('ph-prompt-modal-text').textContent||'';navigator.clipboard?.writeText(text).then(()=>{const b=document.getElementById('ph-pm-copy');const t=b.textContent;b.textContent='コピー済';setTimeout(()=>{b.textContent=t},1500)})});return m}
  function openPhModal(text){if(!text)return;const m=ensurePhModal();const display=text.replace(/\n+/g,' ').replace(/\s{2,}/g,' ').trim();document.getElementById('ph-prompt-modal-text').textContent=display;m.style.display='flex'}
  const phIcOpen='<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 12 12"><path d="M2 10L10 2M5.5 2H10v4.5"/></svg>';
  const phIcDl='<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 14 14"><path d="M7 1.5v8M3.5 6.5L7 10l3.5-3.5M1.5 12.5h11"/></svg>';
  const phIcCopy='<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.4" viewBox="0 0 14 14"><rect x="4.5" y="4.5" width="8.5" height="8.5" rx="1.5"/><path d="M9.5 4.5v-1a1 1 0 00-1-1H2a1 1 0 00-1 1v7.5a1 1 0 001 1h1.5"/></svg>';
  const phIcX='<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 12 12"><path d="M2 2l8 8M10 2L2 10"/></svg>';
  const phIcStarOff='<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.4" viewBox="0 0 14 14"><path d="M7 1.5l1.6 3.3 3.6.5-2.6 2.5.6 3.6L7 9.5l-3.2 1.9.6-3.6-2.6-2.5 3.6-.5z"/></svg>';
  const phIcStarOn='<svg width="13" height="13" fill="#fde68a" stroke="#fde68a" stroke-width="1" viewBox="0 0 14 14"><path d="M7 1.5l1.6 3.3 3.6.5-2.6 2.5.6 3.6L7 9.5l-3.2 1.9.6-3.6-2.6-2.5 3.6-.5z"/></svg>';
  function histCard(it){const url=esc(it.url);const job=esc(it.jobId||'');const prompt=esc(it.prompt||'');const fav=isFav(it.jobId);return'<div class="videoCard" data-job-id="'+job+'" data-url="'+url+'"><div class="fv-video-frame" data-open-url="'+url+'" style="cursor:pointer;border-radius:16px;overflow:hidden;background:#000;margin-bottom:8px;position:relative"><video muted playsinline preload="metadata" src="'+url+'#t=0.2" style="width:100%;max-height:220px;aspect-ratio:auto;object-fit:contain;display:block;pointer-events:none"></video><button class=\"fv-expand-btn\" type=\"button\" data-url="'+url+'" aria-label=\"全画面で開く\" style=\"position:absolute;bottom:8px;right:8px;width:30px;height:30px;border:0;border-radius:8px;background:rgba(0,0,0,.62);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);color:rgba(255,255,255,.9);font-size:14px;display:grid;place-items:center;cursor:pointer;z-index:1;pointer-events:auto\">⤢</button></div><div class="videoMeta" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px">'+(it.mode?'<span style="background:rgba(139,92,246,.18);border:1px solid rgba(139,92,246,.4);color:#c4b5fd;border-radius:999px;padding:2px 7px;font-size:11px;font-weight:700">'+esc(modeLabel(it.mode))+'</span>':'')+'<span style="border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:2px 7px;background:rgba(255,255,255,.04);font-size:11px;font-weight:700">'+esc(shortDate(it.createdAt))+'</span></div><p class="videoPrompt ph-prompt" data-prompt="'+prompt+'" style="display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin:6px 0;cursor:pointer">'+esc(it.prompt)+'</p><div class="downloadActions" style="grid-template-columns:1fr 1fr 1fr"><button type="button" class="downloadBtn ph-open" data-url="'+url+'" style="display:inline-flex;align-items:center;justify-content:center;gap:5px">'+phIcOpen+' 開く</button><button type="button" class="downloadBtn ph-save" data-url="'+url+'" data-job-id="'+job+'" style="display:inline-flex;align-items:center;justify-content:center;gap:5px">'+phIcDl+' 保存</button><button type="button" class="downloadBtn ph-fav'+(fav?' clean':'')+'" data-job-id="'+job+'" data-url="'+url+'" style="display:inline-flex;align-items:center;justify-content:center;gap:5px">'+(fav?phIcStarOn+' お気に入り済み':phIcStarOff+' お気に入り')+'</button></div><div style="display:flex;gap:8px;margin-top:8px"><button type="button" class="downloadBtn ph-copy" data-prompt="'+prompt+'" style="flex:1;display:inline-flex;align-items:center;justify-content:center;gap:5px">'+phIcCopy+' コピー</button><button type="button" class="downloadBtn ph-hide" data-url="'+url+'" data-job-id="'+job+'" style="flex:1;opacity:.55;display:inline-flex;align-items:center;justify-content:center;gap:5px">'+phIcX+' 削除</button></div></div>'}
  let allItems=[];let curTab='all';
  function renderList(){const list=document.getElementById('histList');if(!list)return;const hidden=hiddenSet();let items=allItems.filter(it=>!hidden.has(it.url)&&!hidden.has(it.jobId));if(curTab==='fav'){const fs=favSet();items=items.filter(it=>fs.has(String(it.jobId||'')))}if(!items.length){list.innerHTML='<div class="empty"><div class="emptyIcon">🎬</div><b>'+(curTab==='fav'?'お気に入りがありません':'履歴がありません')+'</b></div>';return}list.innerHTML=items.map(histCard).join('')}
  async function loadHist(){const list=document.getElementById('histList');if(!list)return;list.innerHTML='<div class="empty"><div class="emptyIcon" style="font-size:24px;display:grid;place-items:center;width:64px;height:64px;border-radius:18px;border:1px solid rgba(255,255,255,.12);margin:auto">🎬</div><b style="display:block;margin-top:12px;color:#fff">読み込み中...</b></div>';try{const res=await fetch('/api/generated-videos?limit=100&t='+Date.now(),{cache:'no-store'});const data=await res.json();allItems=(data?.rows||[]).map(normalize).filter(Boolean)}catch(_){const loc=safeJson(localStorage.getItem(HIST_KEY),'[]')||[];allItems=loc.map(normalize).filter(Boolean)}renderList()}
  function saveVideo(url,jobId,btn){if(!url)return;const orig=btn.innerHTML;btn.disabled=true;btn.innerHTML='保存中';fetch(url,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error(String(r.status));return r.blob()}).then(blob=>{const bu=URL.createObjectURL(blob);const a=document.createElement('a');a.href=bu;a.download='flowvid-'+(jobId||Date.now())+'.mp4';document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(bu);a.remove()},1500);btn.innerHTML='保存済';setTimeout(()=>{btn.innerHTML=orig;btn.disabled=false},1600)}).catch(()=>{btn.innerHTML=orig;btn.disabled=false;alert('保存できませんでした。開くから保存してください。')})}
  window.showHistorySection=function(){const sec=document.getElementById('historySec');if(sec)sec.style.display='';loadHist()};
  function init(){
    const tabs=document.getElementById('histTabs');if(!tabs)return;
    tabs.addEventListener('click',e=>{const t=e.target.closest('[data-tab]');if(!t)return;e.preventDefault();e.stopPropagation();curTab=t.dataset.tab;tabs.querySelectorAll('[data-tab]').forEach(el=>el.classList.toggle('active',el===t));renderList()});
    document.addEventListener('click',e=>{
      const frame=e.target.closest('.fv-video-frame');if(frame&&!e.target.closest('.fv-expand-btn')){e.preventDefault();e.stopPropagation();const v=frame.querySelector('video');if(v){v.paused?v.play().catch(()=>{}):v.pause()}return}
      const open=e.target.closest('.ph-open');if(open){e.preventDefault();e.stopPropagation();window.fvOpenOverlay?.(open.dataset.url||'');return}
      const save=e.target.closest('.ph-save');if(save){e.preventDefault();e.stopPropagation();saveVideo(save.dataset.url||'',save.dataset.jobId||'',save);return}
      const copy=e.target.closest('.ph-copy');if(copy){e.preventDefault();e.stopPropagation();const p=copy.dataset.prompt||'';if(p)navigator.clipboard?.writeText(p).then(()=>{const t=copy.innerHTML;copy.innerHTML='コピー済';setTimeout(()=>{copy.innerHTML=t},1500)});return}
      const promptEl=e.target.closest('.ph-prompt');if(promptEl){e.preventDefault();e.stopPropagation();openPhModal(promptEl.dataset.prompt||promptEl.textContent||'');return}
      const fav=e.target.closest('.ph-fav');if(fav){e.preventDefault();e.stopPropagation();toggleFavItem(fav.dataset.jobId||'');renderList();return}
      const hide=e.target.closest('.ph-hide');if(hide){e.preventDefault();e.stopPropagation();if(!confirm('この動画を履歴から削除しますか？\n動画ファイル本体は削除しません。'))return;hideItem(hide.dataset.url||'',hide.dataset.jobId||'');renderList();return}
    });
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
