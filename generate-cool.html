<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>FlowVid Studio</title><script src="./auth-config.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>*{box-sizing:border-box}body{margin:0;background:#050b12;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.wrap{max-width:760px;margin:auto;padding:22px 12px 70px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}.brand{display:flex;gap:12px;align-items:center;text-decoration:none;color:#fff}.logo{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,#fff,#7dd3fc,#8b5cf6);display:grid;place-items:center;color:#050506;font-weight:1000}.brand b{font-size:25px}.home{width:44px;height:44px;border-radius:50%;background:#1b2029;color:#fff;display:grid;place-items:center;text-decoration:none}.tabs{display:grid;grid-template-columns:repeat(4,1fr);background:#1b1f27;border-radius:17px;overflow:hidden;margin-bottom:14px}.tabs button{border:0;background:transparent;color:#777;padding:10px 2px;font-size:10px;font-weight:900}.tabs .on{background:#343742;color:#fff}.card,.now,.done,.old{background:#1b1e25;border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:14px}.assets{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}.add,.thumb{height:104px;border-radius:15px;background:#101319;border:1px solid rgba(255,255,255,.07);overflow:hidden;position:relative}.add{display:grid;place-items:center;text-align:center;font-weight:900}.add input{position:absolute;inset:0;opacity:0}.add b{display:block;font-size:34px}.add span{font-size:13px;color:#aaa}.thumb img{width:100%;height:100%;object-fit:cover}.thumb small{position:absolute;left:7px;bottom:7px;background:rgba(0,0,0,.65);border-radius:8px;padding:3px 6px;font-size:11px}.prompt{background:#111319;border:1px solid rgba(255,255,255,.07);border-radius:18px;overflow:hidden}textarea{width:100%;min-height:178px;border:0;background:transparent;color:#fff;padding:16px;font-size:16px;line-height:1.65;outline:0;resize:vertical}textarea::placeholder{color:#666}.tools{display:flex;gap:14px;border-top:1px solid rgba(255,255,255,.06);padding:11px 14px}.tools button{border:0;background:transparent;color:#bbb;font-weight:850}.tools button:last-child{margin-left:auto}.settings{margin-top:12px;background:#1b1e25;border:1px solid rgba(255,255,255,.08);border-radius:17px;overflow:hidden}summary{list-style:none;padding:16px 18px;font-weight:950;display:flex;justify-content:space-between}summary:after{content:'⌄';font-size:24px}.settings[open] summary:after{transform:rotate(180deg)}.settingsBody{padding:0 14px 14px;display:grid;gap:10px}.field label{display:block;color:#999;font-size:12px;margin-bottom:6px;font-weight:850}.field select{width:100%;background:#0e1117;color:#fff;border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:12px}.create{width:100%;border:0;border-radius:18px;margin-top:16px;padding:18px 14px;background:linear-gradient(90deg,#eee8ff,#8ed8ff);font-size:21px;font-weight:1000;color:#050506}.create:disabled{opacity:.55}.mini{display:flex;justify-content:space-between;align-items:center;margin-top:12px;color:#777;font-size:12px}.pill{display:inline-flex;background:rgba(134,239,172,.08);border:1px solid rgba(134,239,172,.25);color:#dcfce7;border-radius:999px;padding:7px 10px;font-weight:900}.pill.bad{background:rgba(251,113,133,.1);border-color:rgba(251,113,133,.3);color:#fecdd3}.now,.done{display:none;margin-top:16px}.show{display:block}.row{display:flex;justify-content:space-between;align-items:center}.spin{width:22px;height:22px;border-radius:50%;border:3px solid rgba(255,255,255,.18);border-top-color:#8ed8ff;animation:s 1s linear infinite}@keyframes s{to{transform:rotate(360deg)}}.bar{height:8px;background:#0d1015;border-radius:999px;overflow:hidden;margin-top:12px}.bar span{display:block;height:100%;width:42%;background:linear-gradient(90deg,#fff,#8ed8ff,#8b5cf6);animation:m 1.2s ease-in-out infinite alternate}@keyframes m{to{transform:translateX(138%)}}.job{margin-top:9px;color:#777;font-size:11px;word-break:break-all}.log{display:none;white-space:pre-wrap;margin-top:12px;background:#0e1117;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px;color:#bbb;font-size:11px;max-height:180px;overflow:auto}.log.show{display:block}.done video,.old video{width:100%;max-height:420px;background:#000;border-radius:16px}.head,.section{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.icons{display:flex;gap:8px;margin-top:10px}.icon{width:43px;height:38px;border:0;border-radius:12px;background:#2b303a;color:#fff;text-decoration:none;display:grid;place-items:center;font-size:18px}.section{margin:22px 2px 10px}.section h2{font-size:17px;margin:0}.section button{border:1px solid rgba(255,255,255,.08);background:#1b2029;color:#fff;border-radius:13px;padding:8px 10px;font-weight:900}.history{display:grid;gap:12px}.oldTop{margin-bottom:9px;color:#aaa;font-weight:900}.empty{border:1px dashed rgba(255,255,255,.1);border-radius:18px;padding:18px;text-align:center;color:#888}.sbUpload{background:#1b1e25;border:2px dashed rgba(255,255,255,.18);border-radius:22px;padding:32px 14px;text-align:center;cursor:pointer;position:relative;transition:border-color .2s}.sbUpload:hover{border-color:rgba(142,216,255,.5)}.sbCutCard{background:#1b1e25;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px}.sbProgCard{background:#1b1e25;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px;display:flex;justify-content:space-between;align-items:center}@media(min-width:620px){.assets{grid-template-columns:repeat(5,1fr)}.settingsBody{grid-template-columns:1fr 1fr}}</style></head><body><main class="wrap"><header class="top"><a class="brand" href="./index.html"><div class="logo">▶</div><b>FlowVid Studio</b></a><a class="home" href="./index.html">⌂</a></header><div class="tabs"><button class="on" data-mode="reference_to_video">リファレンス</button><button data-mode="image_to_video">画像から動画</button><button data-mode="text_to_video">テキストから動画</button><button data-mode="storyboard">絵コンテ</button></div><section class="card" id="mainCard"><div class="assets" id="assets"><label class="add"><input id="file" type="file" accept="image/png,image/jpeg,image/webp" multiple><div><b>＋</b><span>画像追加</span></div></label></div><div class="prompt"><textarea id="prompt" placeholder="キャラクター、商品、シーン、動きを入力してください。"></textarea><div class="tools"><button id="guide" type="button">▱ ユーザーガイド</button><button id="sample" type="button">サンプルを試す ›</button></div></div><details class="settings"><summary>設定</summary><div class="settingsBody"><div class="field"><label>モデル</label><select id="model"><option value="bytedance/seedance-2.0">Seedance 2.0</option><option value="bytedance/seedance-2.0-lite">Seedance 2.0 Lite</option></select></div><div class="field"><label>アスペクト比</label><select id="aspect"><option value="9:16">9:16 スマホ縦</option><option value="16:9">16:9 横動画</option><option value="1:1">1:1 正方形</option></select></div><div class="field"><label>長さ</label><select id="duration"><option value="5">5秒</option><option value="8">8秒</option></select></div><div class="field"><label>解像度</label><select id="resolution"><option value="720p">720p</option><option value="480p">480p</option><option value="1080p">1080p</option></select></div><div class="field"><label>音声</label><select id="audio"><option value="false">なし</option><option value="true">あり</option></select></div></div></details><button class="create" id="create">作成する ✦ 48</button><div class="mini"><span id="notice" class="pill">準備OK</span><span id="modeLabel">リファレンス</span></div><pre class="log" id="log"></pre></section><section class="now" id="now"><div class="row"><b>処理中</b><span class="spin"></span></div><div class="bar"><span></span></div><div class="job" id="job">jobId待機中</div></section><section class="done" id="done"><div class="head"><b>完成動画</b><span class="pill">completed</span></div><video id="video" controls playsinline></video><div class="icons"><a class="icon" id="open" target="_blank" rel="noreferrer">↗</a><a class="icon" id="download" download>↓</a><button class="icon" id="copy" type="button">⛓</button><button class="icon" id="rerun" type="button">↻</button></div></section><section class="section" id="histSec"><h2>過去動画</h2><button id="clear" type="button">消去</button></section><div class="history" id="history"><div class="empty">まだ動画がありません</div></div>
<section id="sbSection" style="display:none">
  <div class="sbUpload" id="sbUpload"><input type="file" id="sbFile" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%"><div id="sbPreview" style="display:none"><img id="sbImg" style="max-height:220px;border-radius:12px;max-width:100%"><p style="color:#86efac;font-size:12px;margin:8px 0 0">画像を選択済み。解析ボタンを押してください。</p></div><div id="sbPlaceholder"><b style="font-size:38px">🎬</b><br><span style="color:#888;font-size:13px">絵コンテ画像をアップロード</span><br><span style="color:#555;font-size:11px;margin-top:4px;display:block">PNG / JPG / WEBP</span></div></div>
  <button class="create" id="sbAnalyzeBtn" style="margin-top:12px" disabled>解析する ✦</button>
  <div id="sbResults" style="display:none;margin-top:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><b>カット一覧</b><span id="sbStyle" style="color:#888;font-size:11px;max-width:60%;text-align:right"></span></div><div id="sbCuts" style="display:grid;gap:8px"></div><button class="create" id="sbGenerateBtn" style="margin-top:16px">全カット生成する ✦</button></div>
  <div id="sbProgress" style="display:none;margin-top:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><b>生成中</b><span id="sbProgLabel" style="color:#888;font-size:12px">0 / 0</span></div><div id="sbProgList" style="display:grid;gap:8px"></div></div>
  <div id="sbMergeArea" style="display:none;margin-top:20px;text-align:center"><button class="create" id="sbMergeBtn">動画を結合してダウンロード ↓</button><div id="sbMergeStat" style="color:#888;font-size:12px;margin-top:8px"></div></div>
</section>
</main><script>const $=id=>document.getElementById(id);let mode='reference_to_video',urls=[],files=[],jobId='',timer=null,started=0,lastPrompt='';function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function modeName(m){return m==='text_to_video'?'テキストから動画':m==='image_to_video'?'画像から動画':m==='storyboard'?'絵コンテ':'リファレンス'}function notice(t,b=false){$('notice').textContent=t;$('notice').className='pill'+(b?' bad':'')}function log(x,b=false){$('log').textContent=typeof x==='string'?x:JSON.stringify(x,null,2);$('log').className='log show'}function setMode(m){mode=m;document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.mode===m));$('modeLabel').textContent=modeName(m);const isSb=m==='storyboard';$('mainCard').style.display=isSb?'none':'block';$('sbSection').style.display=isSb?'block':'none';if(!isSb){$('assets').style.display=m==='text_to_video'?'none':'grid';$('file').multiple=m==='reference_to_video'}if(isSb){$('now').classList.remove('show');$('done').classList.remove('show')}localStorage.setItem('flowvidGenerateMode',m);renderHistory(m)}function readFile(f){return new Promise((ok,ng)=>{const r=new FileReader();r.onload=()=>ok(String(r.result||''));r.onerror=()=>ng(r.error);r.readAsDataURL(f)})}function renderAssets(){const box=$('assets'),add=box.querySelector('.add');box.innerHTML='';files.forEach((f,i)=>{const d=document.createElement('div');d.className='thumb';d.innerHTML='<img><small>図'+(i+1)+'</small>';d.querySelector('img').src=URL.createObjectURL(f);box.appendChild(d)});box.appendChild(add)}async function upload(fs){files=Array.from(fs||[]).slice(0,mode==='reference_to_video'?5:1);urls=[];renderAssets();if(!files.length)return;notice('アップロード中…');for(let i=0;i<files.length;i++){const dataUrl=await readFile(files[i]);const res=await fetch('/api/upload-reference-image',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dataUrl,filename:files[i].name,contentType:files[i].type||'image/jpeg'})});const data=await res.json();if(!res.ok||!data.ok){notice('アップロード失敗',true);log(data,true);return}urls.push(data.publicUrl||data.url)}notice(urls.length+'枚アップロード済み');log({ok:true,urls})}function sample(){if(mode==='text_to_video')return 'スマホ縦動画。日本のアウトドア施設で、家族が芝生の遊び場へ向かい、子どもが走り出す。自然光、明るいCMトーン、実写風、高品質、5秒。文字、字幕、ロゴは入れない。';if(mode==='image_to_video')return 'アップロードした画像を最初のフレームとして使い、自然なカメラワークで実写風ショート動画にしてください。人物や背景の雰囲気を保ち、やわらかい光で5秒。文字、字幕、ロゴは入れない。';return 'アップロードした絵コンテ画像を参考資料として使用してください。紙面レイアウト、表、文字、見出し、ページ番号、枠線、説明文は映像化しないでください。参照するのは写真シーンの内容、雰囲気、構図、光、自然な動きだけです。5秒の実写風ショートCM動画。9:16。文字、字幕、ロゴは入れない。'}function findVideo(d){if(!d||typeof d!=='object')return'';for(const k of ['videoUrl','video_url','output_url','url']){const v=d[k];if(typeof v==='string'&&/^https?:\/\//.test(v))return v}for(const k of Object.keys(d)){const r=findVideo(d[k]);if(r)return r}return''}function done(d){const s=String(d?.jobStatus||d?.status||d?.response?.status||d?.response?.data?.status||'').toLowerCase();return d?.done||['completed','succeeded','success','done'].includes(s)}function failed(d){const s=String(d?.jobStatus||d?.status||d?.response?.status||d?.response?.data?.status||'').toLowerCase();return ['failed','error','cancelled','canceled'].includes(s)}function save(item){const list=JSON.parse(localStorage.getItem('flowvidHistory')||'[]');list.unshift(item);localStorage.setItem('flowvidHistory',JSON.stringify(list.slice(0,12)))}function showVideo(u,p){$('video').src=u;$('open').href=u;$('download').href=u;$('done').classList.add('show');$('now').classList.remove('show');save({url:u,prompt:p,mode,createdAt:new Date().toISOString()});renderHistory();setTimeout(()=>$('done').scrollIntoView({behavior:'smooth'}),200)}function renderHistory(fm){const list=JSON.parse(localStorage.getItem('flowvidHistory')||'[]');const m=fm||mode;const filtered=list.filter(it=>(it.mode||'reference_to_video')===m);$('history').innerHTML=filtered.length?filtered.map(it=>'<article class="old"><div class="oldTop">'+esc((it.prompt||'生成動画').slice(0,42))+'</div><video controls playsinline src="'+esc(it.url)+'"></video><div class="icons"><a class="icon" href="'+esc(it.url)+'" target="_blank">↗</a><a class="icon" href="'+esc(it.url)+'" download>↓</a></div></article>').join(''):'<div class="empty">まだ動画がありません</div>'}function stop(){if(timer){clearInterval(timer);timer=null}}async function check(){if(!jobId)return;const res=await fetch('/api/seedance-status?id='+encodeURIComponent(jobId));const data=await res.json();const u=findVideo(data);log(data,!res.ok||failed(data));if(u){stop();notice('生成完了');$('create').disabled=false;showVideo(u,lastPrompt);return}if(done(data)||failed(data)||Date.now()-started>10*60*1000){stop();notice(failed(data)?'生成失敗':'動画URL未確認',true);$('create').disabled=false;$('now').classList.remove('show');return}notice('処理中')}function poll(){stop();started=Date.now();check();timer=setInterval(check,12000)}async function start(){const prompt=$('prompt').value.trim();lastPrompt=prompt;if(!prompt){notice('プロンプト未入力',true);return log('プロンプトを入力してください。',true)}if(mode!=='text_to_video'&&!urls.length){notice('画像未アップロード',true);return log('画像をアップロードしてください。',true)}if(!confirm('Seedance生成を開始します。実行しますか？'))return;$('create').disabled=true;$('done').classList.remove('show');$('now').classList.add('show');$('job').textContent='送信中…';notice('送信中…');const body={model:$('model').value,prompt,duration:$('duration').value,resolution:$('resolution').value,aspect_ratio:$('aspect').value,generate_audio:$('audio').value==='true'};if(mode==='image_to_video')body.first_frame_url=urls[0];if(mode==='reference_to_video'){body.reference_url=urls[0];body.reference_urls=urls}try{const res=await fetch('/api/seedance-start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const data=await res.json();jobId=data.jobId||data.id||data.response?.id||data.response?.data?.id||'';log(data,!res.ok);if(!res.ok||!jobId){notice('jobId取得失敗',true);$('create').disabled=false;return}$('job').textContent=jobId;notice('処理中');const u=findVideo(data);if(u){$('create').disabled=false;return showVideo(u,prompt)}poll()}catch(e){notice('送信失敗',true);$('create').disabled=false;$('now').classList.remove('show');log(e.message||String(e),true)}}document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));$('file').onchange=e=>upload(e.target.files);$('sample').onclick=()=>$('prompt').value=sample();$('guide').onclick=()=>log('主役 → 動き → 雰囲気 → 禁止事項の順で書くと安定しやすいです。');$('create').onclick=start;$('rerun').onclick=start;$('copy').onclick=()=>navigator.clipboard?.writeText($('open').href);$('clear').onclick=()=>{localStorage.removeItem('flowvidHistory');renderHistory()};const q=new URLSearchParams(location.search).get('mode')||localStorage.getItem('flowvidGenerateMode')||'reference_to_video';setMode(['reference_to_video','image_to_video','text_to_video','storyboard'].includes(q)?q:'reference_to_video');

// ---- STORYBOARD TAB ----
async function getToken(){try{const cfg=window.FLOWVID_AUTH||{};if(!window.supabase||!cfg.supabaseUrl||!cfg.supabaseAnonKey)return'';if(!window.__sbClient){window.__sbClient=window.supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey)}const{data}=await window.__sbClient.auth.getSession();return data?.session?.access_token||''}catch(_){return''}}

let sbFile=null,sbCuts=[],sbTasks=[],sbVideos=[],sbPollTimer=null;

$('sbFile').onchange=e=>{
  sbFile=e.target.files[0];
  if(!sbFile)return;
  const r=new FileReader();
  r.onload=()=>{
    $('sbImg').src=r.result;
    $('sbPreview').style.display='block';
    $('sbPlaceholder').style.display='none';
    $('sbAnalyzeBtn').disabled=false;
  };
  r.readAsDataURL(sbFile);
};

$('sbAnalyzeBtn').onclick=async()=>{
  if(!sbFile)return;
  $('sbAnalyzeBtn').disabled=true;
  $('sbAnalyzeBtn').textContent='解析中…';
  try{
    const r=new FileReader();
    const dataUrl=await new Promise((ok,ng)=>{r.onload=()=>ok(r.result);r.onerror=ng;r.readAsDataURL(sbFile)});
    const base64=String(dataUrl).replace(/^data:[^;]+;base64,/,'');
    const res=await fetch('/api/storyboard',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:base64,mediaType:sbFile.type||'image/jpeg'})});
    const data=await res.json();
    if(!res.ok||!data.ok)throw new Error(data.error||'解析に失敗しました');
    sbCuts=data.result?.cuts||[];
    if(!sbCuts.length)throw new Error('カットが検出されませんでした');
    $('sbStyle').textContent=data.result?.style||'';
    $('sbCuts').innerHTML=sbCuts.map(c=>`<div class="sbCutCard"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><b style="font-size:13px">カット${esc(c.cut_number)}</b><span style="color:#888;font-size:11px">${esc(c.duration||5)}秒</span></div><div style="color:#bbb;font-size:12px;margin-bottom:4px">${esc(c.content||'')}</div><div style="color:#7dd3fc;font-size:11px;line-height:1.4">${esc(c.prompt||'')}</div>${c.camera?'<div style="color:#777;font-size:10px;margin-top:4px">📷 '+esc(c.camera)+'</div>':''}</div>`).join('');
    $('sbResults').style.display='block';
  }catch(e){
    alert('解析エラー: '+e.message);
  }finally{
    $('sbAnalyzeBtn').disabled=false;
    $('sbAnalyzeBtn').textContent='解析する ✦';
  }
};

$('sbGenerateBtn').onclick=async()=>{
  if(!sbCuts.length)return;
  const token=await getToken();
  if(!token){alert('ログインが必要です。');location.href='./login.html';return}
  $('sbResults').style.display='none';
  $('sbProgress').style.display='block';
  sbTasks=[];sbVideos=[];
  $('sbProgList').innerHTML=sbCuts.map((c,i)=>`<div class="sbProgCard" id="sbPCard${i}"><div><b style="font-size:12px">カット${esc(c.cut_number)}</b><div style="color:#888;font-size:10px;margin-top:2px">${esc((c.content||c.prompt||'').slice(0,48))}</div></div><span id="sbPStat${i}" style="font-size:11px;color:#888;flex-shrink:0;margin-left:8px">待機中</span></div>`).join('');
  sbUpdateProgress();
  for(let i=0;i<sbCuts.length;i++){
    const c=sbCuts[i];
    const dur=Math.max(1,Math.min(15,Number(c.duration||5)));
    const credits=Math.max(50,dur*12);
    const body={model:'bytedance/seedance-2.0',prompt:c.prompt||'',duration:dur,resolution:'720p',aspect_ratio:'16:9',generate_audio:true,mode:'text_to_video',estimated_credits:credits};
    try{
      const res=await fetch('/api/seedance-start',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(body)});
      const data=await res.json();
      if(res.status===401){alert('セッションが切れました。再ログインしてください。');location.href='./login.html';return}
      if(!res.ok)throw new Error(data.error||`HTTP ${res.status}`);
      const jobId=data.jobId||'';
      const pollingUrl=data.pollingUrl||'';
      sbTasks.push({i,jobId,pollingUrl,status:'processing',videoUrl:null});
      $('sbPStat'+i).textContent='生成中…';
      $('sbPStat'+i).style.color='#7dd3fc';
    }catch(e){
      sbTasks.push({i,jobId:null,pollingUrl:null,status:'failed',videoUrl:null});
      $('sbPStat'+i).textContent='開始失敗';
      $('sbPStat'+i).style.color='#fca5a5';
    }
    sbUpdateProgress();
  }
  sbStartPolling();
};

function sbUpdateProgress(){
  const done=sbTasks.filter(t=>t.status==='succeeded'||t.status==='failed').length;
  $('sbProgLabel').textContent=done+' / '+sbCuts.length;
}

function sbStartPolling(){
  if(sbPollTimer)clearInterval(sbPollTimer);
  sbPollTimer=setInterval(async()=>{
    let pending=0;
    for(const t of sbTasks){
      if(t.status==='succeeded'||t.status==='failed')continue;
      if(!t.jobId&&!t.pollingUrl)continue;
      pending++;
      try{
        const params=new URLSearchParams();
        if(t.pollingUrl)params.set('pollingUrl',t.pollingUrl);
        else params.set('id',t.jobId);
        const res=await fetch('/api/seedance-status?'+params);
        const data=await res.json();
        const u=findVideo(data);
        if(u){t.status='succeeded';t.videoUrl=u;save({url:u,prompt:sbCuts[t.i]?.prompt||'絵コンテ生成',mode:'storyboard',createdAt:new Date().toISOString()});$('sbPStat'+t.i).textContent='完了 ✓';$('sbPStat'+t.i).style.color='#86efac'}
        else if(failed(data)){t.status='failed';$('sbPStat'+t.i).textContent='失敗';$('sbPStat'+t.i).style.color='#fca5a5'}
      }catch(_){}
    }
    sbUpdateProgress();
    const allSettled=sbTasks.length>0&&sbTasks.every(t=>t.status==='succeeded'||t.status==='failed');
    if(allSettled||pending===0){
      clearInterval(sbPollTimer);sbPollTimer=null;
      sbVideos=sbTasks.filter(t=>t.videoUrl).map(t=>t.videoUrl);
      if(sbVideos.length>0)$('sbMergeArea').style.display='block';renderHistory('storyboard');
    }
  },12000);
}

async function sbLoadScript(src){
  return new Promise((res,rej)=>{
    if(document.querySelector('script[src="'+src+'"]')){res();return}
    const s=document.createElement('script');s.src=src;s.crossOrigin='anonymous';
    s.onload=res;s.onerror=()=>rej(new Error('スクリプトの読み込みに失敗: '+src));
    document.head.appendChild(s);
  });
}

$('sbMergeBtn').onclick=async()=>{
  if(!sbVideos.length)return;
  if(sbVideos.length===1){
    const a=document.createElement('a');a.href=sbVideos[0];a.download='storyboard.mp4';a.click();return;
  }
  $('sbMergeBtn').disabled=true;
  $('sbMergeStat').textContent='ffmpegを読み込み中…';
  try{
    await sbLoadScript('https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/umd/ffmpeg.js');
    await sbLoadScript('https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js');
    const FFmpegLib=window.FFmpegWASM||window;
    const FFmpegUtil=window.FFmpegUtil||window;
    const ff=new FFmpegLib.FFmpeg();
    $('sbMergeStat').textContent='コアを読み込み中（初回は時間がかかります）…';
    const base='https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';
    await ff.load({
      coreURL:await FFmpegUtil.toBlobURL(base+'/ffmpeg-core.js','text/javascript'),
      wasmURL:await FFmpegUtil.toBlobURL(base+'/ffmpeg-core.wasm','application/wasm')
    });
    let concat='';
    for(let i=0;i<sbVideos.length;i++){
      $('sbMergeStat').textContent=`動画を取得中 (${i+1}/${sbVideos.length})…`;
      const fileData=await FFmpegUtil.fetchFile(sbVideos[i]);
      await ff.writeFile('v'+i+'.mp4',fileData);
      concat+='file v'+i+'.mp4\n';
    }
    await ff.writeFile('list.txt',concat);
    $('sbMergeStat').textContent='結合中…';
    await ff.exec(['-f','concat','-safe','0','-i','list.txt','-c','copy','out.mp4']);
    const outData=await ff.readFile('out.mp4');
    const blob=new Blob([outData.buffer],{type:'video/mp4'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='storyboard-'+Date.now()+'.mp4';a.click();
    $('sbMergeStat').textContent='ダウンロード完了 ✓';
  }catch(e){
    $('sbMergeStat').textContent='エラー: '+e.message;
    console.error('[sbMerge]',e);
  }finally{
    $('sbMergeBtn').disabled=false;
  }
};
// ---- END STORYBOARD ----</script></body></html>
