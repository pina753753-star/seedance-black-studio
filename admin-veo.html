<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Veoテスト | FlowVid Studio</title>
<meta name="theme-color" content="#050506" />
<style>
:root{--bg:#050506;--line:rgba(255,255,255,.14);--muted:rgba(255,255,255,.58);--gold:#d7b86a;--cyan:#6ee7f9;--violet:#7c3aed;--red:#fb7185;--ok:#86efac}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.bg{position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 18% 0%,rgba(251,113,133,.18),transparent 34%),radial-gradient(circle at 86% 10%,rgba(124,58,237,.22),transparent 36%),linear-gradient(180deg,#050506,#08070d 62%,#030304)}.wrap{position:relative;max-width:720px;margin:0 auto;padding:16px 14px 42px}.top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:26px}.brand{display:flex;gap:10px;align-items:center;color:#fff;text-decoration:none}.logo{width:44px;height:44px;border-radius:17px;background:linear-gradient(135deg,var(--cyan),var(--violet));display:grid;place-items:center;font-weight:950}.brand small{display:block;color:rgba(255,255,255,.38);letter-spacing:.24em;font-size:9px}.brand b{display:block;font-size:21px}.top a,.top button{color:#fff;text-decoration:none;border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:999px;padding:10px 13px;font-size:13px}.hero{margin-bottom:16px}.hero p{margin:0 0 9px;color:var(--red);font-size:13px;letter-spacing:.18em}.hero h1{font-size:36px;line-height:1.08;letter-spacing:-.06em;margin:0 0 12px;background:linear-gradient(135deg,#fff,#f5b8c2 52%,#9be7ff);-webkit-background-clip:text;color:transparent}.lead{color:var(--muted);line-height:1.75;font-size:14px}.card{border:1px solid var(--line);border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.03));padding:16px;box-shadow:0 24px 80px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.08);margin-bottom:12px}.card h2{margin:0 0 12px;font-size:20px}.row{display:flex;justify-content:space-between;gap:10px;border-top:1px solid var(--line);padding:12px 0;color:rgba(255,255,255,.78);font-size:14px}.row:first-child{border-top:0}.pill{display:inline-flex;border:1px solid rgba(134,239,172,.28);background:rgba(134,239,172,.10);color:#dcfce7;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900}label{display:block;color:var(--muted);font-size:13px;margin:12px 0 6px}textarea,input,select{width:100%;border:1px solid var(--line);background:#08090c;color:#fff;border-radius:16px;padding:13px;font-size:16px}textarea{min-height:132px;line-height:1.6;resize:vertical}.btn{width:100%;border:0;border-radius:16px;padding:14px 13px;font-weight:950;color:#050506;background:linear-gradient(90deg,#fff,var(--gold),var(--violet));margin-top:12px}.btn.secondary{background:rgba(255,255,255,.06);color:#fff;border:1px solid var(--line)}.btn.danger{background:rgba(251,113,133,.10);color:#fecdd3;border:1px solid rgba(251,113,133,.35)}.status{border:1px solid rgba(134,239,172,.24);background:rgba(134,239,172,.08);color:#dcfce7;border-radius:15px;padding:12px;font-size:12px;line-height:1.6;display:none;margin-top:12px;white-space:pre-wrap;word-break:break-word}.status.show{display:block}.status.bad{border-color:rgba(251,113,133,.35);background:rgba(251,113,133,.10);color:#fecdd3}.mini{color:var(--muted);font-size:12px;line-height:1.7;margin-top:8px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.warn{border:1px solid rgba(251,113,133,.35);background:rgba(251,113,133,.10);color:#fecdd3;border-radius:18px;padding:14px;line-height:1.6;margin-bottom:14px;display:none}.warn.show{display:block}@media(max-width:430px){.hero h1{font-size:32px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="bg"></div>
<main class="wrap">
<header class="top"><a class="brand" href="./admin.html"><div class="logo">▶</div><div><small>AI VIDEO STUDIO</small><b>FlowVid Studio</b></div></a><button id="logoutBtn">ログアウト</button></header>
<section class="hero"><p>ADMIN VEO TEST</p><h1>Veo生成テスト</h1><div class="lead">Google APIキーとVeoモデルで、最小テスト生成を開始します。ボタンを押すとGoogle側で課金が発生する可能性があります。</div></section>
<div class="warn" id="warn"></div>
<section id="page" style="display:none">
<article class="card"><h2>ログイン状態</h2><div class="row"><span>管理者メール</span><strong id="adminEmail">確認中</strong></div><div class="row"><span>権限</span><span class="pill">admin</span></div></article>
<article class="card"><h2>テスト内容</h2>
<label>モデル</label><select id="model"><option value="models/veo-3.0-fast-generate-001">Veo 3 Fast</option><option value="models/veo-3.1-lite-generate-preview">Veo 3.1 Lite Preview</option><option value="models/veo-2.0-generate-001">Veo 2</option></select>
<label>アスペクト比</label><select id="aspectRatio"><option value="9:16">9:16</option><option value="16:9">16:9</option></select>
<label>プロンプト</label><textarea id="prompt">A cinematic vertical smartphone video of a small cute robot walking through a neon city at night, soft glow, smooth camera motion, high quality.</textarea>
<button class="btn" id="startBtn">Veo 5秒テスト生成を開始</button>
<div class="grid"><button class="btn secondary" id="statusBtn">生成状況を確認</button><button class="btn danger" id="clearBtn">表示をクリア</button></div>
<div class="status" id="status"></div>
<div class="mini">operationName が出たら生成開始成功です。完了まで数分かかる場合があります。</div>
</article>
</section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./auth-config.js?v=3844d5ea2"></script>
<script>
const cfg=window.FLOWVID_AUTH||{};const adminEmails=(cfg.adminEmails||[]).map(v=>String(v).toLowerCase());const authReady=Boolean(cfg.supabaseUrl&&cfg.supabaseAnonKey);const client=authReady?window.supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey):null;const $=id=>document.getElementById(id);let operationName='';
function showWarn(text){$('warn').textContent=text;$('warn').classList.add('show');$('page').style.display='none'}
function showStatus(obj,bad=false){const el=$('status');el.textContent=typeof obj==='string'?obj:JSON.stringify(obj,null,2);el.className='status show'+(bad?' bad':'')}
(async()=>{if(!authReady){showWarn('Supabase接続情報が未設定です。');return;}const {data,error}=await client.auth.getSession();const email=data.session?.user?.email||'';if(error||!email){location.href='./admin-login.html';return;}if(!adminEmails.includes(email.toLowerCase())){showWarn('このアカウントは管理者ではありません。');return;}$('adminEmail').textContent=email;$('page').style.display='block';})();
$('startBtn').onclick=async()=>{const ok=confirm('Veo生成テストを開始します。Google側で課金が発生する可能性があります。実行しますか？');if(!ok)return;showStatus('送信中…');try{const res=await fetch('/api/veo-start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:$('prompt').value,model:$('model').value,aspectRatio:$('aspectRatio').value})});const data=await res.json();operationName=data.operationName||data.response?.name||'';showStatus(data,!res.ok);}catch(e){showStatus(e.message||String(e),true)}};
$('statusBtn').onclick=async()=>{if(!operationName){showStatus('まだ operationName がありません。先に生成を開始してください。',true);return;}showStatus('確認中…');try{const res=await fetch('/api/veo-status?operation='+encodeURIComponent(operationName));const data=await res.json();showStatus(data,!res.ok);}catch(e){showStatus(e.message||String(e),true)}};
$('clearBtn').onclick=()=>{operationName='';$('status').className='status';$('status').textContent=''};
$('logoutBtn').onclick=async()=>{if(client)await client.auth.signOut();location.href='./index.html';};
</script>
</body>
</html>
