<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Veoテスト | FlowVid Studio</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;min-height:100%;overflow-x:hidden;background:#050506;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.wrap{width:100%;max-width:720px;margin:0 auto;padding:16px 12px 40px}.top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:28px}.brand{display:flex;align-items:center;gap:10px;color:#fff;text-decoration:none}.logo{width:44px;height:44px;border-radius:17px;background:linear-gradient(135deg,#6ee7f9,#7c3aed);display:grid;place-items:center;font-weight:900}.brand small{display:block;color:rgba(255,255,255,.42);letter-spacing:.22em;font-size:9px}.brand b{font-size:21px}.top button{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:#fff;border-radius:999px;padding:10px 13px}.hero{margin-bottom:14px}.hero h1{font-size:35px;line-height:1.08;letter-spacing:-.06em;margin:0 0 10px;background:linear-gradient(135deg,#fff,#f5b8c2 52%,#9be7ff);-webkit-background-clip:text;color:transparent}.hero p,.mini{color:rgba(255,255,255,.62);line-height:1.7;font-size:13px}.card{width:100%;max-width:100%;overflow:hidden;border:1px solid rgba(255,255,255,.14);border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));padding:16px;margin:12px 0}.row{display:flex;justify-content:space-between;gap:10px;border-top:1px solid rgba(255,255,255,.14);padding:12px 0;color:rgba(255,255,255,.78);font-size:14px}.row:first-child{border-top:0}.pill{border:1px solid rgba(134,239,172,.28);background:rgba(134,239,172,.10);color:#dcfce7;border-radius:999px;padding:5px 9px;font-weight:900;font-size:12px}label{display:block;color:rgba(255,255,255,.62);font-size:13px;margin:12px 0 6px}select,textarea{display:block;width:100%;max-width:100%;border:1px solid rgba(255,255,255,.14);background:#08090c;color:#fff;border-radius:16px;padding:13px;font-size:16px}textarea{min-height:126px;line-height:1.55;resize:vertical}.btn{display:block;width:100%;border:0;border-radius:16px;padding:14px;margin-top:12px;font-weight:950;color:#050506;background:linear-gradient(90deg,#fff,#d7b86a,#7c3aed)}.btn.secondary{background:rgba(255,255,255,.06);color:#fff;border:1px solid rgba(255,255,255,.14)}.btn.danger{background:rgba(251,113,133,.10);color:#fecdd3;border:1px solid rgba(251,113,133,.35)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.status{display:none;white-space:pre-wrap;word-break:break-word;max-height:320px;overflow:auto;border:1px solid rgba(134,239,172,.24);background:rgba(134,239,172,.08);color:#dcfce7;border-radius:16px;padding:12px;margin-top:12px;font-size:12px}.status.show{display:block}.status.bad{border-color:rgba(251,113,133,.35);background:rgba(251,113,133,.10);color:#fecdd3}.warn{display:none;border:1px solid rgba(251,113,133,.35);background:rgba(251,113,133,.10);color:#fecdd3;border-radius:18px;padding:14px;line-height:1.6}.warn.show{display:block}.videoBox{display:none;border:1px solid rgba(134,239,172,.24);background:rgba(134,239,172,.06);border-radius:18px;padding:12px;margin-top:12px}.videoBox.show{display:block}.videoBox h2{margin:0 0 10px;font-size:18px}.videoBox video{width:100%;max-width:100%;aspect-ratio:9/16;max-height:72vh;border-radius:14px;background:#000;object-fit:contain}.link{display:block;margin-top:10px;color:#dcfce7;word-break:break-all;font-size:13px;font-weight:900}@media(max-width:430px){.hero h1{font-size:31px}.card{padding:12px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="wrap">
<header class="top"><a class="brand" href="./admin.html"><div class="logo">▶</div><div><small>AI VIDEO STUDIO</small><b>FlowVid Studio</b></div></a><button id="logoutBtn">ログアウト</button></header>
<section class="hero"><h1>Veo生成テスト</h1><p>生成完了後、この画面内に動画プレビューを表示します。生成ボタンはGoogle側で課金が発生する可能性があります。</p></section>
<div class="warn" id="warn"></div>
<section id="page" style="display:none">
<article class="card"><h2>ログイン状態</h2><div class="row"><span>管理者メール</span><strong id="adminEmail">確認中</strong></div><div class="row"><span>権限</span><span class="pill">admin</span></div></article>
<article class="card"><h2>テスト内容</h2><label>モデル</label><select id="model"><option value="models/veo-3.0-fast-generate-001">Veo 3 Fast</option><option value="models/veo-3.1-lite-generate-preview">Veo 3.1 Lite Preview</option><option value="models/veo-2.0-generate-001">Veo 2</option></select><label>アスペクト比</label><select id="aspectRatio"><option value="9:16">9:16</option><option value="16:9">16:9</option></select><label>プロンプト</label><textarea id="prompt">A cinematic vertical smartphone video of a small cute robot walking through a neon city at night, soft glow, smooth camera motion, high quality.</textarea><button class="btn" id="startBtn">Veo 5秒テスト生成を開始</button><div class="grid"><button class="btn secondary" id="statusBtn">生成状況を確認</button><button class="btn danger" id="clearBtn">表示をクリア</button></div><div class="videoBox" id="videoBox"><h2>生成された動画</h2><video id="player" controls playsinline></video><a id="openLink" class="link" target="_blank" rel="noreferrer">動画を別タブで開く</a></div><div class="status" id="status"></div><div class="mini">operationName が出たら生成開始成功。完了後は動画プレイヤーが表示されます。</div></article>
</section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./auth-config.js?v=4a1f0c1"></script>
<script>
const cfg=window.FLOWVID_AUTH||{};const adminEmails=(cfg.adminEmails||[]).map(v=>String(v).toLowerCase());const authReady=Boolean(cfg.supabaseUrl&&cfg.supabaseAnonKey);const client=authReady?window.supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey):null;const $=id=>document.getElementById(id);let operationName=localStorage.getItem('flowvidVeoOperation')||'';
function showWarn(t){$('warn').textContent=t;$('warn').classList.add('show');$('page').style.display='none'}
function showStatus(x,bad=false){const el=$('status');el.textContent=typeof x==='string'?x:JSON.stringify(x,null,2);el.className='status show'+(bad?' bad':'')}
function findUri(o){if(!o||typeof o!=='object')return'';if(o.video&&o.video.uri)return o.video.uri;if(o.uri&&String(o.uri).includes('/files/'))return o.uri;for(const k of Object.keys(o)){const r=findUri(o[k]);if(r)return r}return''}
function showVideo(uri){if(!uri)return;const proxy='/api/veo-download?uri='+encodeURIComponent(uri);$('player').src=proxy;$('openLink').href=proxy;$('videoBox').classList.add('show')}
async function checkStatus(){if(!operationName){showStatus('まだ operationName がありません。先に生成を開始してください。',true);return}showStatus('確認中…');try{const res=await fetch('/api/veo-status?operation='+encodeURIComponent(operationName));const data=await res.json();showVideo(findUri(data));showStatus(data,!res.ok)}catch(e){showStatus(e.message||String(e),true)}}
(async()=>{if(!authReady){showWarn('Supabase接続情報が未設定です。');return}const {data,error}=await client.auth.getSession();const email=data.session?.user?.email||'';if(error||!email){location.href='./admin-login.html';return}if(!adminEmails.includes(email.toLowerCase())){showWarn('このアカウントは管理者ではありません。');return}$('adminEmail').textContent=email;$('page').style.display='block';if(operationName)checkStatus()})();
$('startBtn').onclick=async()=>{if(!confirm('Veo生成テストを開始します。Google側で課金が発生する可能性があります。実行しますか？'))return;showStatus('送信中…');$('videoBox').classList.remove('show');try{const res=await fetch('/api/veo-start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:$('prompt').value,model:$('model').value,aspectRatio:$('aspectRatio').value})});const data=await res.json();operationName=data.operationName||data.response?.name||'';if(operationName)localStorage.setItem('flowvidVeoOperation',operationName);showVideo(findUri(data));showStatus(data,!res.ok)}catch(e){showStatus(e.message||String(e),true)}};
$('statusBtn').onclick=checkStatus;$('clearBtn').onclick=()=>{operationName='';localStorage.removeItem('flowvidVeoOperation');$('status').className='status';$('status').textContent='';$('videoBox').classList.remove('show');$('player').removeAttribute('src')};$('logoutBtn').onclick=async()=>{if(client)await client.auth.signOut();location.href='./index.html'};
</script>
</body>
</html>
