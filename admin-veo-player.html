<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Veo動画確認 | FlowVid Studio</title>
<style>
body{margin:0;background:#050506;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.wrap{max-width:720px;margin:auto;padding:20px}.card{border:1px solid rgba(255,255,255,.14);border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));padding:16px;margin:12px 0}h1{font-size:34px;letter-spacing:-.05em}.lead{color:rgba(255,255,255,.62);line-height:1.7}textarea{width:100%;min-height:130px;border:1px solid rgba(255,255,255,.14);border-radius:16px;background:#08090c;color:#fff;padding:12px;font-size:14px;box-sizing:border-box}button,a.btn{display:block;width:100%;box-sizing:border-box;text-align:center;border:0;border-radius:16px;padding:14px;margin-top:12px;font-weight:900;color:#050506;background:linear-gradient(90deg,#fff,#d7b86a,#7c3aed);text-decoration:none}video{display:none;width:100%;border-radius:16px;background:#000;margin-top:12px}.status{white-space:pre-wrap;word-break:break-word;border:1px solid rgba(134,239,172,.24);background:rgba(134,239,172,.08);color:#dcfce7;border-radius:16px;padding:12px;margin-top:12px;font-size:12px}.bad{border-color:rgba(251,113,133,.35);background:rgba(251,113,133,.10);color:#fecdd3}.link{color:#dcfce7;word-break:break-all;display:block;margin-top:10px}
</style>
</head>
<body><main class="wrap"><h1>Veo動画確認</h1><p class="lead">生成状況のJSONを貼ると、video.uriを見つけて動画を表示します。</p><section class="card"><textarea id="jsonInput" placeholder="ここに生成状況のJSONを貼る"></textarea><button id="showBtn">動画を表示</button><video id="player" controls playsinline></video><a id="openLink" class="link" target="_blank" rel="noreferrer"></a><div id="status" class="status">待機中</div></section><a class="btn" href="./admin-veo.html">Veoテスト画面へ戻る</a></main><script>
const $=id=>document.getElementById(id);
function findVideoUri(obj){if(!obj||typeof obj!=='object')return '';if(obj.video&&obj.video.uri)return obj.video.uri;if(obj.uri&&typeof obj.uri==='string'&&obj.uri.includes('/files/'))return obj.uri;for(const key of Object.keys(obj)){const found=findVideoUri(obj[key]);if(found)return found;}return ''}
$('showBtn').onclick=()=>{try{const data=JSON.parse($('jsonInput').value);const uri=findVideoUri(data);if(!uri){$('status').textContent='video.uri が見つかりません';$('status').className='status bad';return;}const proxy='/api/veo-download?uri='+encodeURIComponent(uri);$('player').src=proxy;$('player').style.display='block';$('openLink').href=proxy;$('openLink').textContent='動画を別タブで開く';$('status').textContent='動画URLを読み込みました';$('status').className='status';}catch(e){$('status').textContent='JSONの読み取りに失敗しました：'+e.message;$('status').className='status bad';}};
</script></body></html>
