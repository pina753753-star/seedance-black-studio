<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Canvas CORS テスト（一時ページ）</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif;padding:20px}
  .wrap{max-width:640px;margin:auto}
  h1{font-size:20px;font-weight:800;margin:0 0 6px}
  p{color:#9ca3af;font-size:13px;line-height:1.7;margin:0 0 20px}
  video{width:100%;max-height:360px;background:#111;border-radius:12px;display:block}
  canvas{display:none}
  button{width:100%;border:0;border-radius:14px;padding:18px;margin-top:16px;font-size:18px;font-weight:800;background:linear-gradient(90deg,#eee8ff,#8ed8ff);color:#050506;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}
  .result{margin-top:20px;padding:24px;border-radius:16px;text-align:center;display:none}
  .result.show{display:block}
  .result .big{font-size:32px;font-weight:900;line-height:1.3}
  .result .detail{margin-top:10px;font-size:14px;line-height:1.6;word-break:break-all}
  .result.ok{background:rgba(134,239,172,.12);border:1px solid rgba(134,239,172,.4)}
  .result.ok .big{color:#86efac}
  .result.ng{background:rgba(251,113,133,.12);border:1px solid rgba(251,113,133,.4)}
  .result.ng .big{color:#fca5a5}
  .status{margin-top:14px;color:#7dd3fc;font-size:13px;font-weight:700;min-height:18px}
</style>
</head>
<body>
<main class="wrap">
  <h1>Canvas CORS テスト（一時ページ）</h1>
  <p>動画編集フィルムストリップ化の実装前確認用の、単独のテストページです。既存機能には影響しません。</p>

  <video id="v" crossorigin="anonymous" muted playsinline preload="metadata"
    src="https://jflpjsdjmlkmkqfahxwy.supabase.co/storage/v1/object/public/reference-images/watermarked/31572f80-0974-40a6-bba9-6730555a68f9.mp4"></video>
  <canvas id="c" width="320" height="180"></canvas>

  <button id="start">テスト開始</button>
  <div class="status" id="status"></div>
  <div class="result" id="result">
    <div class="big" id="resultBig"></div>
    <div class="detail" id="resultDetail"></div>
  </div>
</main>

<script>
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const btn = document.getElementById('start');
const statusEl = document.getElementById('status');
const resultEl = document.getElementById('result');
const resultBig = document.getElementById('resultBig');
const resultDetail = document.getElementById('resultDetail');

function setStatus(text) {
  statusEl.textContent = text;
}

function showOk() {
  resultEl.className = 'result show ok';
  resultBig.textContent = '結果OK';
  resultDetail.textContent = 'canvasから映像データを取得できました（クロスオリジンの制限に引っかかっていません）。';
}

function showNg(errName, errMessage) {
  resultEl.className = 'result show ng';
  resultBig.textContent = '結果NG';
  resultDetail.textContent = 'エラー名: ' + (errName || '不明') + (errMessage ? '\n詳細: ' + errMessage : '');
}

function showVideoLoadFailed(message) {
  resultEl.className = 'result show ng';
  resultBig.textContent = '動画の読み込みに失敗';
  resultDetail.textContent = message || '詳細不明';
}

function waitForEvent(target, eventName) {
  return new Promise((resolve, reject) => {
    const onEvent = () => { cleanup(); resolve(); };
    const onError = () => { cleanup(); reject(new Error('動画の読み込みでエラーが発生しました')); };
    function cleanup() {
      target.removeEventListener(eventName, onEvent);
      target.removeEventListener('error', onError);
    }
    target.addEventListener(eventName, onEvent, { once: true });
    target.addEventListener('error', onError, { once: true });
  });
}

btn.onclick = async () => {
  btn.disabled = true;
  resultEl.className = 'result';
  resultBig.textContent = '';
  resultDetail.textContent = '';

  try {
    setStatus('動画のメタデータを読み込み中…');
    if (video.readyState < 1) {
      await waitForEvent(video, 'loadedmetadata');
    }

    if (video.error) {
      showVideoLoadFailed(video.error.message || ('コード: ' + video.error.code));
      return;
    }

    setStatus('動画の中央あたりへシーク中…');
    const targetTime = Number.isFinite(video.duration) && video.duration > 0
      ? video.duration / 2
      : 0.5;
    video.currentTime = targetTime;
    await waitForEvent(video, 'seeked');

    if (video.error) {
      showVideoLoadFailed(video.error.message || ('コード: ' + video.error.code));
      return;
    }

    setStatus('canvasへ描画してデータ取得を試しています…');
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    ctx.getImageData(0, 0, 1, 1); // ここでCORS制限があればSecurityErrorが発生する

    setStatus('');
    showOk();
  } catch (err) {
    setStatus('');
    if (video.error) {
      showVideoLoadFailed(video.error.message || ('コード: ' + video.error.code));
    } else {
      showNg(err && err.name, err && err.message);
    }
  } finally {
    btn.disabled = false;
  }
};
</script>
</body>
</html>
