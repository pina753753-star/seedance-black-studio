<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Seedance Reference Test | FlowVid Studio</title>
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta name="theme-color" content="#050506">
<style>
*{box-sizing:border-box}body{margin:0;background:#050506;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;letter-spacing:-.03em}.wrap{max-width:720px;margin:0 auto;padding:18px 14px 54px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.brand{font-size:24px;font-weight:900}.back{color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:10px 14px;font-weight:800}.hero{border:1px solid rgba(255,255,255,.14);border-radius:28px;padding:22px;background:linear-gradient(135deg,rgba(124,92,255,.7),rgba(255,255,255,.04));box-shadow:0 24px 90px rgba(124,92,255,.18)}.hero small{color:#f5dc8c;font-weight:900;letter-spacing:.18em}.hero h1{font-size:34px;line-height:1.05;margin:12px 0 8px}.hero p{margin:0;color:rgba(255,255,255,.72);line-height:1.7}.card{margin-top:16px;border-radius:28px;background:#111318;color:#fff;border:1px solid rgba(255,255,255,.12);padding:18px}.mode{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}.mode button{border:0;border-radius:16px;padding:14px;font-weight:900;background:#090a0f;color:#fff}.mode button.active{background:linear-gradient(90deg,#fff4c7,#d4a7ff);color:#050506}label{display:block;margin:14px 0 7px;color:rgba(255,255,255,.82);font-weight:900}textarea,input,select{width:100%;border:1px solid rgba(255,255,255,.10);background:#090a0f;color:#fff;border-radius:16px;padding:14px;font-size:16px}textarea{min-height:190px;line-height:1.65}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.upload{border:1px dashed rgba(255,255,255,.22);border-radius:18px;padding:14px;background:rgba(255,255,255,.04)}.upload button,.primary,.secondary{width:100%;border:0;border-radius:16px;padding:15px;font-weight:900;font-size:15px}.upload button{background:#252936;color:#fff}.primary{background:linear-gradient(90deg,#fff4c7,#d4a7ff);color:#050506;margin-top:14px}.secondary{background:#252936;color:#fff;margin-top:10px}.meta{font-size:12px;color:rgba(255,255,255,.62);line-height:1.6;margin-top:8px;word-break:break-all}.previews{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}.previewItem{border-radius:16px;background:#050506;overflow:hidden;border:1px solid rgba(255,255,255,.1)}.previewItem img{display:block;width:100%;height:180px;object-fit:contain;background:#000}.previewItem small{display:block;padding:8px;color:rgba(255,255,255,.62);font-size:11px;word-break:break-all}.urlList{margin-top:10px;display:grid;gap:8px}.urlItem{background:#090a0f;border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:10px;color:#dbeafe;font-size:12px;word-break:break-all}.status{display:none;margin-top:12px;background:#101827;color:#dbeafe;border:1px solid rgba(147,197,253,.24);border-radius:16px;padding:12px;white-space:pre-wrap;word-break:break-word;font-size:12px;line-height:1.6;max-height:360px;overflow:auto}.status.show{display:block}.status.bad{background:#2b1017;color:#fecdd3;border-color:rgba(251,113,133,.35)}.video{display:none;margin-top:12px;background:#07120b;border:1px solid rgba(134,239,172,.28);border-radius:18px;padding:12px}.video.show{display:block}.video video{width:100%;aspect-ratio:9/16;max-height:72vh;background:#000;border-radius:14px}.note{text-align:center;color:rgba(255,255,255,.38);font-size:12px;line-height:1.6;margin-top:16px}@media(max-width:430px){.grid,.mode,.previews{grid-template-columns:1fr}.hero h1{font-size:31px}}
</style>
</head>
<body>
<main class="wrap">
<header class="top"><div class="brand">FlowVid Studio</div><a class="back" href="./admin.html">管理へ</a></header>
<section class="hero"><small>SEEDANCE REFERENCE TEST v3</small><h1>リファレンス専用テスト</h1><p>絵コンテ画像を最大5枚までまとめて選択できます。アップロード後のURL一覧をSeedance 2.0へ参照画像として送ります。</p></section>
<section class="card">
<div class="mode"><button id="referenceBtn" class="active" type="button">リファレンス</button><button id="imageBtn" type="button">画像から動画</button></div>
<label>モデル</label><select id="model"><option value="bytedance/seedance-2.0">bytedance/seedance-2.0</option><option value="bytedance/seedance-2.0-lite">bytedance/seedance-2.0-lite</option></select>
<label>プロンプト</label><textarea id="prompt">アップロードした絵コンテ画像を参考資料として使用してください。ただし、絵コンテの紙面レイアウト、表、文字、見出し、ページ番号、枠線、説明文は生成しないでください。参照するのは写真シーンの内容・雰囲気・構図だけです。最終出力は、実写風の高品質な日本の家族向け施設CM動画にしてください。自然な人物の動き、やわらかな光、シネマティックな映像表現。9:16縦動画、5秒、高品質。</textarea>
<label id="imageLabel">リファレンス画像</label><div class="upload"><input id="file" type="file" accept="image/png,image/jpeg,image/webp" multiple style="display:none"><button id="pick" type="button">画像をまとめて選択してアップロード</button><div class="meta" id="meta">最大5枚まで選択できます。</div><div class="previews" id="previews"></div><div class="urlList" id="urlList"></div></div>
<input id="imageUrl" type="url" placeholder="アップロード後に1枚目のURLが自動で入ります" style="margin-top:10px">
<div class="grid"><div><label>アスペクト比</label><select id="aspect"><option value="9:16">9:16 スマホ縦</option><option value="16:9">16:9 横</option><option value="1:1">1:1 正方形</option></select></div><div><label>長さ</label><select id="duration"><option value="5">5秒</option><option value="8">8秒</option></select></div></div>
<div class="grid"><div><label>解像度</label><select id="resolution"><option value="720p">720p</option><option value="480p">480p</option><option value="1080p">1080p</option></select></div><div><label>音声</label><select id="audio"><option value="false">なし</option><option value="true">あり</option></select></div></div>
<button class="primary" id="start" type="button">Seedance生成を開始</button><button class="secondary" id="check" type="button">生成状況を確認</button>
<div class="video" id="videoBox"><video id="player" controls playsinline></video><a id="openLink" target="_blank" rel="noreferrer" style="display:block;margin-top:10px;color:#dcfce7;word-break:break-all">動画を別タブで開く</a></div>
<div class="status" id="status"></div>
</section><p class="note">このページは v3。表示が変わらない場合は最新デプロイを開き直してください。</p>
</main>
<script>
const $=id=>document.getElementById(id);let mode='reference';let jobId=localStorage.getItem('flowvidSeedanceJobId')||'';let uploadedUrls=[];
function status(data,bad=false){const el=$('status');el.textContent=typeof data==='string'?data:JSON.stringify(data,null,2);el.className='status show'+(bad?' bad':'')}
function setMode(next){mode=next;$('referenceBtn').classList.toggle('active',mode==='reference');$('imageBtn').classList.toggle('active',mode==='image');$('imageLabel').textContent=mode==='image'?'最初のフレーム画像':'リファレンス画像';localStorage.setItem('flowvidSeedanceMode',mode)}
function readFile(file){return new Promise((ok,ng)=>{const r=new FileReader();r.onload=()=>ok(String(r.result||''));r.onerror=()=>ng(r.error||new Error('File read failed'));r.readAsDataURL(file)})}
function renderPreviews(files){$('previews').innerHTML='';files.forEach((file,i)=>{const div=document.createElement('div');div.className='previewItem';div.innerHTML='<img alt="preview"><small></small>';div.querySelector('img').src=URL.createObjectURL(file);div.querySelector('small').textContent=(i+1)+'. '+file.name; $('previews').appendChild(div)})}
function renderUrls(urls){$('urlList').innerHTML='';urls.forEach((url,i)=>{const div=document.createElement('div');div.className='urlItem';div.textContent=(i+1)+'. '+url;$('urlList').appendChild(div)});$('imageUrl').value=urls[0]||'';localStorage.setItem('flowvidSeedanceImageUrls',JSON.stringify(urls));localStorage.setItem('flowvidSeedanceImageUrl',urls[0]||'')}
async function uploadFiles(files){files=Array.from(files||[]).slice(0,5);if(!files.length)return;uploadedUrls=[];renderPreviews(files);renderUrls([]);$('meta').textContent=`${files.length}枚をアップロード中…`;for(let i=0;i<files.length;i++){const file=files[i];$('meta').textContent=`${i+1}/${files.length}枚目をアップロード中…`;const dataUrl=await readFile(file);const res=await fetch('/api/upload-reference-image',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dataUrl,filename:file.name,contentType:file.type||'image/jpeg'})});const data=await res.json();if(!res.ok||!data.ok){$('meta').textContent='アップロード失敗';status(data,true);return}const url=data.publicUrl||data.url;if(!url){$('meta').textContent='アップロード失敗：URLが返っていません';status(data,true);return}uploadedUrls.push(url);renderUrls(uploadedUrls)}$('meta').textContent=`アップロード完了：${uploadedUrls.length}枚`;status({ok:true,uploaded:true,count:uploadedUrls.length,urls:uploadedUrls})}
function findVideo(data){if(!data||typeof data!=='object')return'';if(data.videoUrl)return data.videoUrl;if(data.video_url)return data.video_url;if(data.url&&/http|video|mp4/i.test(data.url))return data.url;for(const k of Object.keys(data)){const v=data[k];if(v&&typeof v==='object'){const r=findVideo(v);if(r)return r}}return''}
function showVideo(url){if(!url)return;$('player').src=url;$('openLink').href=url;$('videoBox').classList.add('show')}
async function start(){const urls=uploadedUrls.length?uploadedUrls:JSON.parse(localStorage.getItem('flowvidSeedanceImageUrls')||'[]');const firstUrl=urls[0]||$('imageUrl').value.trim();if(!firstUrl){status('画像をアップロードしてください。',true);return}if(!confirm('Seedance 2.0の生成を開始します。OpenRouter残高を消費する可能性があります。実行しますか？'))return;$('start').disabled=true;status('送信中…');try{const body={model:$('model').value,prompt:$('prompt').value,duration:$('duration').value,resolution:$('resolution').value,aspect_ratio:$('aspect').value,generate_audio:$('audio').value==='true'};if(mode==='image')body.first_frame_url=firstUrl;else{body.reference_url=firstUrl;body.reference_urls=urls.length?urls:[firstUrl]}const res=await fetch('/api/seedance-start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const data=await res.json();jobId=data.jobId||data.id||data.response?.id||'';if(jobId)localStorage.setItem('flowvidSeedanceJobId',jobId);showVideo(findVideo(data));status(data,!res.ok)}catch(e){status(e.message||String(e),true)}finally{$('start').disabled=false}}
async function check(){if(!jobId){status('まだjobIdがありません。',true);return}status('確認中…');try{const res=await fetch('/api/seedance-status?id='+encodeURIComponent(jobId));const data=await res.json();showVideo(findVideo(data));status(data,!res.ok)}catch(e){status(e.message||String(e),true)}}
$('referenceBtn').onclick=()=>setMode('reference');$('imageBtn').onclick=()=>setMode('image');$('pick').onclick=()=>$('file').click();$('file').onchange=e=>uploadFiles(e.target.files);$('imageUrl').oninput=e=>renderUrls(e.target.value.trim()?[e.target.value.trim()]:[]);$('start').onclick=start;$('check').onclick=check;setMode(localStorage.getItem('flowvidSeedanceMode')==='image'?'image':'reference');try{uploadedUrls=JSON.parse(localStorage.getItem('flowvidSeedanceImageUrls')||'[]');renderUrls(uploadedUrls)}catch(_){uploadedUrls=[]}
</script>
</body>
</html>
