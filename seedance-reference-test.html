<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Seedance Reference Test | FlowVid Studio</title>
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta name="theme-color" content="#050506">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;750;850&family=Noto+Sans+JP:wght@600;700;800&display=swap');
*{box-sizing:border-box}body{margin:0;background:#050506;color:#fff;font-family:'Inter','Noto Sans JP',system-ui,sans-serif;letter-spacing:-.02em}.wrap{max-width:720px;margin:0 auto;padding:18px 14px 54px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.brand{font-size:24px;font-weight:850}.back{color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:10px 14px}.hero{border:1px solid rgba(255,255,255,.14);border-radius:28px;padding:22px;background:linear-gradient(135deg,rgba(124,92,255,.75),rgba(255,255,255,.05));box-shadow:0 24px 90px rgba(124,92,255,.18)}.hero small{color:#f5dc8c;font-weight:850;letter-spacing:.18em}.hero h1{font-size:34px;line-height:1.05;margin:12px 0 8px}.hero p{margin:0;color:rgba(255,255,255,.72);line-height:1.7}.card{margin-top:16px;border-radius:28px;background:#fff;color:#050506;padding:18px}.mode{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}.mode button{border:0;border-radius:16px;padding:14px;font-weight:850;background:#0b0d13;color:#fff}.mode button.active{background:linear-gradient(90deg,#fff4c7,#d4a7ff);color:#050506}label{display:block;margin:14px 0 7px;color:#333;font-weight:850}textarea,input,select{width:100%;border:0;background:#090a0f;color:#fff;border-radius:16px;padding:14px;font-size:16px}textarea{min-height:190px;line-height:1.6}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.upload{border:1px dashed rgba(0,0,0,.22);border-radius:18px;padding:14px;background:#f6f6f8}.upload button,.primary,.secondary{width:100%;border:0;border-radius:16px;padding:15px;font-weight:850;font-size:15px}.upload button{background:#1f2430;color:#fff}.primary{background:linear-gradient(90deg,#fff4c7,#d4a7ff);color:#050506;margin-top:14px}.secondary{background:#20242d;color:#fff;margin-top:10px}.meta{font-size:12px;color:#555;line-height:1.6;margin-top:8px;word-break:break-all}.preview{display:none;margin-top:10px;border-radius:16px;background:#050506;overflow:hidden}.preview.show{display:block}.preview img{display:block;width:100%;max-height:260px;object-fit:contain}.status{display:none;margin-top:12px;background:#101827;color:#dbeafe;border:1px solid rgba(147,197,253,.24);border-radius:16px;padding:12px;white-space:pre-wrap;word-break:break-word;font-size:12px;line-height:1.6;max-height:360px;overflow:auto}.status.show{display:block}.status.bad{background:#2b1017;color:#fecdd3;border-color:rgba(251,113,133,.35)}.video{display:none;margin-top:12px;background:#07120b;border:1px solid rgba(134,239,172,.28);border-radius:18px;padding:12px}.video.show{display:block}.video video{width:100%;aspect-ratio:9/16;max-height:72vh;background:#000;border-radius:14px}.note{text-align:center;color:rgba(255,255,255,.38);font-size:12px;line-height:1.6;margin-top:16px}@media(max-width:430px){.grid,.mode{grid-template-columns:1fr}.hero h1{font-size:31px}}
</style>
</head>
<body>
<main class="wrap">
<header class="top"><div class="brand">FlowVid Studio</div><a class="back" href="./admin.html">管理へ</a></header>
<section class="hero"><small>SEEDANCE REFERENCE TEST v2</small><h1>リファレンス専用テスト</h1><p>古いキャッシュを避けるための別ページです。画像をアップロードして、Seedance 2.0へ参照画像として送ります。</p></section>
<section class="card">
<div class="mode"><button id="referenceBtn" class="active" type="button">リファレンス</button><button id="imageBtn" type="button">画像から動画</button></div>
<label>モデル</label><select id="model"><option value="bytedance/seedance-2.0">bytedance/seedance-2.0</option><option value="bytedance/seedance-2.0-lite">bytedance/seedance-2.0-lite</option></select>
<label>プロンプト</label><textarea id="prompt">アップロードした絵コンテ画像を参考資料として使用してください。ただし、絵コンテの紙面レイアウト、表、文字、見出し、ページ番号、枠線、説明文は生成しないでください。参照するのは写真シーンの内容・雰囲気・構図だけです。最終出力は、実写風の高品質な日本の家族向け施設CM動画にしてください。自然な人物の動き、やわらかな光、シネマティックな映像表現。9:16縦動画、5秒、高品質。</textarea>
<label id="imageLabel">リファレンス画像</label><div class="upload"><input id="file" type="file" accept="image/png,image/jpeg,image/webp" style="display:none"><button id="pick" type="button">画像を選択してアップロード</button><div class="meta" id="meta">まだ画像が選択されていません。</div><div class="preview" id="preview"><img id="previewImg" alt="preview"></div></div>
<input id="imageUrl" type="url" placeholder="アップロード後にURLが自動で入ります" style="margin-top:10px">
<div class="grid"><div><label>アスペクト比</label><select id="aspect"><option value="9:16">9:16 スマホ縦</option><option value="16:9">16:9 横</option><option value="1:1">1:1 正方形</option></select></div><div><label>長さ</label><select id="duration"><option value="5">5秒</option><option value="8">8秒</option></select></div></div>
<div class="grid"><div><label>解像度</label><select id="resolution"><option value="720p">720p</option><option value="480p">480p</option><option value="1080p">1080p</option></select></div><div><label>音声</label><select id="audio"><option value="false">なし</option><option value="true">あり</option></select></div></div>
<button class="primary" id="start" type="button">Seedance生成を開始</button><button class="secondary" id="check" type="button">生成状況を確認</button>
<div class="video" id="videoBox"><video id="player" controls playsinline></video><a id="openLink" target="_blank" rel="noreferrer" style="display:block;margin-top:10px;color:#dcfce7;word-break:break-all">動画を別タブで開く</a></div>
<div class="status" id="status"></div>
</section><p class="note">このページは v2。表示が変わらない場合はVercelの最新デプロイがProductionに反映されていません。</p>
</main>
<script>
const $=id=>document.getElementById(id);let mode='reference';let jobId=localStorage.getItem('flowvidSeedanceJobId')||'';
function status(data,bad=false){const el=$('status');el.textContent=typeof data==='string'?data:JSON.stringify(data,null,2);el.className='status show'+(bad?' bad':'')}
function setMode(next){mode=next;$('referenceBtn').classList.toggle('active',mode==='reference');$('imageBtn').classList.toggle('active',mode==='image');$('imageLabel').textContent=mode==='image'?'最初のフレーム画像':'リファレンス画像';localStorage.setItem('flowvidSeedanceMode',mode)}
function preview(url){if(!url){$('preview').classList.remove('show');return}$('previewImg').src=url;$('preview').classList.add('show')}
function readFile(file){return new Promise((ok,ng)=>{const r=new FileReader();r.onload=()=>ok(String(r.result||''));r.onerror=()=>ng(r.error||new Error('File read failed'));r.readAsDataURL(file)})}
async function upload(file){if(!file)return;preview(URL.createObjectURL(file));$('meta').textContent='アップロード中…';const dataUrl=await readFile(file);const res=await fetch('/api/upload-reference-image',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dataUrl,filename:file.name,contentType:file.type||'image/jpeg'})});const data=await res.json();if(!res.ok||!data.ok){$('meta').textContent='アップロード失敗';status(data,true);return}$('imageUrl').value=data.publicUrl;localStorage.setItem('flowvidSeedanceImageUrl',data.publicUrl);preview(data.publicUrl);$('meta').textContent='アップロード完了：'+data.publicUrl;status({ok:true,uploaded:true,publicUrl:data.publicUrl,size:data.size})}
function findVideo(data){if(!data||typeof data!=='object')return'';if(data.videoUrl)return data.videoUrl;if(data.video_url)return data.video_url;if(data.url&&/http|video|mp4/i.test(data.url))return data.url;for(const k of Object.keys(data)){const v=data[k];if(v&&typeof v==='object'){const r=findVideo(v);if(r)return r}}return''}
function showVideo(url){if(!url)return;$('player').src=url;$('openLink').href=url;$('videoBox').classList.add('show')}
async function start(){const imageUrl=$('imageUrl').value.trim();if(!imageUrl){status('画像をアップロードしてください。',true);return}if(!confirm('Seedance 2.0の生成を開始します。OpenRouter残高を消費する可能性があります。実行しますか？'))return;$('start').disabled=true;status('送信中…');try{const body={model:$('model').value,prompt:$('prompt').value,duration:$('duration').value,resolution:$('resolution').value,aspect_ratio:$('aspect').value,generate_audio:$('audio').value==='true'};if(mode==='image')body.first_frame_url=imageUrl;else body.reference_url=imageUrl;const res=await fetch('/api/seedance-start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const data=await res.json();jobId=data.jobId||data.id||data.response?.id||'';if(jobId)localStorage.setItem('flowvidSeedanceJobId',jobId);showVideo(findVideo(data));status(data,!res.ok)}catch(e){status(e.message||String(e),true)}finally{$('start').disabled=false}}
async function check(){if(!jobId){status('まだjobIdがありません。',true);return}status('確認中…');try{const res=await fetch('/api/seedance-status?id='+encodeURIComponent(jobId));const data=await res.json();showVideo(findVideo(data));status(data,!res.ok)}catch(e){status(e.message||String(e),true)}}
$('referenceBtn').onclick=()=>setMode('reference');$('imageBtn').onclick=()=>setMode('image');$('pick').onclick=()=>$('file').click();$('file').onchange=e=>upload(e.target.files&&e.target.files[0]);$('imageUrl').oninput=e=>preview(e.target.value.trim());$('start').onclick=start;$('check').onclick=check;setMode(localStorage.getItem('flowvidSeedanceMode')==='image'?'image':'reference');const saved=localStorage.getItem('flowvidSeedanceImageUrl')||'';if(saved){$('imageUrl').value=saved;preview(saved);$('meta').textContent='前回アップロードした画像URLを復元しました。'}
</script>
</body>
</html>
