<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Recover | FlowVid</title><style>*{box-sizing:border-box}body{margin:0;background:#050b12;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Hiragino Sans','Noto Sans JP',system-ui,sans-serif}.wrap{max-width:760px;margin:auto;padding:28px 14px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}.brand{display:flex;gap:12px;align-items:center;color:#fff;text-decoration:none}.logo{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,#fff,#7dd3fc,#8b5cf6);display:grid;place-items:center;color:#050506;font-weight:800}.brand b{font-size:24px;letter-spacing:-.04em}.home{width:44px;height:44px;border-radius:50%;background:#1b2029;color:#fff;display:grid;place-items:center;text-decoration:none}.card{background:#1b1e25;border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:16px;margin-bottom:14px}h1{font-size:24px;margin:0 0 8px;letter-spacing:-.04em}p{color:#aaa;line-height:1.7;margin:0 0 12px}.job{background:#101319;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:13px;color:#ddd;word-break:break-all;font-size:13px}.btn{width:100%;border:0;border-radius:18px;padding:16px;background:linear-gradient(90deg,#eee8ff,#8ed8ff);font-weight:800;font-size:18px;color:#050506;margin-top:14px}.btn2{display:block;text-align:center;text-decoration:none;border:1px solid rgba(255,255,255,.1);background:#1b2029;color:#fff;border-radius:16px;padding:14px;font-weight:750;margin-top:10px}.status{white-space:pre-wrap;background:#101319;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:12px;color:#bbb;font-size:12px;line-height:1.6;max-height:300px;overflow:auto}.video{display:none}.video.show{display:block}.video video{width:100%;max-height:520px;background:#000;border-radius:18px}.pill{display:inline-flex;margin-top:10px;background:rgba(134,239,172,.08);border:1px solid rgba(134,239,172,.25);color:#dcfce7;border-radius:999px;padding:7px 10px;font-weight:750}</style></head><body><main class="wrap"><header class="top"><a class="brand" href="./index.html"><div class="logo">▶</div><b>FlowVid</b></a><a class="home" href="./index.html">⌂</a></header><section class="card"><h1>直前の動画を復元</h1><p>この端末に残っている jobId から、生成結果をもう一度確認します。</p><div class="job" id="job">確認中…</div><button class="btn" id="check">結果を確認する</button><a class="btn2" href="./generate.html">生成画面へ戻る</a><span class="pill" id="hint">確認中</span></section><section class="card video" id="videoCard"><h1>見つかった動画</h1><video id="video" controls playsinline></video><a class="btn2" id="open" target="_blank" rel="noreferrer">別タブで開く</a></section><section class="card"><h1>確認ログ</h1><pre class="status" id="status">まだ確認していません</pre></section></main><script>const $=id=>document.getElementById(id);let jobId=localStorage.getItem('flowvidLastSeedanceJobId')||'';function setStatus(x){$('status').textContent=typeof x==='string'?x:JSON.stringify(x,null,2)}function findVideo(d){if(!d||typeof d!=='object')return'';for(const k of ['videoUrl','video_url','output_url','download_url','signed_url','url','uri']){const v=d[k];if(typeof v==='string'&&/^https?:\/\//.test(v))return v}for(const k of Object.keys(d)){const r=findVideo(d[k]);if(r)return r}return''}function saveLocal(u,p='復元した動画'){const list=JSON.parse(localStorage.getItem('flowvidHistory')||'[]');if(!list.some(x=>x.url===u))list.unshift({url:u,prompt:p,mode:'reference_to_video',jobId,createdAt:new Date().toISOString()});localStorage.setItem('flowvidHistory',JSON.stringify(list.slice(0,20)))}function showVideo(u,p){$('video').src=u;$('open').href=u;$('videoCard').classList.add('show');saveLocal(u,p)}async function check(){if(!jobId){$('hint').textContent='jobIdなし';setStatus('この端末には flowvidLastSeedanceJobId が残っていません。');return}$('hint').textContent='確認中…';const res=await fetch('/api/seedance-status?id='+encodeURIComponent(jobId));const data=await res.json();setStatus(data);const u=findVideo(data);if(u){$('hint').textContent='動画が見つかりました';showVideo(u)}else{$('hint').textContent='動画URLが見つかりませんでした'}}$('job').textContent=jobId||'jobIdが見つかりません';$('check').onclick=check;if(jobId)check();</script></body></html>
